opts": ["Order an abdominal ultrasound to visualize the pancreas", "Schedule a CT scan with contrast to identify pancreatic necrosis", "Repeat lipase levels in 6 hours for confirmation", "Measure serum trypsinogen activation peptide (TAP)", "Make the diagnosis clinically, imaging is not required"], "ans": 4, "exp": "Diagnosis of acute pancreatitis requires 2 out of 3 criteria: (1) typical clinical presentation (acute severe epigastric pain radiating to the back, with nausea/vomiting), (2) lipase or amylase >3x upper limit of normal, and (3) characteristic findings on imaging. In this case, the patient meets the first two criteria, so imaging is not required to make the diagnosis.", "src": "Monkey Intel", "lec": "Lec 53", "topic": "Pancreas: Acute Pancreatitis"}, {"id": "qbd420d02", "q": "Which of the following best describes how Ranson’s criteria is used to assess acute pancreatitis?", "opts": ["It uses the same criteria on admission and 48 hours later.", "It relies only on lab values measured at admission.", "It evaluates chronic changes over months.", "It includes different criteria assessed at admission and again at 48 hours.", "It requires imaging for all components."], "ans": 3, "exp": "At admission: 1. Age > 55 2. WBC>16 3. Glu > 200 4. AST > 250 5. LDH >350 At 48 hrs out: 1. Ca < 8 2. HCT fall >10% 3. PO2<60 4. BUN increase > 5 5. Base deficit > 4 mEq/L 6. Sequestration of fluids > 6L", "src": "Monkey Intel", "lec": "Lec 53", "topic": "Pancreas: Acute Pancreatitis"}, {"id": "q2e5e4a46", "q": "A 68-year-old man presents with progressive jaundice, dark urine, pale stools, and significant weight loss over the past two months. Laboratory evaluation reveals elevated conjugated bilirubin and alkaline phosphatase. Imaging shows obstruction of both the common bile duct and pancreatic duct. Which of the following imaging findings is most consistent with this presentation?", "opts": ["Johndroma sign", "Double duct sign", "Courvoisier sign", "Target sign", "Kehr's sign"], "ans": 1, "exp": "The double duct sign is a classic imaging finding seen when both the common bile duct and pancreatic duct are obstructed, typically due to an obstructing pancreatic head mass. Note that this condition can also be described as dilation of both ducts as the pressure of obstruction causes dilatation. (Radiopaedia and other papers describe it as dilation, but journals typically say obstruction | image from radiopaedia)", "src": "Monkey Intel", "lec": "Lec 54", "topic": "Liver: Bilirubin Metabolism / Jaundice"}, {"id": "q7b86d944", "q": "A 34-year-old woman presents to the emergency department after an episode of confusion and seizure. Her symptoms began after skipping breakfast and resolved quickly after she consumed orange juice provided by paramedics. In the hospital, a supervised 72-hour fast is initiated, during which she develops tremulousness, diaphoresis, and confusion. Labs at that time reveal a blood glucose of 45 mg/dL. Her symptoms rapidly improve following administration of intravenous dextrose. Which of the following best describes the diagnostic criteria this patient meets?", "opts": ["Glucagon stimulation test", "Whipple’s triad", "Somogyi effect", "Cushing’s reflex", "Dumping syndrome"], "ans": 1, "exp": "This patient meets the classic features of Whipple’s triad, which are diagnostic for insulinoma: 1. Symptoms of hypoglycemia, especially after fasting 2. Documented low blood glucose (<50 mg/dL) 3. Relief of symptoms with administration of glucose", "src": "Monkey Intel", "lec": "Lec 54", "topic": "Pancreas: Pancreatic Cancer"}, {"id": "q627e3d1f", "q": "Which of the following best defines the inferior boundary of the gastrinoma triangle?", "opts": ["Junction of the cystic duct and common bile duct", "Junction of the neck and body of the pancreas", "Junction of the second and third parts of the duodenum", "Ampulla of Vater", "Uncinate process of the pancreas"], "ans": 2, "exp": "The gastrinoma triangle, where over 90% of gastrinomas occur, has the following borders: ● Superiorly by the junction of the cystic duct and common bile duct ● Inferiorly by the junction of the second and third parts of the duodenum ● Medially by the junction of the neck and body of the pancreas", "src": "Monkey Intel", "lec": "Lec 54", "topic": "Stomach: Zollinger-Ellison / Gastrinoma"}, {"id": "q1e8f5699", "q": "A 60-year-old man presents with a chronic, painful rash affecting his groin and lower abdomen. The lesions appear erythematous, blister, crust, and then heal centrally while spreading peripherally. He also reports recent weight loss and fatigue. Physical exam reveals multiple erythematous plaques with areas of central clearing. Which of the following pancreatic neuroendocrine tumors is most likely responsible for this patient’s condition?", "opts": ["Insulinoma", "VIPoma", "Somatostatinoma", "Gastrinoma", "Glucagonoma"], "ans": 4, "exp": "The described skin condition is necrolytic migratory erythema, which is classically associated with glucagonoma, a rare pancreatic neuroendocrine tumor that leads to hyperglucagonemia.", "src": "Monkey Intel", "lec": "Lec 54", "topic": "Stomach: Zollinger-Ellison / Gastrinoma"}, {"id": "q9c8d5b15", "q": "A 54-year-old man presents with chronic diarrhea and foul-smelling, greasy stools. He reports weight loss despite a normal appetite. His medical history is significant for chronic alcohol use. A stool sample is collected and shows a fecal elastase concentration of 150 mcg/g. Which of the following best describes the clinical utility of this test?", "opts": ["Confirms presence of inflammatory bowel disease", "Indicates increased intestinal bile salt reabsorption", "Identifies celiac-related villous atrophy", "Detects bacterial overgrowth in the small intestine", "Suggests exocrine pancreatic insufficiency"], "ans": 4, "exp": "Fecal elastase is a non-invasive, sensitive marker for pancreatic exocrine function. A value below 200 mcg/g is suggestive of pancreatic insufficiency, often seen in conditions like chronic pancreatitis, cystic fibrosis, or long-standing alcohol use. It is the test of choice due to its convenience (single random stool sample) and diagnostic accuracy.", "src": "Monkey Intel", "lec": "Lec 54", "topic": "Small Intestine: Celiac Disease"}, {"id": "qcd61dea8", "q": "A 52-year-old man presents with chronic epigastric pain and frequent greasy, foul-smelling stools. He has a long history of alcohol use. Imaging reveals calcifications in the pancreas. Which of the following is the most likely underlying cause of this patient’s condition?", "opts": ["Autoimmune pancreatitis", "Gallstone obstruction", "Hypertriglyceridemia", "Chronic alcohol use", "Genetic mutation in CFTR"], "ans": 3, "exp": "Chronic alcohol abuse is the most common cause of chronic pancreatitis in adults. It leads to persistent inflammation, fibrosis, and loss of both exocrine and endocrine pancreatic function. Classic findings include steatorrhea and pancreatic calcifications. I’m sure this was super easy for you, but just to hammer the point home as emphasized in lecture.", "src": "Monkey Intel", "lec": "Lec 54", "topic": "Small Intestine: Malabsorption"}, {"id": "qacea572d", "q": "Which of the following is important to restrict in the diet of a patient with hepatitis?", "opts": ["High-fiber vegetables", "Complex carbohydrates", "Raw or undercooked meat and dairy", "Plant-based proteins", "Cooked poultry and fish"], "ans": 2, "exp": "- Additionally, it is important for patients with hepatitis to avoid unwashed produce/sprouts.", "src": "Monkey Intel", "lec": "Lec 55", "topic": "Liver: Diet / Restriction in Liver Disease"}, {"id": "q347de754", "q": "A 35-year-old man presents with fatigue and pallor. Blood smear shows hypochromic, microcytic red cells. Genetic testing reveals a mutation in a gene responsible for the rate-limiting enzyme in heme biosynthesis. Which of the following steps is most directly impaired in this patient?", "opts": ["Insertion of iron into protoporphyrin IX", "Condensation of glycine and succinyl-CoA", "Cyclization of hydroxymethylbilane", "Oxidation of uroporphyrinogen III", "Reduction of biliverdin to bilirubin"], "ans": 1, "exp": "The rate-limiting step in heme biosynthesis is the condensation of glycine and succinyl-CoA to form δ-aminolevulinic acid (ALA), catalyzed by ALA synthase (ALAS). This occurs in the mitochondria and is tightly regulated.", "src": "Monkey Intel", "lec": "Lec 56", "topic": "Liver: Bilirubin Metabolism / Jaundice"}, {"id": "qae4587a2", "q": "A 6-year-old boy presents with painful swelling and redness of his face and hands after brief sun exposure. His parents report that the symptoms develop rapidly when he plays outdoors. Physical examination shows erythematous, tender lesions on sun-exposed skin. Laboratory studies reveal elevated levels of protoporphyrin in erythrocytes. An abdominal ultrasound shows pigmented gallstones. Which of the following enzyme deficiencies is most likely responsible for this patient’s condition?", "opts": ["ALA synthase", "Ferrochelatase", "Porphobilinogen deaminase", "Uroporphyrinogen III synthase", "Protoporphyrinogen oxidase"], "ans": 1, "exp": "Erythropoietic protoporphyria (EPP) is caused by a deficiency in ferrochelatase, the final enzyme in the heme biosynthetic pathway. Its deficiency leads to accumulation of protoporphyrin, which causes photosensitivity and the formation of pigmented gallstones due to excess protoporphyrin in the bile. This combination of skin findings and gallstone pigment helps distinguish EPP from other porphyrias.", "src": "Monkey Intel", "lec": "Lec 56", "topic": "Biliary: Cholelithiasis / Gallstones"}, {"id": "qbd9abcd2", "q": "A 28-year-old woman presents with painful blistering and scarring on sun-exposed areas of her skin. She also reports intermittent abdominal pain and has been experiencing mood changes and limb weakness. Urine is noted to be dark in color. Genetic testing confirms a mutation in the gene encoding protoporphyrinogen oxidase. Which of the following would most likely be elevated in this patient's urine?", "opts": ["Uroporphyrin I", "Porphobilinogen", "Protoporphyrin", "Coproporphyrin III", "Succinyl-CoA"], "ans": 3, "exp": "This patient has variegate porphyria (VP), caused by a mutation in the protoporphyrinogen oxidase (PPOX) gene. It presents with photosensitivity, neurovisceral symptoms (e.g., abdominal pain, psychiatric changes, weakness), and dark urine. Laboratory findings typically show elevated ALA, porphobilinogen (PBG), and coproporphyrin III in the urine, as well as elevated coproporphyrin III and protoporphyrin in stool. Please pay attention to if the question states urine vs stool.", "src": "Monkey Intel", "lec": "Lec 56", "topic": "Biliary: Congenital / Neonatal"}, {"id": "q75b506b", "q": "A 55-year-old man with a history of alcohol use disorder and chronic hepatitis C presents with new-onset skin fragility and blistering on the backs of his hands. His urine appears dark in color, and labs show elevated liver enzymes. Which of the following best explains the underlying condition?", "opts": ["Acute hepatic injury causing excess heme synthesis", "Inhibition of δ-aminolevulinate synthase by lead toxicity", "Deficiency of ferrochelatase leading to protoporphyrin accumulation", "Accumulation of porphobilinogen due to PBG deaminase deficiency", "Uroporphyrinogen decarboxylase deficiency with uroporphyrin buildup"], "ans": 4, "exp": "This patient likely has porphyria cutanea tarda (PCT), the most common porphyria. Risk factors include alcohol, hepatitis C, and iron overload. Symptoms include blistering of sun-exposed skin (especially the hands) and dark-colored urine due to uroporphyrin accumulation. The condition is caused by decreased activity of uroporphyrinogen decarboxylase (UROD).", "src": "Monkey Intel", "lec": "Lec 56", "topic": "Liver: Viral Hepatitis"}, {"id": "qa3b7cca2", "q": "A 6-year-old child is brought to the clinic due to recurrent blistering skin lesions on the face and hands after sun exposure. Physical examination reveals scarring and red-brown discoloration of the teeth. Under Wood’s lamp, the child’s teeth fluoresce a bright red. Which of the following is the most likely diagnosis?", "opts": ["Congenital erythropoietic porphyria", "Porphyria cutanea tarda", "Acute intermittent porphyria", "Erythropoietic protoporphyria", "Variegate porphyria"], "ans": 0, "exp": "Congenital erythropoietic porphyria (CEP) is caused by a defect in uroporphyrinogen III synthase, leading to accumulation of uroporphyrin I and coproporphyrin I. Classic findings include photosensitivity, scarring, reddish brown discoloration of the teeth, and erythrodontia (teeth that fluoresce red under Wood’s lamp). This rare autosomal recessive disorder is distinct in its presentation, especially the dental findings.", "src": "Monkey Intel", "lec": "Lec 56", "topic": "Porphyria: AIP"}, {"id": "qd748bad4", "q": "A 28-year-old Swedish woman presents with new-onset severe abdominal pain and confusion. She recently began a restrictive diet and has been taking herbal supplements. Her vitals are stable. In the middle of labs the doctor remembered that he had to take his MEP exam. He accidentally left her urine sample on a windowsill and it darkens to a reddish-purple color. What enzyme deficiency is most likely responsible for this patient’s condition?", "opts": ["Porphobilinogen deaminase", "Uroporphyrinogen decarboxylase", "ALA synthase", "Ferrochelatase", "Uroporphyrinogen III synthase"], "ans": 0, "exp": "This clinical scenario is classic for Acute Intermittent Porphyria (AIP), the most common acute hepatic porphyria, which is particularly prevalent in Sweden. It presents with abdominal pain, neuropsychiatric symptoms, and darkening of urine on sunlight exposure. The condition results from a deficiency in porphobilinogen deaminase, leading to accumulation of porphobilinogen and ALA. Note that porphobilinogen deaminase, hydroxymethylene synthase, and uroporphyrinogen 1 synthase all appear to be the same thing. Depending on which source the terms are used interchangeably. Additionally, the clinical context of sweden and urine changes in sunlight are not bolded on slides, but have been recurrent TQ’s for the last two years.", "src": "Monkey Intel", "lec": "Lec 56", "topic": "Liver: Viral Hepatitis"}, {"id": "q9abbb417", "q": "A 6-year-old boy is brought to the dermatologist for evaluation of painful, blistering skin lesions that occur shortly after playing outside in the sun. Family history reveals that his mother is asymptomatic, though genetic testing shows she is a carrier of an X-linked mutation. Laboratory studies show elevated protoporphyrin levels in erythrocytes and stool. Which of the following best describes the underlying cause of this patient’s condition?", "opts": ["Gain-of-function mutation in ALA synthase 2", "Loss-of-function mutation in ALA synthase 2", "Deficiency of porphobilinogen deaminase", "Inhibition of ALA dehydratase by lead", "Deficiency of uroporphyrinogen decarboxylase"], "ans": 0, "exp": "The question is describing a gain of function mutation, both males and female can present with severe disease but some females are asymptomatic. The diagnosis is typically made based on an increase of protoporphyrin in erythrocytes and stool. X-linked sideroblastic anemia is a loss of function mutation and is precipitated by lead poisoning.", "src": "Monkey Intel", "lec": "Lec 56", "topic": "Porphyria: PCT"}, {"id": "q96929fe4", "q": "Wail is a 3-year-old boy who presents to the clinic for evaluation of fatigue, abdominal pain, and irritability. His family recently moved into an older home undergoing renovation. Physical exam shows pallor. Laboratory workup reveals microcytic anemia, basophilic stippling on peripheral smear, and elevated blood lead levels. Which of the following laboratory findings is most likely present?", "opts": ["Elevated uroporphyrin in urine", "Decreased δ-aminolevulinic acid in plasma", "Elevated protoporphyrin and ALA in blood", "Increased porphobilinogen in urine", "Decreased erythrocyte protoporphyrin"], "ans": 2, "exp": "The question is related to a clinical scenario which the professor emphasized in lecture. Wail is a curious child and probably taste tested some of the lead paint that was used in his older house. Unfortunately, ALA dehydratase and ferrochelatase are inhibited with Wail’s new culinary excursion. This leads to an accumulation of protoporphyrin and ALA in blood. On the exam be on the lookout for batteries and ammunition exposure as these were also discussed. Look for demyelination symptoms like headaches, memory loss, and peripheral neuropathy.", "src": "Monkey Intel", "lec": "Lec 56", "topic": "Porphyria: EPP"}, {"id": "qd9c5401", "q": "Are you going to learn the heme pathway and each porphyria condition, or are you going to wing it?", "opts": ["No, winging it is fun", "Med School will kill me before the tetrapyrroles do", "I actually watched/studied this lecture", "I don’t see the sun so I’m not at risk", "My mid lecture nap was interrupted by king george"], "ans": 2, "exp": "", "src": "Monkey Intel", "lec": "Lec 56", "topic": "Porphyria: General / Heme Pathway"}, {"id": "q874d35ac", "q": "What is the primary objective of metabolism in the context of drug and toxin elimination?", "opts": ["To convert active drugs into more potent compounds", "To increase the lipophilicity of compounds for tissue storage", "To facilitate protein binding for prolonged circulation", "To increase the hydrophilicity of lipophilic compounds so they can be eliminated", "To maintain compounds in their active form for longer therapeutic effect"], "ans": 3, "exp": "- Also called Xenobiotics, which is important because if they are not metabolized, it can lead to harmful drug-drug interactions, toxicity, immunological response, and cancers.", "src": "Monkey Intel", "lec": "Lec 57", "topic": "Pharm: Cytochrome P450 / Drug Metabolism"}, {"id": "qaeb5921d", "q": "Which of the following best describes the first-pass effect in drug metabolism?", "opts": ["The process by which a drug is directly excreted in the urine without liver involvement", "The inactivation of a drug due to protein binding in the bloodstream", "The accumulation of a drug in adipose tissue due to its lipophilic nature", "The conversion of a prodrug into its active form in the gastrointestinal tract", "The partial or complete metabolism of a drug by the liver before it reaches systemic circulation"], "ans": 4, "exp": "- The liver is involved in a first pass metabolism, which works to metabolize orally administered substances.", "src": "Monkey Intel", "lec": "Lec 57", "topic": "Pharm: Cytochrome P450 / Drug Metabolism"}, {"id": "q522142ee", "q": "Which of the following best describes the mechanism of action of barbiturates?", "opts": ["Inhibition of dopamine reuptake in the mesolimbic pathway", "Competitive antagonism of NMDA receptors", "Enhancement of GABA receptor activity by increasing the duration of chloride channel opening", "Blockade of voltage-gated sodium channels in the central nervous system", "Selective serotonin reuptake inhibition at presynaptic terminals"], "ans": 2, "exp": "- The negative charge provided by the chloride anions makes the brain cells resistant to nerve impulses and thus depresses them. - It is recommended to prescribe Benzodiazepines over Barbiturates because they have a wider therapeutic index, develop tolerance more slowly, and are a lower liability for abuse. - Chronic use of barbiturates can upregulate microsomal enzymes.", "src": "Monkey Intel", "lec": "Lec 57", "topic": "Liver: Viral Hepatitis"}, {"id": "q8adcee8", "q": "Which of the following is the prosthetic group for cytochrome P450 enzymes?", "opts": ["Biotin", "FAD", "Pyridoxal phosphate", "Protoporphyrin", "Thiamine pyrophosphate"], "ans": 3, "exp": "- Protoporphyrin is the prosthetic group (cofactor) for CYP enzymes. There is an iron group bound to 4 nitrogens of the porphyrin ring systems, holding it on plane.", "src": "Monkey Intel", "lec": "Lec 57", "topic": "Pharm: Cytochrome P450 / Drug Metabolism"}, {"id": "qd70ac064", "q": "Which of the following is true regarding anal ﬁstulas:", "opts": ["Anal ﬁstulas rarely heal spontaneously and are treated almost exclusively by surgery.", "The ﬁstulous tract must be opened up along with the source of infection (usally a crypt)", "Both A and B."], "ans": 0, "src": "GI Club", "lec": "Lecture 26: Clinical Proctology\n\nQuestion 3:\n\nWhic", "exp": "Answer\nC", "topic": "Miscellaneous: Other"}, {"id": "q1cfadeb0", "q": "A 30 year old male with no previous medical history presents with abdominal cramps, fever, Tenesmus and diarrhea. He has had ﬁve loose watery stools today. He denies bloody stool. He ate some reheated rice about 6 hours before symptoms started. Which of the following infectious agents is most likely responsible?", "opts": ["Bacillus cereus", "Staphylococcus aureus", "Enterotoxigenic E. coli", "None of the above"], "ans": 0, "src": "GI Club", "lec": "Lecture 2: Infectious diarrhea\n\n\nQuestion 3\n\nA 30 ", "exp": "Answer\n\nA", "topic": "GI Infections: E. coli"}, {"id": "qfab00037", "q": "Droperidol is an antiemetic that blocks dopaminerigc receptors and inhibits the vomiting center. Which of the following is true regarding its use?", "opts": ["Use is limited to postoperative nausea/vomiting (PONV)", "can cause Extrapyramidal effects", "Can cause shortening of QT interval", "A and B only"], "ans": 3, "src": "GI Club", "lec": "Lecture 29-Antiemetic and prokinetic agents\n\nQuest", "exp": "Answer:\n\nD\n\n\nThe other answer choices:\nC) it causes QT prolongation not shortening", "topic": "Pharm: Antiemetics"}, {"id": "q4c763a82", "q": "What is the deﬁnition of Malabsorption?", "opts": ["impaired digestion of nutrients within the intestinal lumen", "impaired transport of nutrients across the apical membrane of enterocytes.", "None of the above"], "ans": 0, "src": "GI Club", "lec": "Lecture 30-Malabsorption syndromes\nQuestion 1:\nWha", "exp": "Answer:\n\nB", "topic": "Small Intestine: Malabsorption"}, {"id": "q48b6a89e", "q": "Which of the following patterns is associated with nutrient deﬁciencies in vegetarians?", "opts": ["Iron, zinc", "Iron, zinc, B-12, Calcium, vitamin D, Protein", "Iron, calcium, vitamin B-12, Vitamin D, Thiamine", "Calorie restricted <1200/day"], "ans": 0, "src": "GI Club", "lec": "Lecture 31-Nutrition in adults\nQuestion 2\n\nWhich o", "exp": "Answer:\n\nA\n\n\nThe other choices:\n     B) Vegan\n     C) Gastric bypass", "topic": "Stomach: Other"}, {"id": "qc82ebf08", "q": "A 25 year old male presents to the ER via ambulance after a ﬁght. There is a knife in his left ﬂank. He is alert and oriented. Temperature is 98.9, blood pressure 88/50, pulse 130, oxygen saturation 90 percent on room air. Physical exam shows no abnormalities. A point of care ultrasound shows no pelvic or intraperitoneal ﬂuid collections. Which of the following is the most appropriate next action?", "opts": ["Observation", "Insert two large bore IVs and start ﬂuids", "Stat blood transfusion", "Immediate exploratory laparotomy."], "ans": 3, "src": "GI Club", "lec": "Lecture 32: Acute abdominal trauma\nQuestion 3:\n\nA ", "exp": "Answer\nD\n\nSee slide 74- The patient with penetrating trauma is managed\nsimilarly to the patient with blunt trauma.\nHowever, patients who have penetrating injuries\nmore often require exploration, and the threshold\nto explore the kidney tends to be lower.", "topic": "Liver: Viral Hepatitis"}, {"id": "q4d3564af", "q": "An ERCP is performed to diagnose and treat cholecodolithiasis (bile duct stones). Because it is the most dangerous of all procedures done by gastroenterologists it is almost exclusively reserved for therapeutics not diagnostics. The diagnostic test done instead of ERCP is:", "opts": ["MRCP", "Colonoscopy", "EGD", "Capsule endoscopy"], "ans": 0, "src": "GI Club", "lec": "Lecture 33 & 34- Gastrointestinal endoscopy I & II", "exp": "Answer\n\nA", "topic": "Esophagus: Imaging / Endoscopy"}, {"id": "q03cffd60", "q": "Wireless capsule endoscopy best examines the small intestine beyond reach of standard endoscope and colonoscope (duodenum, jejunum, illium), but it has no therapeutic use and it is only used to diagnose problems with the small intestine.", "opts": ["True", "False"], "ans": 0, "src": "GI Club", "lec": "Lecture 33 & 34- Gastrointestinal endoscopy I & II", "exp": "Answer:\n\nA) True", "topic": "Esophagus: Imaging / Endoscopy"}, {"id": "q86f16adb", "q": "Patients with a VIP-producing tumor (VIPoma) usually present with voluminous diarrhea ( AKA: watery diarrhea hypokalemia achlorhydria (WDHA syndrome). VIP is a GI peptide hormone that functions to:", "opts": ["Promote release of bicarbonate", "Relaxes intestinal smooth muscle and the sphincter of Oddi", "None of the above"], "ans": 1, "src": "GI Club", "lec": "Lecture 36-Digestive Hormones\n\n\n\nQuestion 1\nPatien", "exp": "Answer\n\nB)\n\n\nThe other choices\nA) Secretin", "topic": "Pancreas: Endocrine Tumors"}, {"id": "qf3fc7e34", "q": "Insulin levels increase to higher levels when glucose is taken orally compared to IV (parenteral) nutrition due to", "opts": ["the action of GIP released from the K cells in the duodenum", "Guanylin- a polypeptide that is secreted by goblet cells", "A hormone produced by G cells in the stomach that are located mainly in the antrum region", "None of the above"], "ans": 0, "src": "GI Club", "lec": "Lecture 36-Digestive Hormones\n\n\n\nQuestion 2:\nInsul", "exp": "Answer:\n\nA", "topic": "Stomach: Physiology / Motility"}, {"id": "q4e2be5e2", "q": "In zollinger - Ellison syndrome, the secretin infusion test is performed for diagnosis. What is the expected result if patient does have the disease?", "opts": ["Histamine is increased", "Prostaglandin is decreased", "Profound rise in serum gastrin", "Profound decrease in serum gastrin"], "ans": 0, "src": "GI Club", "lec": "Lecture 37 & 38- Imaging of GI tract\n\nQuestion 3:\n", "exp": "Answer:\n\nC", "topic": "Stomach: Zollinger-Ellison / Gastrinoma"}, {"id": "q83339a5d", "q": "A 78-year-old man presents with a 15-pound weight loss over the past 6 months. He also reports difficulty chewing due to recent tooth loss and has been eating mainly soup and crackers. Which of the following is the most likely nutritional risk factor in this patient? A. Increased protein intake B. Enhanced smell perception C. Impaired chewing and swallowing D. Excess caloric intake A 62-year-old woman presents with red, swollen gums that bleed easily. Which of the following vitamin deficiencies is most likely responsible for her symptoms?", "opts": ["Vitamin A", "Vitamin C", "Niacin", "Riboflavin 3. Gut Microbiome and Diet A 35-year-old man is advised to improve his gut microbiota through dietary changes. Which of the following is most appropriate to recommend? A. Increased intake of red meat and saturated fats B. Regular consumption of yogurt and kimchi C. Gluten-free, low-fiber diet D. High-sugar, low-carb diet 4. Eosinophilic Esophagitis A 25-year-old male presents with dysphagia and food impaction. He is diagnosed with eosinophilic esophagitis. Which of the following is the first-line dietary intervention?", "Ketogenic diet", "Total parenteral nutrition", "Six-food elimination diet", "IgG-based food sensitivity testing"], "ans": 0, "src": "FLR 2025", "lec": "", "exp": "", "topic": "Esophagus: Motility / Achalasia"}, {"id": "qf4442716", "q": "1. A newborn presents with persistent jaundice. Labs show total bilirubin 25 mg/dL, mostly unconjugated. Phenobarbital has no effect. What is the most likely diagnosis? A. Gilbert syndrome B. Crigler-Najjar type I C. Rotor syndrome D. Dubin-Johnson syndrome E. Autoimmune hepatitis 2. A 23-year-old woman is diagnosed with Dubin-Johnson syndrome. Which histological finding supports this diagnosis? A. Ballooning degeneration B. Steatosis C. Black liver pigmentation D. Macrovesicular fat droplets E. Zone 3 necrosis 3. A 45-year-old man with CHF has RUQ tenderness and hepatomegaly. Liver biopsy shows congested sinusoids and necrosis around central veins. What is this pattern called? A. Centrilobular necrosis B. Bridging fibrosis C. Nutmeg liver D. Bile duct hyperplasia E. Pseudoinfarction 4. A liver biopsy reveals zone 3 hepatocyte necrosis in a patient with hypotension and sepsis. What is the most likely diagnosis?", "opts": ["Ischemic hepatitis", "Crigler-Najjar syndrome", "Hemochromatosis", "Gilbert syndrome", "Portal vein thrombosis 5. Which congenital disorder is characterized by conjugated hyperbilirubinemia and normal liver histology? A. Crigler-Najjar syndrome B. Dubin-Johnson syndrome C. Rotor syndrome D. Gilbert syndrome E. Hemochromatosis"], "ans": 0, "src": "FLR 2025", "lec": "", "exp": "CN type I is unresponsive to phenobarbital and causes severe UCB elevation.\n2. A 23-year-old woman is diagnosed with Dubin-Johnson syndrome. Which histological finding supports this diagnosis?\n A. Ballooning degeneration\n B. Steatosis\n C. Black liver pigmentation\n D. Macrovesicular fat droplets\n E. Zone 3 necrosis\nExplanation: DJS shows black liver from epinephrine metabolite accumulation.\n3. A 45-year-old man with CHF has RUQ tenderness and hepatomegaly. Liver biopsy shows congested sinusoids and necrosis around central veins. What is this pattern called?\n A. Centrilobular necrosis\n B. Bridging fibrosis\n C. Nutmeg liver\n D. Bile duct hyperplasia\n E. Pseudoinfarction\nExplanation: Nutmeg liver is seen in chronic passive congestion, often from right-sided heart failure.\n4. A liver biopsy reveals zone 3 hepatocyte necrosis in a patient with hypotension and sepsis. What is the most likely diagnosis?\nA. Ischemic hepatitis\nB. Crigler-Najjar syndrome\nC. Hemochromatosis\nD. Gilbert syndrome\nE. Portal vein thrombosis\nExplanation: Ischemic hepatitis affects the centrilobular (zone 3) region due to hypoperfusion.\n5. Which congenital disorder is characterized by conjugated hyperbilirubinemia and normal liver histology?\n A. Crigler-Najjar syndrome\n B. Dubin-Johnson syndrome\n C. Rotor syndrome\n D. Gilbert syndrome\n E. Hemochromatosis\nExplanation: Rotor syndrome causes conjugated hyperbilirubinemia without liver pigmentation or damage.", "topic": "Liver: Bilirubin Metabolism / Jaundice"}, {"id": "q3735b67d", "q": "Which of the following factors increases the risk for developing an abdominal aortic aneurysm?", "opts": ["Family history", "An age less than 50 years-old", "History of lung disease", "Female gender", "Living in the Northwest US"], "ans": 0, "src": "Inlet", "lec": "Lecture 34:\nAcute Abdomen II", "exp": "Answer: Family history", "topic": "Abdominal Trauma: General / AAA"}, {"id": "q8dc387db", "q": "Which of the following is the most common indication for performing an EGD (Esophagogastroduodenoscopy)?", "opts": ["Dysphagia", "GERD", "Celiac Disease", "H. Pylori", "Upper Abdominal Pain"], "ans": 1, "src": "Inlet", "lec": "Lecture 35 & 36:\nGastrointestinal\nEndoscopy I & II", "exp": "Answer: B. GERD\n\n\n\n  -   All of the answer options are indications for performing an EGD, but GERD is the most common!", "topic": "Esophagus: Barrett's / GERD"}, {"id": "q67d8016a", "q": "A patient presents to the GI clinic with complaints of difficulty eating. They are down 10 pounds in the last 3 months and cannot figure out what their issue is. They deny any bleeding, lightheadedness, or vomiting. Their GI performs an EGD to visualize what issues might be occurring. Which of the following is NOT able to be seen on EGD?", "opts": ["Achalasia", "Schatzki Rings", "GERD", "Adenocarcinoma", "Eosinophilic Esophagitis"], "ans": 0, "src": "Inlet", "lec": "Lecture 35 & 36:\nGastrointestinal\nEndoscopy I & II", "exp": "Answer: A. Achalasia\n\n\n\n  -   It was emphasized in lecture that Achalasia is not able to be seen on EGD. This would be done by a Barium Study,\n      since achalasia is a motility disorder.", "topic": "Esophagus: Barrett's / GERD"}, {"id": "q68c3a653", "q": "A 72 year old male is en route to the emergency department at midnight with complaints of pain on swallowing and feeling like “something is stuck in his throat.” You, as the GI specialist, are woken up to tend to this patient. What is at the top of your differential?", "opts": ["H. Pylori Infection", "Esophageal Varices", "Adenocarcinoma of the Esophagus", "Mallory-Weiss Tear", "Dysphagia/Meat Impaction"], "ans": 4, "src": "Inlet", "lec": "Lecture 35 & 36:\nGastrointestinal\nEndoscopy I & II", "exp": "Answer: E. Dysphagia/Meat Impaction\n\n\n\n  -   This seemed somewhat important in lecture, but I would be surprised to see it on exam. It is important because\n      dysphagia/food impaction is a very common complaint when a patient claims to have something stuck in their throat.", "topic": "Esophagus: Varices"}, {"id": "qdf4f62f6", "q": "A patient presents to the emergency department with complaints of hematemesis. They have also feel dizzy, and have had two episodes of syncope in the last 6 hours. Blood pressure is 90/64, Heart rate is 100 beats per minute, and Respiratory rate is 20 breaths per minute. They have a history of HTN, Esophageal Varices, and Parkinson’s. Which of the following is the most important first step in treating this patient?", "opts": ["Band the varices to stop future bleeding", "Perform endoscopy to visualize the source of the bleed", "Volume resuscitation", "Acid suppression", "Administer oral midodrine to prevent orthostatic hypotension"], "ans": 2, "src": "Inlet", "lec": "Lecture 35 & 36:\nGastrointestinal\nEndoscopy I & II", "exp": "Answer: C. Volume resuscitation\n\n\n\n  -   The most important first step in treating this patient is to stabilize them with fluids, etc. in order to correct their blood\n      volumes. The next step would be acid suppression, because at a higher pH (more basic), the bleeds have the ability\n      to clot by themselves. Next would be to perform endoscopy to see where the bleeding is coming from.\n  -   Remember: the most important cause of a big lower GI bleed is an upper GI bleed moving fast!", "topic": "Esophagus: Varices"}, {"id": "q952f183d", "q": "Which of the following imaging modalities allows for esophageal, gastric, and pancreatic cancer staging, as well as imaging of gastrointestinal stromal tumors (GIST)? It also allows visualization and operation on pancreatic cystic neoplasms.", "opts": ["EGD", "EUS", "Wireless Capsule Endoscopy (WCE)", "Colonoscopy", "ERCP"], "ans": 1, "src": "Inlet", "lec": "Lecture 35 & 36:\nGastrointestinal\nEndoscopy I & II", "exp": "Answer: B. EUS\n\n\n\n  -   All of the things listed in the question are actions of the EUS (Endoscopic Ultrasound). EUS allows the GI to look at\n      pathology outside of the gastric lumen. Biopsies can be done through the gastric wall to obtain tissues from\n      adjacent/submucosal structures!\n  -   It is important to note that EGD and EUS are diagnostic and therapeutic, while WCE is only diagnostic.\n      Additionally, ERCP is almost exclusively therapeutic!", "topic": "Esophagus: Imaging / Endoscopy"}, {"id": "q433cd0e7", "q": "Which of the following is the most feared complication of performing an ERCP?", "opts": ["Duodenal perforation", "Bleeding after sphincterotomy", "Nonfatal pancreatitis", "Anesthesia complications", "Esophageal perforation"], "ans": 2, "src": "Inlet", "lec": "Lecture 35 & 36:\nGastrointestinal\nEndoscopy I & II", "exp": "Answer: C. Nonfatal pancreatitis\n\n\n\n  -   All (except maybe E) are complications of ERCP, but nonfatal pancreatitis is the most worrisome for GI specialists.", "topic": "Esophagus: Other"}, {"id": "q21d2b444", "q": "Which of the following patients should receive a colonoscopy?", "opts": ["90 year old male with no comorbidities", "35 year old female with an aunt who was diagnosed with colon cancer at 60", "45 year old male with HTN and T2DM", "75 year old male with stage 3 lung cancer", "50 year old female with no risk for colon cancer and who does not want one"], "ans": 2, "src": "Inlet", "lec": "Lecture 35 & 36:\nGastrointestinal\nEndoscopy I & II", "exp": "Answer: C. 45 year old male with HTN and T2DM\n\n\n\n  -   45 is the age that everyone should start getting colonoscopies. The 35 year old with a relative who passed from\n      colon cancer should start at 40, OR at 10 years before the relative was diagnosed with it (in this case it would be 50,\n      but then you would just start at 40..). The 90 year old, just let em be. And for the 50 year old, a colonoscopy would be\n      ideal, but without any risks you could do an annual FIT.", "topic": "Colorectal: Colonoscopy / Procedures"}, {"id": "q57deb94d", "q": "Which of the following is the most common cause of painless hematochezia in an unstable patient?", "opts": ["Diverticulosis", "Arteriovenous malformations (AVMs)", "Internal hemorrhoids", "Diverticulitis", "Ischemic colitis"], "ans": 0, "src": "Inlet", "lec": "Lecture 35 & 36:\nGastrointestinal\nEndoscopy I & II", "exp": "Answer: A. Diverticulosis\n\n\n\n  -   Diverticulosis = Bleeding; Diverticulitis = No bleeding (Infection)\n  -   AVMs would be the second most common cause\n  -   Hemorrhoids would not cause a patient to be unstable\n  -   Ischemic colitis would cause a patient to be painful and unstable", "topic": "Colorectal: Diverticular Disease"}, {"id": "q9522af59", "q": "A 84 year old male presents to the GI clinic with complaints of blood in his stool intermittently for the last 4 weeks. He denies any pain associated with it, and has not other alarming complaints. You suspect diverticular hemorrhage, and think about the next steps to care for this patient. What would you do to help this gentleman?", "opts": ["Schedule an outpatient colonoscopy to evaluate the source of bleeding", "Order a CT angiography of the abdomen and pelvis", "Refer for capsule endoscopy to evaluate the small bowel", "Admit to the hospital for urgent colonoscopy and blood transfusion", "Continue to evaluate the patient and see if the bleeding will stop on its own"], "ans": 4, "src": "Inlet", "lec": "Lecture 35 & 36:\nGastrointestinal\nEndoscopy I & II", "exp": "Answer: E. Continue to evaluate the patient and see if the bleeding will stop on its own\n\n\n\n  -   In lecture it was stated that 80% of diverticular hemorrhages will stop on their own. A colonoscopy will not be super\n      effective, because of the shear number of diverticula that could be present in a patient with this issue.", "topic": "Esophagus: Imaging / Endoscopy"}, {"id": "q92e456cf", "q": "Which of the following Splenic Injuries involves a major parenchymal fracture or laceration? This type may also involve a through and through gunshot or stab wound.", "opts": ["Type I", "Type II", "Type III", "Type IV", "Type V"], "ans": 2, "src": "Inlet", "lec": "Lecture 37:\nAbdominal Trauma", "exp": "Answer: C. Type III\n\n  -   Type I: Capsular tear or minor parenchymal laceration\n  -   Type II: Capsular avulsion with minor parenchymal injury\n  -   Type IV: Severe parenchymal stellate fracture, crush or bisection, or hilar injury\n  -   Type V: Shattered spleen in the patient with multiple injuries", "topic": "Abdominal Trauma: Spleen"}, {"id": "q29be2674", "q": "A patient presents to the emergency department after being involved in an automobile accident. They present with diffuse ecchymosis over the abdomen, LUQ pain, and severe hypotension. They are alert and slightly oriented, and they tell you that they are experiencing a specific type of symptoms. You hear this and look at the attending with a smile, because this sounds a lot like Kehr’s Sign, which is something you learned in medical school and never thought to see it. What is this sign? (Don't worry the patient is fine, you repaired the spleen and did not remove it).", "opts": ["Shoulder pain secondary to diaphragmatic irritation", "Fixed dullness with or without a palpable mass", "RUQ pain that is experienced in the R shoulder", "Bilateral pitting edema with bluish hues over the legs", "Reflex tachycardia through the carotid body sensing low blood pressure"], "ans": 0, "src": "Inlet", "lec": "Lecture 37:\nAbdominal Trauma", "exp": "Answer: A. Shoulder pain secondary to diaphragmatic irritation\n\n\n\n  -   Option B describes Ballance’s Sign, which is something that was said to never have been seen in clinic. All other\n      options are not involved with this exam.", "topic": "Liver: Viral Hepatitis"}, {"id": "q1c923d0e", "q": "What is one of the main reasons why repairing a broken spleen is preferred over removing the spleen altogether (particularly in children)?", "opts": ["Blood loss is too great when the spleen is removed", "There is risk for air in the peritoneum with splenectomy", "Splenectomy is too difficult for general surgeons", "The spleen is not completely developed in children", "Risk for overwhelming sepsis from encapsulated bacteria"], "ans": 4, "src": "Inlet", "lec": "Lecture 37:\nAbdominal Trauma", "exp": "Answer: E. Risk for overwhelming sepsis from encapsulated bacteria\n\n\n\n  -   Whereas other answer choices may be correct, E is the most correct. Removing the spleen opens up room for\n      infection, which is the reason why repairing the spleen is preferred.\n  -   Side Note: Splenic Repair is possible for most Type I-III injuries", "topic": "Abdominal Trauma: Spleen"}, {"id": "qa6980cec", "q": "A patient presents to the emergency department after being involved in a kitchen explosion at the local Chili’s. He was frying the infamous mozzarella sticks, when suddenly the fryer caught fire and blew up. He is rushed to the OR and opened up, where the surgeon sees that 30% of his liver is covered in hematoma, and there is a laceration that measures about 8cm and is just under 3cm in depth. If the surgeon were to call his surgeon buddies and describe this liver injury, which type would he use?", "opts": ["Type I", "Type II", "Type III", "Type IV", "Type V", "Type VI"], "ans": 1, "src": "Inlet", "lec": "Lecture 37:\nAbdominal Trauma", "exp": "Answer: B. Type II\n\n\n\n  -   Type I (Hematoma): Subcapsular, < 10% surface area laceration. Capsular tear, < 1cm in depth\n  -   Type II (Hematoma): Subcapsular, 10-50% surface area. Intraparenchymal, < 10cm diameter laceration. 1-3cm\n      parenchymal depth, < 10cm length.\n  -   Type III (Hematoma): Subcapsular, > 50% surface area or expanding. Ruptured subcapsular or parenchymal\n      hematoma. Intraparenchymal hematoma > 10cm or expanding. Laceration > 3cm in depth.\n  -   Type IV (Laceration): Parenchymal disruption involving 25-75% of hepatic lobe or 1-3 coinaud’s segments in a single\n      lobe.\n  -   Type V (Laceration): Parenchymal distribution involving > 75% of hepatic lobe with > 3 Coinaud’s segments within a\n      single vascular lobe. Juxtahepatic venous injuries (retrohepatic vena cava/central major hepatic veins)\n  -   Type VI (Vascular): Hepatic avulsion", "topic": "Liver: Other"}, {"id": "q8d22bf50", "q": "Troy Aprilweather is a low-level boxer who is just trying to make a name for himself. Unable to read, he put his name in a raffle to fight the best boxer in the world. On a positive note, if he wins, he will make a fortune and be able to retire at 25! Just a few seconds into the fight, Troy is punched in the side and the fight is called off. And good thing, because the punch actually avulsed his renal artery. Troy was rushed to the hospital and his artery was fixed. He lives to see another day. Which of the following Grades of Kidney injuries did Troy endure?", "opts": ["Grade I", "Grade II", "Grade III", "Grade IV", "Grade V"], "ans": 4, "src": "Inlet", "lec": "Lecture 37:\nAbdominal Trauma", "exp": "Answer: E. Grade V\n\n\n\n  -   Grade I: Trauma showing microscopic or gross hematuria. A contusion or a contained subcapsular hematoma is\n      present. No parenchymal laceration.\n  -   Grade II: Non-expanding, confined perirenal hematoma or cortical laceration that is < 1cm deep. No urinary\n      extravasation.\n  -   Grade III: Laceration of the parenchyma that extends < 1cm into the cortex. No urinary extravasation.\n  -   Grade IV:\n        -    Laceration of the parenchyma that extends through the corticomedullary junction and into the collecting\n             system. Laceration of a segmental vessel may also occur.\n        -    Thrombosis of a segmental renal artery. No laceration of the parenchyma, but there is ischemia of the\n             corresponding parenchyma.\n  -   Grade V:\n        -    Thrombosis of the main artery of the kidney. Intimal tear and distal thrombosis seen in the inset.\n        -    Kidney is shattered because of multiple lacerations.\n        -    Avulsion of the main artery or vein of the kidney.", "topic": "Miscellaneous: Other"}, {"id": "q5b64df4d", "q": "Which of the following determines the need for surgical intervention in renal trauma?", "opts": ["The number of kidneys affected", "The depth of laceration", "Open wound over the kidney", "The patient asks for surgery", "CT scan is clear but the patient is still complaining"], "ans": 1, "src": "Inlet", "lec": "Lecture 37:\nAbdominal Trauma", "exp": "Answer: B. The depth of laceration\n\n\n\n  -   Another slide in lecture that said this and this alone, so why not know it.", "topic": "Miscellaneous: STI / Anorectal Infections"}, {"id": "qa5edbfb1", "q": "Which of the following is a cause of Diverticulitis (more than one may be correct)?", "opts": ["Obesity", "Western Diets (high fat, low fiber)", "Constipation", "Age younger than 50", "Alcohol and Smoking"], "ans": 0, "src": "Inlet", "lec": "Lecture 38:\nAbdominal Pain", "exp": "Answer: A/B/C/E\n\n\n\n  -   All but D are true. Diverticulitis is typically seen in patient over 50, and is more common in females.\n  -   It is the third most common GI illness that requires hospitalization and the leading indication for elective colon\n      resection.\n  -   Other risk factors of note are comorbid conditions like Ehlers-Danlos, Marfan’s, Scleroderma, Williams-Beuren,\n      and HIV.", "topic": "Colorectal: Diverticular Disease"}, {"id": "q67cdb7c1", "q": "Where is pain most common in a patient with Diverticulitis?", "opts": ["RUQ", "LUQ", "RLQ", "LLQ", "Periumbilical Area"], "ans": 3, "src": "Inlet", "lec": "Lecture 38:\nAbdominal Pain", "exp": "Answer: D. LLQ\n\n\n\n  -   Pain is most commonly felt in the LLQ. Other symptoms of Diverticulitis include: Nausea, vomiting, constipation or\n      obstipation, fever, flatulence, and bloating.", "topic": "Colorectal: Diverticular Disease"}, {"id": "q7bb9c50f", "q": "Which of the following is NOT one of the tests most ideal for the workup of Diverticulitis?", "opts": ["CBC", "Cultures", "CMP", "U/A", "BMP", "HCG"], "ans": 4, "src": "Inlet", "lec": "Lecture 38:\nAbdominal Pain", "exp": "Answer: E. BMP\n\n\n\n  -   The 5 most important/basic tests to perform are CBC, HCG, U/A, Cultures, and CMP!", "topic": "Colorectal: Diverticular Disease"}, {"id": "q5b56ddaa", "q": "Which of the following stages of the Modified Hinchey Classification is characterized by a complicated, pericolic abscess in proximity to the primary site of diverticulitis?", "opts": ["Stage 0", "Stage Ia", "Stage Ib", "Stage II", "Stage III", "Stage IV"], "ans": 2, "src": "Inlet", "lec": "Lecture 38:\nAbdominal Pain", "exp": "Answer: C. Stage Ib\n\n\n\n  -   Stage 0: Clinically mild, with colonic wall thickening on CT.\n  -   Stage Ia: Colonic wall thickening with inflammatory reaction in the pericolic fat.\n  -   Stage II: Intra-abdominal abscess distant from the primary inflammatory process; pelvic or retroperitoneal abscess.\n  -   Stage III: Generalized purulent peritonitis.\n  -   Stage IV: Generalized fecal peritonitis.\n  -   Look at lecture for treatments! Stage III and IV are indications for surgery.", "topic": "Colorectal: Diverticular Disease"}, {"id": "q2bd7e068", "q": "Which of the following drugs is/are NOT recommended for a patient with diverticulitis?", "opts": ["NSAIDs and Corticosteroids", "Morphine", "Acetaminophen", "Meperidine", "Dicyclomine"], "ans": 0, "src": "Inlet", "lec": "Lecture 38:\nAbdominal Pain", "exp": "Answer: A. NSAIDs and Corticosteroids\n\n\n\n  -   These two medications are contraindicated due to the possibility of colonic perforation.\n  -   Morphine is preferred.", "topic": "Stomach: PUD / H. pylori"}, {"id": "q4f5614a0", "q": "Which of the following is the most common complication of diverticulitis?", "opts": ["Perforation", "Bleeding", "Abscess", "Obstruction", "Bloating"], "ans": 3, "src": "Inlet", "lec": "Lecture 38:\nAbdominal Pain", "exp": "Answer: D. Obstruction\n\n\n\n  -   Per lecture, this is the most common complication, followed by perforation and abscess.", "topic": "Colorectal: Diverticular Disease"}, {"id": "q8739d34c", "q": "Using the Minor Pathway of alcohol metabolism, which of the following enzymes is responsible for the conversion of Ethanol to Acetaldehyde?", "opts": ["Acetaldehyde Dehydrogenase", "Alcohol Dehydrogenase", "Lactate Dehydrogenase", "CYP2D6", "CYP4502E1"], "ans": 4, "src": "Inlet", "lec": "Lecture 39:\nChronic Liver Disease I:\n  Alcohol and", "exp": "Answer: E. CYP4502E1\n\n\n\n  -   Alcohol DH and Acetaldehyde DH are responsible for the conversion of Ethanol to Acetaldehyde and Acetaldehyde\n      to Acetate, respectively. These enzymes are involved in the Major pathway, not the Minor.\n  -   The Minor pathway is commonly seen in patients who chronically ingest alcohol, or partake in binge drinking.", "topic": "Liver: Alcoholic Liver Disease"}, {"id": "qc4f05f42", "q": "A patient presents to the primary care office for routine checkup. She arrives wearing sunglasses inside, and has no complaints at the visit. Upon physical exam, the physician notices an enlarged liver at the right costal margin. When asked about her history, the patient explains that this past weekend she had a wedding for her niece, and it was a lot of fun. “Maybe too much fun,” the physician whispered under her breath. Bloodwork was drawn and sent off to be examined. Which of the following would you expect to see on this patients bloodwork?", "opts": ["LFT showing ALT > AST", "BGL reading 150 mg/dL", "LDL > 200 mg/dL", "Cr = 1.2", "LFT showing AST > ALT"], "ans": 4, "src": "Inlet", "lec": "Lecture 39:\nChronic Liver Disease I:\n  Alcohol and", "exp": "Answer: E. LFT showing AST > ALT\n\n\n\n  -   This patient is experiencing acute alcohol induced fatty liver disease, as shown by the hepatomegaly on PE, as well\n      as the history of binge drinking the previous weekend. Labs would show AST > ALT, which is indicative of alcohol\n      induced fatty liver. If it were to be non-alcohol induced, you would expect to see ALT > AST.", "topic": "Liver: Other"}, {"id": "qaea5f892", "q": "A 60 year old male arrives to the emergency department by his own vehicle, presenting with yellowing of his extremities as well as his eyes. PE shows ascites and peripheral edema, as well as crackles in the lungs. He is hypoglycemic on arrival. He states that he drinks 8 beers per day after getting off the job site. PMHx is significant of being a 40 pack a day smoker. Labs are significant for microcytic anemia, increased ammonia, hypoalbuminemia, and elevated AST. Additionally, labwork reveals thrombocytopenia. What other lab findings would you expect to see in this patient?", "opts": ["Leukocytosis", "Hypernatremia", "Elevated PT/INR", "Decreased bilirubin", "Decreased alkaline phosphatase"], "ans": 2, "src": "Inlet", "lec": "Lecture 39:\nChronic Liver Disease I:\n  Alcohol and", "exp": "Answer: C. Elevated PT/INR\n\n\n\n  -   Two major lab values to know (per lecture) are Low Platelets and Increased PT/INR. The increased PT/INR comes\n      from the inability of the liver to make vitamin K dependent clotting factors, which would increase the time needed for\n      blood to clot. On the other hand, Platelets would be low due to portal hypertension and hypersplenism, which would\n      reduce the body’s ability to recycle platelets.", "topic": "Small Intestine: Absorption / Nutrients"}, {"id": "qf222085d", "q": "Which of the following is NOT true of MASH (Metabolic Dysfunction Associated Steato Hepatitis)?", "opts": ["It is the point of irreversibility", "It is the aggressive form of MASLD", "20% of the people with MASLD will progress to MASH", "MASH can progress to cirrhosis", "Routine ultrasound, CT, or MRI shows fat on the liver"], "ans": 0, "src": "Inlet", "lec": "Lecture 39:\nChronic Liver Disease I:\n  Alcohol and", "exp": "Answer: A. It is the point of irreversibility\n\n\n\n  -    MASH is described as the point of reversibility!\n  -    All other answer options are true of MASH. Of note: Routine US, CT, or MRI does NOT show inflammation or fibrosis,\n       just fat.", "topic": "Liver: Cirrhosis & Complications"}, {"id": "qfc55fc65", "q": "Which of the following is the leading cause of mortality in patients with MASH?", "opts": ["Respiratory failure", "Liver failure", "Pulmonary Embolism", "Cardiovascular Disease", "Pancreatitis"], "ans": 3, "src": "Inlet", "lec": "Lecture 39:\nChronic Liver Disease I:\n  Alcohol and", "exp": "Answer: D. Cardiovascular Disease", "topic": "Liver: Liver Failure / Transplant"}, {"id": "qf21ce4db", "q": "A 40 year old woman presents to the clinic for her annual checkup. She complaints of widespread pain in her joints, rated as a 4 out of 10. The pain stays constant throughout the day, and gets a little better though the use of NSAIDs. You draw up lab work, which shows a marked elevation in Alkaline Phosphatase (ALP). You refer her to Rheumatology for further workup. Which of the following is correct regarding the pathophysiology of this disease?", "opts": ["Autoantibody-mediated destruction of pancreatic islet cells", "Deposition of monosodium urate crystals in synovial fluid", "Immune complex deposition in glomerular basement membrane", "Overproduction of pro-inflammatory cytokines by adipocytes", "T-lymphocyte attack on intrahepatic bile ducts"], "ans": 4, "src": "Inlet", "lec": "Lecture 40:\nChronic Liver Disease II:\n    The Hit ", "exp": "Answer: E. T-lymphocyte attack on intrahepatic bile ducts\n\n\n\n  -   The patient in question would be diagnosed with Primary Biliary Cirrhosis/Cholangitis (PBC), which involves the\n      described pathophysiology. It is more common in caucasian women ages 30-65, and is typically asymptomatic. It is\n      classically associated with other autoimmune diseases like Sjogren’s, CREST, and Rheumatoid Arthritis.\n  -   Lab work would show elevated ALP.\n  -   Diagnosis involves Antimitochondrial Antibodies (AMA).\n  -   Histology shows onion skinning.\n  -   Lecture described this as a “good disease to have.”", "topic": "Stomach: PUD / H. pylori"}, {"id": "qc08dee0f", "q": "Which of the following is the most common single gene inherited disorder in the white US population?", "opts": ["Autoimmune Hepatitis (AIH)", "Primary Biliary Cirrhosis (PBC)", "Hereditary Hemochromatosis (HHC)", "Alpha-1 Antitrypsin Disease (A1AT)", "Wilson’s Disease (WD)"], "ans": 2, "src": "Inlet", "lec": "Lecture 40:\nChronic Liver Disease II:\n    The Hit ", "exp": "Answer: C. Hereditary Hemochromatosis (HHC)\n\n\n\n  -   HHC has two classic mutations: C282Y and H63D.\n  -   It involves an increase in iron absorption over decades. Interestingly enough, women will present later than men,\n      most likely due to the years of menstruation.\n  -   Excess iron can be deposited everywhere (liver, skin, pancreas, joints, pituitary, heart)\n  -   Treatment is phlebotomy once or twice per week. Prognosis is excellent. IF PATIENT HAS CIRRHOSIS: Phlebotomy\n      is not reversible. Enormous risk for hepatocellular carcinoma.", "topic": "Liver: Cirrhosis & Complications"}, {"id": "qb9f4cfd9", "q": "Which disease is involves normal copper absorption but decreased biliary excretion?", "opts": ["Autoimmune Hepatitis (AIH)", "Primary Biliary Cirrhosis (PBC)", "Primary Sclerosing Cholangitis (PSC)", "Alpha-1 Antitrypsin Disease (A1AT)", "Wilson’s Disease (WD)"], "ans": 4, "src": "Inlet", "lec": "Lecture 40:\nChronic Liver Disease II:\n    The Hit ", "exp": "Answer: E. Wilson’s Disease\n\n\n\n  -   WD involves normal copper absorption but decreased biliary excretion. This leads to more copper absorbed in the\n      blood, as well as elevated urinary excretion of copper.\n  -   Ceruloplasmin is the copper transport protein, and is decreased as a result of decreased biliary excretion/increased\n      blood absorption. (Basically more copper is bound to the carrier so there is less of it in the blood).\n  -   Clinically, patients may present with Kayser-Fleischer Rings, which appear as copper deposits around the peripheral\n      cornea.\n  -   Clinical Pearls:\n         -   Young person presenting with acute and severe liver dysfunction and hemolytic anemia.\n         -   Young person presenting with unexplained parkinsonism.\n  -   WD is rare but important cause of acute liver failure requiring liver transplant in children/adolescents.\n  -   Gold standard for diagnosis is Liver Biopsy for copper quantification.\n  -   Decoppering medications: Penicillamine and Trientine. Inhibit Copper absorption: Zinc.", "topic": "IBD: IBD + PSC"}, {"id": "qef518d67", "q": "Primary Sclerosing Cholangitis (PSC) is predominantly found in men, and is frequently associated with Inflammatory Bowel Disease (IBD). It can be diagnosed with ERCP/MRCP, showing bile duct beading or a “chain of lakes.” Which of the following involves the pathophysiology of PSC?", "opts": ["Immune-mediated destruction of intrahepatic bile canaliculi", "Accumulation of copper in periportal hepatocytes", "T-cell mediated attack on macrohepatic bile ducts", "Autoimmune destruction of hepatocytes with interface hepatitis", "Ischemic injury to hepatic sinusoids following vascular thrombosis"], "ans": 2, "src": "Inlet", "lec": "Lecture 40:\nChronic Liver Disease II:\n    The Hit ", "exp": "Answer: C. T-Cell mediated attack on macrohepatic bile ducts", "topic": "IBD: IBD + PSC"}, {"id": "q2f5b657a", "q": "Which of the following is a bulk-forming, synthetic laxative that is used for constipation and is safe in pregnancy?", "opts": ["Psyllium", "Polycarbophil", "Methylcellulose", "Wheat Dextrin", "Polyethylene Glycol"], "ans": 1, "src": "Inlet", "lec": "Lecture 41:\n    Laxative and\nAntidiarrheal Agents", "exp": "Answer: B. Polycarbophil\n\n\n\n  -   Options A/C/D are all natural plant products. Option E is a salt-free osmotic laxative.\n  -   Contraindications include: Opioid-induced constipation, Fluid-restricted patients, Difficulty swallowing, and Risk of\n      fecal impaction.", "topic": "Pharm: Antidiarrheals / Laxatives"}, {"id": "q09d33103", "q": "Which of the following medications decreased the absorption of fat soluble vitamins (Vitamin ADEK)?", "opts": ["Lactulose", "Polyethylene glycol", "Docusate sodium", "Mineral oil", "Senna"], "ans": 3, "src": "Inlet", "lec": "Lecture 41:\n    Laxative and\nAntidiarrheal Agents", "exp": "Answer: D. Mineral Oil\n\n\n\n  -   Mineral oil is not to be taken along with fat soluble vitamins! Another CI in patients at risk for aspiration pneumonia\n      (bedridden patients).", "topic": "Pharm: Antidiarrheals / Laxatives"}, {"id": "q6569f59a", "q": "A patient presents to the emergency department with hepatic encephalopathy. Which of the following would be indicated for treatment?", "opts": ["Lactulose", "Polyethylene glycol", "Docusate sodium", "Mineral oil", "Senna"], "ans": 0, "src": "Inlet", "lec": "Lecture 41:\n    Laxative and\nAntidiarrheal Agents", "exp": "Answer: A. Lactulose\n\n\n\n\n  -   Lactulose is a synthetic disaccharide that enhances NH3 diffusion from the blood into the gut. It creates an osmotic\n      effect in the colon, causing digestion and promoting peristalsis.\n  -   Along with use in hepatic encephalopathy, it can be used to treat constipation.", "topic": "Colorectal: Other"}, {"id": "q4486ca4a", "q": "Bisacodyl and Anthraquinone derivatives are of the stimulant/irritant laxative class, which happens to be the most abused class of laxatives. Overuse can lead to which two of the following issues?", "opts": ["Cathartic colon", "Galactosemia", "Mechanical bowel obstruction", "Nephrotoxicity", "Melanosis coli"], "ans": 0, "src": "Inlet", "lec": "Lecture 41:\n    Laxative and\nAntidiarrheal Agents", "exp": "Answer: A and E\n\n\n\n  -   Bisacodyl and Anthraquinone derivatives can lead to cathartic colon and melanosis coli.\n  -   Galactosemia and mechanical bowel obstruction is seen in Lactitol.\n  -   Nephrotoxicity is seen in the Salt-containing laxatives like Milk of Magnesia (and other Mg/Na containing salts).", "topic": "Colorectal: Obstruction / Volvulus"}, {"id": "qae11face", "q": "Which of the following is true of Plecanatide?", "opts": ["Adverse effects include constipation", "Stimulates the adenylate cyclase-C receptors in the intestine", "Therapeutic uses include opioid induced constipation", "Has a higher affinity to its receptor than Linaclotide", "Risk of serious dehydration in elderly patients"], "ans": 3, "src": "Inlet", "lec": "Lecture 41:\n    Laxative and\nAntidiarrheal Agents", "exp": "Answer: D. Has a higher affinity to its receptor than Linaclotide\n\n\n\n  -    Adverse effects include diarrhea\n  -    Stimulates the guanylate cyclase-C receptors in the intestine\n  -    Therapeutic uses include chronic idiopathic constipation\n  -    Risk of serious dehydration in pediatric patients", "topic": "Pharm: Antidiarrheals / Laxatives"}, {"id": "q41cb9582", "q": "Cassandra is a 30 year old CEO who unfortunately has IBS-C. The stress of her daily life and career has led her to having this condition. Additionally, she has not had a bowel movement in the last three weeks, and it starting to get worried. Which of the following medications would be best to treat Cassandra?", "opts": ["Lactulose", "Senna", "Lubiprostone", "Loperamide", "Linaclotide"], "ans": 2, "src": "Inlet", "lec": "Lecture 41:\n    Laxative and\nAntidiarrheal Agents", "exp": "Answer: C. Lubiprostone\n\n\n\n  -   Lubiprostone is best used for IBS-C with constipation, Chronic Idiopathic Constipation, and Opioid Induced\n      Constipation. It works by stimulating the intestinal CIC-2 chloride channels in the apical membrane of intestinal cells.", "topic": "Liver: Viral Hepatitis"}, {"id": "qb7c621c1", "q": "A patient presents to the clinic complaining of 3 days of watery and voluminous diarrhea. They deny any changes to their medications, but they claim to have just gotten back from a trip to India, where they ate food off the streets. They wish to receive a medication that treats their diarrhea, and you immediately think of a certain opioid antagonist. Which medication are you thinking of?", "opts": ["Eluxadoline", "Loperamide", "Difenoxin", "Lubiprostone", "Diphenoxylate"], "ans": 1, "src": "Inlet", "lec": "Lecture 41:\n    Laxative and\nAntidiarrheal Agents", "exp": "Answer: B. Loperamide\n\n\n\n  -   The patient is presenting with Traveler’s Diarrhea, which is best treated with nonprescription Loperamide. This drug\n      can also treat Acute and Chronic Diarrhea, as well as Chemotherapy-Induced Diarrhea.\n  -   It is cautioned to not use this medication for longer than 48 hours without medical evaluation.", "topic": "GI Infections: Bacterial (Non-E.coli)"}, {"id": "qcded1353", "q": "A patient found unconscious by their wife in the living room. EMS arrives on scene and administers intranasal naloxone, which reverses the effects of the medications this patient was taking. The wife thought it was weird that her husband found himself in this situation, because his only issue is diarrhea that “seemingly never ends.” Which medication could this poor fella have been taking?", "opts": ["Difenoxin", "Loperamide", "Eluxadoline", "Diphenoxylate", "Marijuana"], "ans": 0, "src": "Inlet", "lec": "Lecture 41:\n    Laxative and\nAntidiarrheal Agents", "exp": "Answer: A. Difenoxin\n\n\n\n  -   This patient must have been taking Difenoxin for his chronic diarrhea, which its overdose can be reversed by\n      naloxone. This medication is effective at one-fifth the dosage of Diphenoxylate, which is another opioid antagonist\n      that works in similar ways. Diphenoxylate has adverse effects of euphoria, opioid dependence, and dry\n      mouth/blurred vision/urinary retention/tachycardia.", "topic": "Liver: Viral Hepatitis"}, {"id": "qf2512cc8", "q": "Which of the following medications would you NOT give to a patient with both diarrhea as well as dysfunction of their Sphincter of Oddi?", "opts": ["Difenoxin", "Loperamide", "Diphenoxylate", "Octreotide", "Eluxadoline"], "ans": 4, "src": "Inlet", "lec": "Lecture 41:\n    Laxative and\nAntidiarrheal Agents", "exp": "Answer: E. Eluxadoline\n\n\n\n  -   Eluxadoline is used for the management of IBS-D, and should not be used in patients with biliary duct obstruction,\n      Sphincter of Oddi dysfunction, Pancreatitis, or if the patient consumes > 3 alcoholic drinks per day.", "topic": "Biliary: Other"}, {"id": "qc8e99d21", "q": "Which medication would you prescribe to a patient who is currently taking Loperamide for their chemotherapy-induced diarrhea, but continue to have symptoms?", "opts": ["Bismuth subsalicylate", "Diphenoxylate", "Octreotide", "Difenoxin", "Colestipol"], "ans": 2, "src": "Inlet", "lec": "Lecture 41:\n    Laxative and\nAntidiarrheal Agents", "exp": "Answer: C. Octreotide\n\n\n\n  -   This medication is used for refractory CID as well as Neuroendocrine Tumor-Associated Diarrhea. Adverse effects\n      include Cholelithiasis and Hypoglycemia.\n  -   It is a synthetic analog of endogenous somatostatin.", "topic": "Liver: Viral Hepatitis"}, {"id": "q2dc5f2d2", "q": "Which of the following Bile Salt-Binding Resins does not appear to affect the absorption of other drugs?", "opts": ["Colesevelam", "Cholestyramine", "Cholesterol", "Colestipol", "Colestid"], "ans": 0, "src": "Inlet", "lec": "Lecture 41:\n    Laxative and\nAntidiarrheal Agents", "exp": "Answer: A. Colesevelam\n\n\n\n  -   This class of medications work to decrease diarrhea caused by excess fecal bile acids. Additionally, they manage\n      hypercholesterolemia, especially in patients with FAH or statin intolerance.", "topic": "Biliary: Other"}, {"id": "q12a40619", "q": "A 43 year old male with AIDS presents to the clinic for routine check up. He is currently on antiretroviral therapy, in which he does not tolerate well. He explains that when he is taking these medications, he experiences bouts of diarrhea that will not go away. He remains hydrated and has tried probiotics like Lactobacillus and Saccharomyces, but without resolution. Which of the following medications would you recommend he try in order to help his condition?", "opts": ["Colesevelam", "Difenoxin", "Sulfasalazine", "Crofelemer", "Octreotide"], "ans": 3, "src": "Inlet", "lec": "Lecture 41:\n    Laxative and\nAntidiarrheal Agents", "exp": "Answer: D. Crofelemer\n\n\n\n  -   Crofelemer is the first FDA approved drug that treats non-infectious diarrhea in HIV/AIDS patients on antiretroviral\n      therapy. It works by inhibiting chloride channels: CFTR and CaCC.", "topic": "Pharm: Antidiarrheals / Laxatives"}, {"id": "q288fd9a3", "q": "A 9 year old boy arrives to the pediatrician after his mom noticed some yellowing around his eyes. Labs were drawn which showed elevated unconjugated bilirubin, around 4 mg/dL. On histology, the hepatocytes showed increased lipofuscin, which appeared as black-brown pigments. Which of the following syndromes do you suspect this child has?", "opts": ["Dubbin-Johnson Syndrome", "Crigler-Najjar Type I Syndrome", "Crigler-Najjar Type II Syndrome", "Gilbert Syndrome", "Rotor Syndrome"], "ans": 3, "src": "Inlet", "lec": "Lecture 42:\n    Congenital and Hereditary\n    Dise", "exp": "Answer: D. Gilbert Syndrome\n\n\n\n  -   Gilbert Syndrome is like Crigler-Najjar I and II in the sense that it deals with an issue with the UGT1A1 gene,\n      leading to a decreased bilirubin uptake. This causes elevated levels of unconjugated bilirubin in the blood. However,\n      Gilbert Syndrome is typically not harmful, and shows only a mild increase in bilirubin.\n  -   It was emphasized that you will see black-brown pigments on histo slides in this Syndrome.\n\n  -   Dubbin-Johnson Syndrome is characterized by a mutation of the ABCC2 gene, leading to a defect in the\n      canalicular transport protein. Histo shows black pigmentation in the centrilobular hepatocytes, and hepatomegaly.\n      The ratio of coproporphyrin-III to coproporphyrin-I is 3:1.\n\n  -   Rotor Syndrome is characterized by mutations in both SLCO1B1 and SLCO1B3 genes which are involved in\n      making transporting bile canaliculi. There are no black-brown pigments. Conjunctival icterus may be the only clinical\n      manifestation.", "topic": "Liver: Bilirubin Metabolism / Jaundice"}, {"id": "qbed77562", "q": "Which of the following is the most common cause of chronic passive congestion of the liver?", "opts": ["Left sided heart failure", "Right sided heart failure", "Pulmonary hypertension", "COPD", "Excessive alcohol intake"], "ans": 1, "src": "Inlet", "lec": "Lecture 42:\n    Congenital and Hereditary\n    Dise", "exp": "Answer: B. Right sided heart failure\n\n\n\n  -   Allegedly a massive TQ!", "topic": "Liver: Other"}, {"id": "q71b84394", "q": "A patient presents to the emergency department with severe RUQ pain and tenderness over the abdomen. LFTs are taken which shows marked ALT > AST. The patient states that they have been having back pain for the last 2 months, in which he takes Tylenol for. He reports that within the last two days the back pain has been increasingly worse, so he tripled the Tylenol dose. Which of the following is a cardinal feature of ischemic necrosis?", "opts": ["Portal tract fibrosis", "Ballooning degeneration of periportal hepatocytes", "Centrilobular hepatocyte necrosis", "Bile duct proliferation", "Bridging fibrosis between lobules"], "ans": 2, "src": "Inlet", "lec": "Lecture 42:\n    Congenital and Hereditary\n    Dise", "exp": "Answer: C. Centrilobular hepatocyte necrosis\n\n\n\n  -   This is where it was brought up that there are 3 zones:\n        -    Zone 3 is most vulnerable to ischemic insults\n        -    Zone 2 is where coagulative necrosis with hemorrhage is\n        -    Zone 1 rarely causes permanent liver damage", "topic": "Liver: Viral Hepatitis"}, {"id": "q163a7e84", "q": "Which of the following types of Bridging Necrosis is a common feature of viral acute hepatitis and exacerbations of chronic hepatitis?", "opts": ["Central-Central Bridging Necrosis", "Portal-Portal Bridging Necrosis", "Central-Portal Bridging Necrosis", "Golden Gate Bridge Necrosis", "Brooklyn Bridge Necrosis"], "ans": 2, "src": "Inlet", "lec": "Lecture 42:\n    Congenital and Hereditary\n    Dise", "exp": "Answer: C. Central-Portal Bridging Necrosis\n\n\n\n\n  -   P-P is common in conditions on which portal tracts are widened (chronic hepatitis or biliary tract disease).\n  -   C-C is seen in parenchymal hypoperfusion and venous outflow obstruction.", "topic": "Liver: Viral Hepatitis"}, {"id": "qd82811fd", "q": "Which of the following Liver tests measures only injury to hepatocytes?", "opts": ["PT/INR", "Serum Bilirubin", "Serum Albumin", "Alkaline Phosphatase", "Bromsulphalein"], "ans": 3, "src": "Inlet", "lec": "Lecture 48:\nHepatic Tests", "exp": "Answer: D. Alkaline Phosphatase\n\n\n\n\n  -   Options A-C can measure the Liver functionality, not injury. Serum albumin is the exception because it can measure\n      both injury and function. Bromsulphalein is used to measure the liver’s capacity to transport organic anions and\n      metabolize drugs.", "topic": "Liver: Bilirubin Metabolism / Jaundice"}, {"id": "qdde99562", "q": "A patient presents to the emergency department reportedly “not feeling himself.” He is a 30 pack year smoker and drinks 5 glasses of whiskey every day. He claims feeling lightheaded and short of breath. Labs are drawn and show elevated AST (AST >> ALT), elevated troponins, hyponatremia, and leukocytes within normal limits. EKG shows ischemic changes in the inferolateral leads. Which of the following is at the top of your differential diagnosis?", "opts": ["Acute liver failure", "Chronic pancreatitis", "Myocardial infarction", "Cholelisthiasis", "Pulmonary Embolism"], "ans": 2, "src": "Inlet", "lec": "Lecture 48:\nHepatic Tests", "exp": "Answer: C. Myocardial infarction\n\n\n\n  -   This patient presented with symptoms that are not very helpful to make a diagnosis. The point of this question is to\n      remind you that AST is found in various tissues, including cardiac myocytes. Had this patient had a strictly liver issue,\n      you would want to use ALT instead of AST. Additionally, it can be assumed that AST is elevated in this gentleman\n      because he is an alcoholic, but the presence of EKG changes further backs the notion that he may be having a MI.", "topic": "Liver: Viral Hepatitis"}, {"id": "q6145b4cb", "q": "A child arrives to his pediatricians office with his father for routine checkup. The boy is in the 20th percentile for his height and weight, but the father reports that his son is simply not hungry at times. The father reports that his mom always told him how small of a child he was until he hit a growth spurt in high school. Routine labs are drawn and show a moderately elevated Alkaline Phosphatase (ALP). Which of the following is responsible for this boy’s condition?", "opts": ["He is not being fed enough by his parents", "Gallstones blocking his cystic duct, impairing the gallbladders ability to put bile in the duodenum", "Biliary atresia since birth", "Hepatitis C infection", "Bone growth in the child"], "ans": 4, "src": "Inlet", "lec": "Lecture 48:\nHepatic Tests", "exp": "Answer: E. Bone growth in the child\n\n\n\n  -   Option A is silly (maybe), and C-D are viable options, but this child has no indication of having a pathological\n      issue. The most likely cause of elevated ALP is his growing bones, which would constitute a normal finding.", "topic": "Small Intestine: Anatomy / Physiology"}, {"id": "q6a672c74", "q": "Which type of liver problem would present with markedly increased Alkaline Phosphatase, but a normal AST/ALT?", "opts": ["Cholestatic disease", "Infiltrative disease", "Isolated hyperbilirubinemia", "Hepatocellular disease", "Hepatitis C"], "ans": 1, "src": "Inlet", "lec": "Lecture 48:\nHepatic Tests", "exp": "Answer: B. Infiltrative disease\n\n\n\n  -   Read over the chart in lecture!\n  -   Hepatocellular: Markedly increased AST/ALT, Slightly increased ALP\n  -   Cholestatic: Slightly increased AST/ALT, Markedly increased ALP\n  -   Isolated Hyperbilirubinemia: Slightly increased serum bilirubin", "topic": "Liver: Bilirubin Metabolism / Jaundice"}, {"id": "q43111ade", "q": "A patient is involved in a motorcycle crash and severs his femoral artery. The nearest hospital is 45 minutes away, and EMS just got on scene. The patient has already lost a lot of blood, but EMS was able to apply a tourniquet to stop further bleeding. Blood pressure measures 84/58 mmHg, Heart rate is 130 beats per minute, and Respirations are 32 breaths per minute. The patient is cool to the touch. Upon arrival at the hospital, LFTs are drawn and show ALT that is 50x higher than the normal limit, as well as elevated Lactate Dehydrogenase (LDH) levels. Which of the following hepatocellular diseases is this patient falling victim to?", "opts": ["Alcoholic Liver Disease", "Acute Viral Hepatitis", "Ischemic Hepatitis", "Toxin Related Hepatitis", "Metabolic Dysfunction Associated Steatotic Liver Disease"], "ans": 2, "src": "Inlet", "lec": "Lecture 48:\nHepatic Tests", "exp": "Answer: C. Ischemic Hepatitis\n\n\n\n  -   This patient is experiencing hypovolemic shock, which can lead to Ischemic Hepatitis. Look for elevated liver\n      enzymes (> 50x upper limit) as well as elevated LDH!\n  -   Alcoholic Liver Disease would show AST:ALT >2:1 and/or elevated GGT.\n  -   MASLD would show elevated ALT/AST < 5x the upper limit.\n  -   Viral/Toxic would show elevated ALT/AST > 25x the upper limit.", "topic": "Liver: Viral Hepatitis"}, {"id": "qc9d9000a", "q": "Which of the following blood tests is best to measure Acute Hepatic Failure?", "opts": ["PT/INR", "ALT", "AST", "Bilirubin", "Alkaline Phosphatase"], "ans": 0, "src": "Inlet", "lec": "Lecture 48:\nHepatic Tests", "exp": "Answer: A. PT/INR\n\n\n\n  -   PT/INR would be elevated in Acute Hepatic Failure, due to the liver’s inability to make proteins for the\n      coagulation cascade. This is the best indicator of hepatic failure. The other listed lab markers would be elevated\n      as well, but are not the best indicators.\n  -   In Acute Liver Injury/Disease, Labs can be all over the place, but you would expect to see a normal PT/INR!", "topic": "Liver: Bilirubin Metabolism / Jaundice"}, {"id": "qf3020e24", "q": "Which of the following lab tests is used to confirm hepatobiliary origin for elevations in other liver enzymes and is not affected by pregnancy?", "opts": ["AST", "Bilirubin", "5’-Nucleotidase", "Alkaline Phosphatase", "Gamma-Glutamyl Transpeptidase (GGT)"], "ans": 4, "src": "Inlet", "lec": "Lecture 48:\nHepatic Tests", "exp": "Answer: E. GGT\n\n\n\n\n  -   GGT and 5’-Nucleotidase are both used to confirm hepatobiliary origin for elevations in liver enzymes, but GGT\n      is not affected by pregnancy or bone disease, while 5’-Nucleotidase is not affected by bone disease.", "topic": "Liver: Bilirubin Metabolism / Jaundice"}, {"id": "qdcba765d", "q": "Which of the following is the most common cause of Hepatitis in America?", "opts": ["Celiac Disease", "Hemochromatosis", "Wilson’s Disease", "Metabolic Disease Associated Steatohepatitis", "Gilbert’s Disease"], "ans": 3, "src": "Inlet", "lec": "Lecture 49:\nViral Hepatitis", "exp": "Answer: D. Metabolic Disease Associated Steatohepatitis\n\n\n\n\n  -   Don’t forget this! MASH is the most common cause of hepatitis in America, commonly known as Fatty Liver\n      Disease. MASLD (Metabolic Dysfunction Associated Steatotic Liver Disease) leads to MASH!", "topic": "Small Intestine: Celiac Disease"}, {"id": "q8faafb29", "q": "If you suspect a patient has Hepatitis B, which of the following serological tests would you want to run for confirmation?", "opts": ["Surface antigen only", "Surface antigen and IgM antibodies", "IgM antibodies only", "Surface antigen and core antibodies", "Total capsule antibodies"], "ans": 3, "src": "Inlet", "lec": "Lecture 49:\nViral Hepatitis", "exp": "Answer: D. Surface antigen and core antibodies\n\n\n\n  -   (Refer to the chart below) This was kind of confusing in lecture, but these are the words that were said. “Based\n      on the chart, you would want to measure HBsAg and anti-HBc (surface antigen and core antibody,\n      respectively).”\n  -   HBeAg tells you that the virus is replicating and the patient is infectious, while anti-HBe tells you there are\n      antibodies present.\n  -   In chronic patients, the surface antigen and core antibody\n      remains elevated forever!", "topic": "Liver: Viral Hepatitis"}, {"id": "qc836fe3e", "q": "Which of the following imaging modalities is most important for early morphological changes such as subtle disease and parenchymal changes in chronic pancreatitis?", "opts": ["ERCP", "CT with contrast", "MRCP", "MRI", "EUS"], "ans": 4, "src": "Inlet", "lec": "Lecture 50:\nSurgical Aspects of the\n  Liver and Pa", "exp": "Answer: E. EUS", "topic": "Biliary: ERCP"}, {"id": "qcf94238a", "q": "At what size would a surgeon operate on a pancreatic pseudocyst (and other nodules/tumors/things for that matter)?", "opts": ["2cm", "3cm", "4cm", "5cm", "
