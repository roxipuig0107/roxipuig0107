eatment of choice is often the administration of broad-spectrum antibiotics, which can help manage the infection and prevent complications. Surgery may be considered later (8-12), but antibiotics are often the first line of treatment for uncomplicated cases.", "src": "Monkey Intel", "lec": "Lec 34", "topic": "Colorectal: Appendicitis"}, {"id": "q2e0c5d5c", "q": "A 35-year-old patient undergoes an appendectomy for suspected appendicitis, and the pathology report reveals an appendiceal carcinoid tumor measuring 0.8 cm in size. What is the most appropriate step in management for this patient?", "opts": ["Appendectomy alone is sufficient, and no further treatment is needed", "Right hemicolectomy is required due to the high risk of lymph node metastasis", "Chemotherapy and radiation therapy should be initiated to reduce the risk of recurrence", "Watchful waiting with serial imaging studies is recommended to monitor for potential metastasis", "Further surgical evaluation is necessary to rule out other potential primary sites"], "ans": 0, "exp": "The majority of appendiceal carcinoid tumors are less than 1 cm. Tumors < 1cm are treated by appendectomy alone. Tumors > 2cm require right a hemi-colectomy. Tumors 1-2 cm: treatment is variable. These tumors are usually found on pathology after appendectomy.", "src": "Monkey Intel", "lec": "Lec 34", "topic": "Colorectal: Appendicitis"}, {"id": "qfc1b529c", "q": "A 12-year-old boy presents with progressively worsening abdominal pain and marked abdominal distension. What is the most appropriate next step?", "opts": ["Start oral antibiotics and discharge.", "Order abdominal CT with contrast.", "Consult surgery for possible appendectomy.", "Observe with serial abdominal exams.", "Perform RUQ ultrasound."], "ans": 2, "exp": "Progressive abdominal pain with distension raises concern for a surgical abdomen. In pediatric patients, these signs should prompt urgent surgical evaluation, especially when appendicitis is suspected. Further imaging may delay necessary intervention. Remember to avoid unnecessary radiation exposure associated with some diagnostic modalities, especially abdominal-pelvic CT scans.", "src": "Monkey Intel", "lec": "Lec 34", "topic": "Colorectal: Appendicitis"}, {"id": "q31a0aeb7", "q": "Which standard laboratory test must be done in all women of childbearing age presenting to the ED for abdominal pain?", "opts": ["CBC", "HCG", "Glucose levels", "Potassium levels"], "ans": 1, "exp": "", "src": "Monkey Intel", "lec": "Lec 34", "topic": "Miscellaneous: Gynecologic / OB"}, {"id": "q5a5b44dc", "q": "Which one of the following would be a life-threatening acute abdomen?", "opts": ["GERD", "Peptic ulcer disease", "Ischemic bowel", "Pancreatitis"], "ans": 2, "exp": "", "src": "Monkey Intel", "lec": "Lec 34", "topic": "Esophagus: Barrett's / GERD"}, {"id": "qcba132c6", "q": "Which of the following is part of the differential diagnosis of RUQ pain?", "opts": ["Right lower lobe pneumonia", "Congestive heart failure", "Cholecysistis", "More than one answer is correct"], "ans": 3, "exp": "", "src": "Monkey Intel", "lec": "Lec 34", "topic": "Miscellaneous: Abdominal Pain DDx"}, {"id": "qa324b9cc", "q": "Which of the following is associated with diffuse abdominal pain?", "opts": ["GERD", "Visceral pain", "Gastritis", "Umbilical hernia"], "ans": 1, "exp": "", "src": "Monkey Intel", "lec": "Lec 34", "topic": "Esophagus: Barrett's / GERD"}, {"id": "qe695e611", "q": "Which of the following is not true concerning air under the diaphragm?", "opts": ["A surgical emergency", "Free air is in the intraperitoneal space", "Termed pneumoperitoneum", "Free air is in the interperitoneal space"], "ans": 3, "exp": "", "src": "Monkey Intel", "lec": "Lec 34", "topic": "Miscellaneous: Other"}, {"id": "qbd93c52c", "q": "Pain with extension of the right hip is called?", "opts": ["Psoas sign", "Lachman’s", "Obturator sign", "McMurrays"], "ans": 0, "exp": "", "src": "Monkey Intel", "lec": "Lec 34", "topic": "Colorectal: Appendicitis"}, {"id": "q621af0b1", "q": "Which position of the appendix is associated with pain with extension of the right hip?", "opts": ["Retrocecal", "Preilieal", "Subcecal", "Pelvic"], "ans": 0, "exp": "", "src": "Monkey Intel", "lec": "Lec 34", "topic": "Colorectal: Appendicitis"}, {"id": "q3e103769", "q": "A 68-year-old smoker with HTN is seen in ED with severe back pain. What is his most likely diagnosis?", "opts": ["Ischemic bowel", "Perforated diverticulitis", "AAA", "Perforated peptic ulcer"], "ans": 2, "exp": "", "src": "Monkey Intel", "lec": "Lec 34", "topic": "Stomach: PUD / H. pylori"}, {"id": "qf6a91485", "q": "A 45 year old woman presents to the emergency department with a 12 hour history of right upper quadrant abdominal pain that began after eating a fatty meal. She describes the pain as constant, sharp, and radiating to her right shoulder. She also reports nausea and one episode of vomiting but denies any fever, chills, or changes in stool or urine color. On physical examination she has mild tenderness in the right upper quadrant and exhibits a positive Murphy's sign. Which of the following best explains the absence of jaundice in this patient?", "opts": ["The obstruction is located at the level of the common bile duct", "The gallbladder is infected, leading to acute cholangitis", "The obstruction is limited to the cystic duct, sparing the common bile duct", "The patient likely has a hepatocellular cause of biliary obstruction", "The presence of jaundice is expected in all cases of gallbladder disease"], "ans": 2, "exp": "- This is due to the fact that the liver can still feed bile into the duodenum following fatty meals, and that the liver functionality should not be drastically changed. Had the Common Bile Duct been blocked, the patient would most likely present with jaundice, hinting at a decreased liver function.", "src": "Monkey Intel", "lec": "Lec 35", "topic": "Small Intestine: Other"}, {"id": "qcd04f5d6", "q": "A 58 year old man presents for a routine health maintenance visit. He has no significant past medical history and no family history of colorectal cancer. He is asymptomatic and has never undergone colorectal cancer screening. After discussing options, he expresses interest in a noninvasive test that can be done at home. You discuss Cologuard as one of the available screening tools. Which of the following statements about Cologuard is TRUE?", "opts": ["It requires colonoscopy preparation and sedation", "It detects colorectal cancer solely through DNA mutation analysis", "It is recommended every 3 years for average-risk patients", "A positive test result requires follow up with colonoscopy", "It is more sensitive than colonoscopy for detecting colorectal polyps"], "ans": 3, "exp": "A. It requires colonoscopy preparation and sedation (Not true) B. It detects colorectal cancer solely through DNA mutation analysis (It also uses Fecal Immunochemical Testing (FIT)) C. It is recommended every 3 years for average-risk patients (Should be done annually for those who decline colonoscopy) D. A positive test result requires follow up with colonoscopy (True–Patient most likely has colon cancer) E. It is more sensitive than colonoscopy for detecting colorectal polyps (Much less sensitive for polyps)", "src": "Monkey Intel", "lec": "Lec 35", "topic": "Colorectal: Colorectal Cancer / Screening"}, {"id": "q28f5376f", "q": "A 26 year old woman presents with 6 months of intermittent abdominal pain, non-bloody diarrhea and weight loss. Physical exam shows right lower quadrant tenderness. Labs reveal anemia and elevated CRP. Stool studies are negative. Colonoscopy reveals areas of normal mucosa alternating with inflamed segments showing cobblestoning and ulcerations in the terminal ileum. Which of the following best supports the diagnosis of Crohn’s disease?", "opts": ["Continuous inflammation starting at the rectum", "Shallow mucosal ulcerations limited to the colon", "Transmural inflammation with skip lesions and cobblestoning", "Positive anti-tissue transglutaminase antibodies", "Crypt abscesses limited to the colon"], "ans": 2, "exp": "- This is textbook Crohn’s, especially with regards to the cobblestoning. - A/B/E are all describing Ulcerative Colitis - D is describing Celiac Disease", "src": "Monkey Intel", "lec": "Lec 35", "topic": "Small Intestine: Celiac Disease"}, {"id": "qa0cfb2a2", "q": "Which of the following is the most common reason for splenectomy in the United States?", "opts": ["Hereditary spherocytosis", "Idiopathic thrombocytopenic purpura (ITP)", "Splenic abscess", "Splenic injury", "Lymphoma"], "ans": 3, "exp": "- Seemingly TQ! Based on the last exam, these things feel important… - It is always preferred to repair the spleen as opposed to removing it - The spleen is the most frequently injured organ following blunt trauma!", "src": "Monkey Intel", "lec": "Lec 37", "topic": "Abdominal Trauma: Spleen"}, {"id": "qf955b675", "q": "Which of the following is the usual injury type associated with avulsion of the splenic capsule?", "opts": ["Traction-type", "Shear-type", "Penetrating-type", "Compression-type", "Blast-type"], "ans": 0, "exp": "- Another point and shoot question that seems important to know.", "src": "Monkey Intel", "lec": "Lec 37", "topic": "Abdominal Trauma: Spleen"}, {"id": "qf9a952f", "q": "Phil is a 45 year old photographer who just spent two weeks in the African Savannahs shooting pictures of the wildlife found on that continent. He shot some real winners and cannot wait to put them on display! Before going overseas, he made sure to pack his passport, but did not receive the necessary immunizations to prevent the various illnesses that can infect people who visit Africa. Now that he is back in the States, he has found himself in the local emergency department experiencing sharp chest pain in the LUQ, as well as severe hypotension, narrowing pulse pressures, tachycardia, and a distended abdomen. Which of the following is the cause of his symptoms?", "opts": ["Acute pancreatitis", "Malaria-induced splenic rupture", "Perforated gastric ulcer", "Ruptured abdominal aortic aneurysm", "Left lower lobe pneumonia with pleurisy"], "ans": 1, "exp": "- Phil shoulda gotten his shots which would have prevented malaria. Malaria is the most common cause of spontaneous splenic rupture, followed by infectious mononucleosis. - Other causes of spontaneous rupture include: sarcoidosis, acute and chronic leukemia, hairy-cell leukemia, hemolytic anemia, congestive splenomegaly, polycythemia vera.", "src": "Monkey Intel", "lec": "Lec 37", "topic": "Liver: Viral Hepatitis"}, {"id": "qcddf6c9c", "q": "Which of the following is true of diverticulitis?", "opts": ["It most commonly affects the ascending colon", "It is usually associated with large-volume lower GI bleeding", "It most commonly occurs in the descending or sigmoid colon", "It is typically caused by viral infection", "It presents with right lower quadrant pain in most patients"], "ans": 2, "exp": "", "src": "Monkey Intel", "lec": "Lec 38", "topic": "Colorectal: Diverticular Disease"}, {"id": "q8024a5a9", "q": "A 28 year old woman presents to the emergency department with left lower quadrant abdominal pain that began gradually two days ago. She describes the pain as sharp and crampy, associated with nausea but no vomiting. She denies fever, urinary symptoms, or diarrhea. Her past medical history is unremarkable. Vital signs are stable, and she is afebrile. On physical exam, she has localized tenderness in the LLQ, with mild guarding but no rebound. A urine pregnancy test is positive. HCG test is negative and her last menstrual cycle was 7 weeks ago. Which of the following is the most likely diagnosis?", "opts": ["Ectopic pregnancy", "Diverticulitis", "Acute appendicitis", "Ovarian torsion", "Pelvic inflammatory disease (PID)"], "ans": 0, "exp": "- A lot of the signs and symptoms this patient was presenting with made it seem like she might be experiencing diverticulitis, but it is important to keep in mind other issues that present in this manner.", "src": "Monkey Intel", "lec": "Lec 38", "topic": "Colorectal: Appendicitis"}, {"id": "q6f77a71d", "q": "A 62-year-old man presents to the clinic with three days of left lower quadrant abdominal pain, low-grade fever, and mild nausea. He denies vomiting, diarrhea, or urinary symptoms. His past medical history includes hypertension and hyperlipidemia. On examination, his temperature is 100.9°F (38.3°C), and he has localized tenderness in the LLQ with no rebound or guarding. Bowel sounds are present. Lab results show a white blood cell count of 13,200/µL. What is the most appropriate next step in management?", "opts": ["Abdominal ultrasound", "Start empiric antibiotics and discharge without imaging", "Colonoscopy to confirm diagnosis", "CT abdomen and pelvis with IV contrast", "Plain abdominal X-ray"], "ans": 3, "exp": "- The best test to order to help diagnose diverticulitis is CT contrast!", "src": "Monkey Intel", "lec": "Lec 38", "topic": "Colorectal: Diverticular Disease"}, {"id": "q895c02ac", "q": "Which of the following best describes the mechanism of action of disulfiram (Antabuse) in the treatment of alcohol use disorder?", "opts": ["Blocks opioid receptors to reduce alcohol craving", "Inhibits aldehyde dehydrogenase, causing acetaldehyde buildup", "Stimulates GABA receptors to mimic alcohol’s effects", "Inhibits alcohol dehydrogenase, preventing ethanol metabolism", "Antagonizes NMDA receptors to reduce withdrawal symptoms"], "ans": 1, "exp": "- Disulfiram (Antabuse) is a medication given to those who wish to stop drinking. It has side effects of flushing, nausea, and more. - An interesting occurrence is that more than 1 in 3 people from East Asian heritage have a deficiency in Acetaldehyde Dehydrogenase, leading to similar effects of this medication (through the buildup of Acetaldehyde).", "src": "Monkey Intel", "lec": "Lec 39", "topic": "Liver: Viral Hepatitis"}, {"id": "q30791e37", "q": "A 52 year old woman is seen for a routine checkup. She has no major complaints but mentions feeling more tired than usual. Her past medical history includes T2DM, obesity, and HLD. She does not drink alcohol. On exam, her BMI is 34.0, and her abdominal exam is unremarkable. Lab results show mildly elevated ALT and AST (ALT > AST). Which of the following is the most likely diagnosis?", "opts": ["Alcoholic hepatitis", "Metabolic Dysfunction Associated Steatotic Liver Disease (MASLD)", "Autoimmune hepatitis", "Hemochromatosis", "Acute viral hepatitis"], "ans": 1, "exp": "- Formerly Non Alcoholic Fatty Liver Disease (NAFLD), MASLD is caused by comorbidities involving metabolic syndromes. - This can involve simple fatty liver (MASL) or a more aggressive form of fatty liver: MASH (Metabolic Dysfunction Associated Steato Hepatitis). The latter is less common. - An estimated 100 million people in the US have fatty liver, and 20% of these people will progress to MASH.", "src": "Monkey Intel", "lec": "Lec 39", "topic": "Liver: Viral Hepatitis"}, {"id": "q39f373c0", "q": "A 32-year-old woman presents to the clinic with fatigue, nausea, and upper abdominal discomfort that have been progressively worsening over the past few weeks. She denies alcohol or drug use. Her PMHx is notable for Hashimoto’s thyroiditis. Physical exam reveals mild hepatomegaly. Laboratory studies show elevated ALT and ANA +. Which of the following is the most likely diagnosis?", "opts": ["Primary biliary cholangitis", "Autoimmune hepatitis", "Drug-induced liver injury", "Viral hepatitis", "Hemochromatosis"], "ans": 1, "exp": "- AIH can present with symptoms similar to viral hepatitis, but it is important to know that it is AIH because it can be fatal if not treated urgently. - It is frequently associated with other autoimmune diseases. - Pathophysiology includes immune mediated attack against hepatocytes causing hepatocellular damage. - In adults: Anti-smooth muscle antibody (ASMA). May have ANA +. In Peds: Anti-liver kidney microsomal antibody (anti-LKM). - Treat with steroids.", "src": "Monkey Intel", "lec": "Lec 40", "topic": "Liver: Viral Hepatitis"}, {"id": "q5e0b37c6", "q": "A 19-year-old man presents with progressive tremors, slowness of movement, and difficulty speaking over the past several months. His family has noticed changes in his personality and academic decline. He denies alcohol or drug use and has no significant past medical history. Physical examination reveals resting tremor, rigid muscle tone, and dysarthric speech. Laboratory tests show mildly elevated liver enzymes. MRI of the brain shows abnormal signal intensity in the basal ganglia. Slit-lamp examination reveals a brownish ring at the corneal margin. Which of the following is the most likely diagnosis?", "opts": ["Early-onset Parkinson’s disease", "Huntington’s disease", "Wilson’s disease", "Multiple sclerosis", "Juvenile myoclonic epilepsy"], "ans": 2, "exp": "- Look back at the previous WD question for everything you need to know about the disease!", "src": "Monkey Intel", "lec": "Lec 40", "topic": "Liver: Hereditary / Metabolic Liver Disease"}, {"id": "q3cd3d965", "q": "A 36 year old woman presents to the emergency department with a 2 week history of abdominal discomfort, progressive abdominal distention, and right upper quadrant pain. She also reports fatigue and swelling in her lower extremities. She has no significant past medical history, but notes she recently started taking oral contraceptive pills. On exam, she appears uncomfortable with a distended abdomen, mild jaundice, and hepatomegaly. Laboratory studies show: ALT > AST, Bilirubin = 2.1 mg/dL, Platelets = 90,000/µL. Abdominal ultrasound with Doppler reveals absent flow in the hepatic veins and caudate lobe hypertrophy. Which of the following is the most likely diagnosis?", "opts": ["Portal vein thrombosis", "Budd-Chiari syndrome", "Acute viral hepatitis", "Primary biliary cholangitis", "Nonalcoholic steatohepatitis (NASH)"], "ans": 1, "exp": "- Budd Chiari = Hepatic Vein Thrombosis. Histopathology shows severe centrilobular congestion/necrosis, progressing to centrilobular fibrosis.", "src": "Monkey Intel", "lec": "Lec 42", "topic": "Liver: Bilirubin Metabolism / Jaundice"}, {"id": "qb02f6b09", "q": "A 55-year-old man with a long history of alcohol use disorder presents with increasing abdominal distension, confusion, and yellowing of the skin. He reports drinking heavily for the past 20 years. On physical exam, he has scleral icterus, shifting dullness, spider angiomas, and asterixis. Laboratory studies show elevated AST > ALT, hyperbilirubinemia, and prolonged prothrombin time. Which of the following histologic findings is most characteristic of this patient's condition?", "opts": ["Mallory hyaline bodies", "Councilman bodies", "Lipofuscin granules", "Lewy bodies", "Psammoma bodies"], "ans": 0, "exp": "This patient has alcoholic liver cirrhosis, and the classic histologic finding is Mallory hyaline bodies. They are cytoplasmic inclusions composed of cytokeratin intermediate filaments.", "src": "Monkey Intel", "lec": "Lec 43", "topic": "Liver: Bilirubin Metabolism / Jaundice"}, {"id": "q6aa6c9d8", "q": "Which of the following best defines the nodular size associated with macronodular cirrhosis?", "opts": ["Less than 1 mm", "Between 1–2 mm", "Less than 3 mm", "Greater than 3 mm", "Greater than 10 mm"], "ans": 3, "exp": "Macronodular cirrhosis is characterized by nodules larger than 3 mm, separated by broad fibrous septa.", "src": "Monkey Intel", "lec": "Lec 43", "topic": "Liver: Cirrhosis & Complications"}, {"id": "q7feaeb8d", "q": "A 23-year-old woman is brought to the emergency department for altered mental status. Her roommate reports the patient had been feeling depressed and was found next to several empty pill bottles. On examination, she is jaundiced and confused. Labs reveal elevated AST and ALT, a prolonged INR, and elevated serum ammonia. Liver biopsy shows centrilobular (Zone III) hepatocellular necrosis. Which of the following agents is the most likely cause of this patient’s condition?", "opts": ["Isoniazid", "Acetaminophen", "Phosphorus", "Valproic acid", "Rifampin"], "ans": 1, "exp": "The clinical presentation is classic for acute liver failure: encephalopathy, jaundice, elevated LFTs, and coagulopathy. The zone III (centrilobular) necrosis on biopsy is characteristic of acetaminophen toxicity, due to its metabolism via cytochrome P450 enzymes, which are most concentrated in Zone III. Phosphorus poisoning affects Zone I, and other drugs listed do not typically cause this pattern.", "src": "Monkey Intel", "lec": "Lec 43", "topic": "Liver: Bilirubin Metabolism / Jaundice"}, {"id": "q1e34094a", "q": "A 29-year-old woman is hospitalized for altered mental status, jaundice, and easy bruising. She has no known history of liver disease. On admission, physical exam reveals a palpably enlarged liver. Over the next 72 hours, her condition worsens with the development of encephalopathy, coagulopathy (INR 2.0), and hypotension. Repeat imaging shows that the liver is now significantly reduced in size compared to admission. Which of the following liver conditions most likely explains this biphasic change in liver size?", "opts": ["Chronic viral hepatitis", "Alcoholic cirrhosis", "Hemochromatosis", "Non-alcoholic fatty liver disease (NAFLD)", "Acute liver failure"], "ans": 4, "exp": "In acute liver failure, the liver initially becomes enlarged due to inflammation and edema, then shrinks rapidly as massive hepatocellular necrosis sets in. This pattern is not seen in chronic liver diseases like cirrhosis, NAFLD, or hemochromatosis, where liver changes occur more gradually. Key triad of ALF: jaundice, coagulopathy, and encephalopathy in a patient with no pre-existing liver disease.", "src": "Monkey Intel", "lec": "Lec 43", "topic": "Liver: Bilirubin Metabolism / Jaundice"}, {"id": "q1b49005c", "q": "A cirrhotic patient presents with lethargy and mild disorientation to time and place. What is the most likely grade of hepatic encephalopathy?", "opts": ["Grade 0", "Grade 1", "Grade 2", "Grade 3", "Grade 4"], "ans": 2, "exp": "Grade 0 - No changes, mild decrease in intellectual ability & coordination Grade 1 - lack of awareness; euphoria or anxiety; shortened attention span Grade 2 - Lethargy or apathy; minimal disorientation for time or place Grade 3 - Somnolence to semi stupor, confusion; gross disorientation Grade 4 - Coma", "src": "Monkey Intel", "lec": "Lec 43", "topic": "Liver: Cirrhosis & Complications"}, {"id": "q76e0fc7a", "q": "A 58-year-old man with a history of cirrhosis presents with sudden-onset hematemesis and hypotension. He is confused, pale, and tachycardic. Emergency endoscopy reveals tortuous, dilated submucosal veins in the distal esophagus with active bleeding. Which of the following best explains the clinical significance of these vascular findings?", "opts": ["They increase risk for iron deficiency anemia over time", "They reflect chronic inflammation of the esophageal mucosa", "They are benign dilations that usually regress with fluid resuscitation", "They can rupture and lead to sudden, life-threatening gastrointestinal bleeding", "They result from direct injury to the esophageal mucosa by gastric acid"], "ans": 3, "exp": "Esophageal varices are dilated submucosal veins caused by portal hypertension, commonly due to cirrhosis. These engorged, serpentine vessels are fragile and prone to rupture, leading to massive upper GI bleeding and are often fatal without immediate intervention.", "src": "Monkey Intel", "lec": "Lec 43", "topic": "Esophagus: Varices"}, {"id": "q6d7a0250", "q": "A 60-year-old man with known cirrhosis is being evaluated for pancytopenia. Imaging reveals massive splenomegaly. A splenic biopsy shows focal hemorrhages with iron and calcium-laden nodules located outside of vessels. Which of the following is the most likely identity of these nodules?", "opts": ["Aschoff bodies", "Gamna-Gandy bodies", "Heinz bodies", "Psammoma bodies", "Councilman bodies"], "ans": 1, "exp": "Professor chose to run through this slide, leaving no indication of potential test questions. However gama-gandy bodies are too unique to not include some sort of review. Based on notes provided by a few M2’s it was TQ’d in the past. They appear outside the vessels in portal hypertension induced splenomegaly.", "src": "Monkey Intel", "lec": "Lec 43", "topic": "Liver: Cirrhosis & Complications"}, {"id": "q843b37e3", "q": "A 45-year-old woman presents with episodic right upper quadrant pain that occurs after fatty meals. An abdominal ultrasound reveals gallstones in the gallbladder. Laboratory tests are unremarkable. The patient has no signs of fever or jaundice. Which of the following is the most likely primary component of her gallstones?", "opts": ["Cholesterol", "Calcium oxalate", "Bilirubin", "Phospholipids", "Calcium carbonate"], "ans": 0, "exp": "Cholesterol stones are the most common type of gallstones in the U.S., especially in middle-aged women", "src": "Monkey Intel", "lec": "Lec 44", "topic": "Liver: Bilirubin Metabolism / Jaundice"}, {"id": "qfe2c4ec3", "q": "A 38-year-old woman presents with intermittent episodes of sharp right upper quadrant pain that began 2 months ago. The pain typically occurs 1–2 hours after eating, lasts about an hour, and sometimes radiates to her right shoulder. She reports nausea but no vomiting or fever. Physical exam is unremarkable between episodes. Abdominal ultrasound shows multiple gallstones, but no signs of gallbladder wall thickening or biliary duct dilation. Which of the following is the most likely diagnosis?", "opts": ["Asymptomatic cholelithiasis", "Acute cholecystitis", "Biliary colic", "Choledocholithiasis", "Functional dyspepsia"], "ans": 2, "exp": "Pain is intermittent, lasts 30 minutes to 5 hours, after eating, and is not associated with systemic signs like fever or leukocytosis (which would suggest cholecystitis).", "src": "Monkey Intel", "lec": "Lec 44", "topic": "Biliary: Cholelithiasis / Gallstones"}, {"id": "qc1aa9421", "q": "A 32-year-old woman presents with several months of postprandial right upper quadrant pain, nausea, and bloating. She denies fever, jaundice, or weight loss. Abdominal ultrasound shows a normal-appearing gallbladder with no stones or biliary dilation. Laboratory studies are within normal limits. To further evaluate her symptoms, a hepatobiliary scintigraphy (HIDA scan) is ordered, which reveals a gallbladder ejection fraction (GbEF) of 22%. Which of the following is the most likely diagnosis?", "opts": ["Acute cholecystitis", "Biliary colic due to gallstones", "Choledocholithiasis", "Biliary dyskinesia", "Functional dyspepsia"], "ans": 3, "exp": "Biliary dyskinesia is a functional gallbladder disorder with biliary-type pain but no stones or structural abnormalities. It is a diagnosis of exclusion confirmed by a HIDA scan showing gallbladder ejection fraction < 35%. It may be treated with cholecystectomy if symptoms are severe or persistent.", "src": "Monkey Intel", "lec": "Lec 44", "topic": "Liver: Bilirubin Metabolism / Jaundice"}, {"id": "q5fef662f", "q": "A 47-year-old woman presents with 10 hours of right upper quadrant pain, fever, and nausea. The pain worsens with deep inspiration and palpation under the right costal margin. Laboratory tests show leukocytosis. An abdominal ultrasound is performed. Which combination of the following ultrasound findings would most strongly support a diagnosis of acute cholecystitis?", "opts": ["Gallstones, intrahepatic bile duct dilation, pneumobilia", "Gallstones, common bile duct dilation, pancreatic edema", "Gallbladder sludge, hepatomegaly, right kidney atrophy", "Gallstones, normal gallbladder wall, no pericholecystic fluid", "Gallbladder wall thickening, pericholecystic fluid, gallstones"], "ans": 4, "exp": "The classic ultrasound triad for acute cholecystitis includes: ● Gallstones (obstruction cause) ● Gallbladder wall thickening (inflammation) ● Pericholecystic fluid (serous inflammation or rupture risk)", "src": "Monkey Intel", "lec": "Lec 44", "topic": "Biliary: Cholelithiasis / Gallstones"}, {"id": "qcfb7ddcb", "q": "Which of the following terms best describes the presence of one or more gallstones within the common bile duct?", "opts": ["Cholelithiasis", "Cholecystitis", "Cholangitis", "Choledocholithiasis", "Biliary dyskinesia"], "ans": 3, "exp": "Choledocholithiasis = gallstones located within the biliary tree, most commonly the common bile duct.", "src": "Monkey Intel", "lec": "Lec 44", "topic": "Biliary: Cholelithiasis / Gallstones"}, {"id": "q333e280d", "q": "64-year-old man presents to the emergency department with fever, jaundice, and right upper quadrant pain. He appears ill and confused. Vitals show T 102.4°F, HR 110 bpm, and BP 90/60 mmHg. Laboratory testing reveals elevated total bilirubin, ALP, and AST/ALT. Blood cultures are pending. Abdominal ultrasound shows biliary ductal dilation and a possible common bile duct stone. Which of the following is the most appropriate next step in management after initiating IV fluids and broad-spectrum antibiotics?", "opts": ["Emergent cholecystectomy", "Percutaneous liver biopsy", "Endoscopic retrograde cholangiopancreatography", "HIDA scan", "Oral ursodeoxycholic acid"], "ans": 2, "exp": "This patient presents with acute cholangitis, evidenced by Charcot’s triad (fever, RUQ pain, jaundice) and signs of sepsis (Reynolds' pentad). Management includes: IV fluids and broad-spectrum antibiotics & biliary drainage via ERCP, often with sphincterotomy and stone removal.", "src": "Monkey Intel", "lec": "Lec 44", "topic": "Liver: Bilirubin Metabolism / Jaundice"}, {"id": "q9a2dfb53", "q": "A 62-year-old woman undergoes a laparoscopic cholecystectomy for presumed chronic cholecystitis. Final pathology reveals a gallbladder adenocarcinoma invading the muscular layer of the gallbladder wall (T1b). Imaging shows no distant metastases or lymphadenopathy. Which of the following is the most appropriate next step in management?", "opts": ["Observation with routine surveillance imaging", "Repeat biopsy to confirm the diagnosis", "Adjuvant chemotherapy alone", "Extended cholecystectomy with hepatic resection and lymphadenectomy", "Radiation therapy to the gallbladder fossa"], "ans": 3, "exp": "T1a tumors (limited to the lamina propria) can be adequately treated with simple cholecystectomy. T1b or greater (invasion into muscularis or beyond) requires extended cholecystectomy.", "src": "Monkey Intel", "lec": "Lec 44", "topic": "Biliary: Cholecystitis"}, {"id": "q3f407251", "q": "Which of the following is a recognized risk factor for gallbladder adenocarcinoma?", "opts": ["Helicobacter pylori infection", "Gallstones", "High-fiber diet", "Hepatitis C virus", "Appendectomy history"], "ans": 1, "exp": "Chronic gallstone disease is the strongest risk factor for gallbladder cancer, especially when stones are large or longstanding.", "src": "Monkey Intel", "lec": "Lec 44", "topic": "Stomach: PUD / H. pylori"}, {"id": "qc2aaa0fc", "q": "A 6-week-old infant presents with persistent jaundice, pale stools, and dark urine. Physical exam reveals hepatomegaly. Laboratory evaluation shows elevated direct (conjugated) bilirubin and liver enzymes. Liver biopsy demonstrates luminal obstruction and fibrosis of the extrahepatic bile ducts. Genetic testing reveals a mutation in the GPC1 gene, which encodes a heparan sulfate proteoglycan involved in cell signaling. Which of the following is the most likely diagnosis?", "opts": ["Crigler-Najjar syndrome", "Biliary atresia", "Alagille syndrome", "Dubin-Johnson syndrome", "Neonatal hepatitis"], "ans": 1, "exp": "Biliary atresia is associated with deletion of the gene GPC1, which codes for glypican1 heparan sulfate proteoglycan, which play a role in cell division & growth.", "src": "Monkey Intel", "lec": "Lec 45", "topic": "Liver: Bilirubin Metabolism / Jaundice"}, {"id": "q84c2b93d", "q": "A 35-year-old man presents with fatigue, pruritus, and intermittent right upper quadrant discomfort. Labs show elevated alkaline phosphatase and bilirubin levels. He has a known history of ulcerative colitis. MRCP reveals segmental narrowing and dilation of both the intrahepatic and extrahepatic bile ducts. Which of the following is the most likely diagnosis?", "opts": ["Primary biliary cholangitis", "Autoimmune hepatitis", "Primary sclerosing cholangitis", "Cholangiocarcinoma", "Hereditary hemochromatosis"], "ans": 2, "exp": "PSC is a chronic cholestatic liver disease characterized by inflammation and fibrosis of the bile ducts. Strongly associated with ulcerative colitis and Crohn’s.", "src": "Monkey Intel", "lec": "Lec 45", "topic": "IBD: Ulcerative Colitis"}, {"id": "q757b9a7c", "q": "A 60-year-old man presents with jaundice and right upper quadrant discomfort. Laboratory tests show elevated alkaline phosphatase and bilirubin. Serum IgG4 levels are markedly elevated. Imaging reveals a biliary stricture and diffuse pancreatic enlargement. Liver biopsy shows dense lymphoplasmacytic infiltration with storiform fibrosis. Which of the following associated conditions is most likely to also be present in this patient?", "opts": ["Ulcerative colitis", "Type 2 autoimmune pancreatitis", "Primary biliary cholangitis", "Type 1 autoimmune pancreatitis", "Cholangiocarcinoma"], "ans": 3, "exp": "The patient has IgG4-related cholangitis, a steroid-responsive condition that mimics PSC.", "src": "Monkey Intel", "lec": "Lec 45", "topic": "IBD: Ulcerative Colitis"}, {"id": "q26a70ad", "q": "Which of the following statements about pigment gallstones is correct?", "opts": ["Black stones are radiopaque and associated with unconjugated bilirubin", "Brown stones are radiopaque and made of calcium bilirubinate", "Black stones are radiolucent and commonly form in infected bile", "Brown stones form only in the gallbladder and are cholesterol-rich", "Both black and brown stones are composed mostly of conjugated bilirubin"], "ans": 0, "exp": "Black stones are radiopaque and brown stones are radiolucent.", "src": "Monkey Intel", "lec": "Lec 45", "topic": "Liver: Bilirubin Metabolism / Jaundice"}, {"id": "q2d5d31b6", "q": "A 67-year-old woman with a history of gallstones presents with fever, nausea, and severe right upper quadrant pain. On examination, she is febrile and has rebound tenderness in the RUQ. Imaging shows a distended gallbladder with wall thickening and pericholecystic fluid. She undergoes emergency cholecystectomy. Gross pathology reveals a green-black necrotic gallbladder with pus and multiple gallstones. Which of the following is the most likely diagnosis?", "opts": ["Chronic cholecystitis", "Gallbladder carcinoma", "Emphysematous cholecystitis", "Acute calculous cholecystitis", "Porcelain gallbladder"], "ans": 3, "exp": "A green-black necrotic gallbladder is characteristic of gangrenous cholecystitis, a severe form of acute calculous cholecystitis.", "src": "Monkey Intel", "lec": "Lec 45", "topic": "Biliary: Cholelithiasis / Gallstones"}, {"id": "q15d2148c", "q": "A 75-year-old man in the ICU develops acute right upper quadrant pain, fever, and leukocytosis. Imaging reveals gallbladder wall thickening, pericholecystic fluid, and no evidence of gallstones. He is diagnosed with acute acalculous cholecystitis and undergoes cholecystectomy. Histopathologic examination reveals thickened gallbladder wall with adhesions, mucosal ulceration with gangrenous changes, viscous bile, and herniation of mucosal epithelium into the muscular layer. Which of the following histologic features is most associated with this condition?", "opts": ["Sunny cells", "Rokitansky-Aschoff sinuses", "Onion-skin fibrosis", "Noncaseating granulomas", "Ground-glass hepatocytes"], "ans": 1, "exp": "Rokitansky-Aschoff sinuses are herniations of mucosa into the muscularis layer of the gallbladder wall. Seen in up to 90% of cases of acute acalculous cholecystitis.", "src": "Monkey Intel", "lec": "Lec 45", "topic": "Biliary: Cholelithiasis / Gallstones"}, {"id": "q18d9ffcd", "q": "A 42-year-old woman undergoes elective cholecystectomy for chronic right upper quadrant pain. Gross pathology of the gallbladder reveals a bright red mucosal surface with yellow speckling, described as resembling a \"strawberry.\" Microscopic examination shows foamy macrophages in the lamina propria and mucosal epithelium, with villous mucosal hyperplasia. Which of the following is the most likely diagnosis?", "opts": ["Gallbladder adenocarcinoma", "Chronic calculous cholecystitis", "Cholesterolosis", "Acute acalculous cholecystitis", "Xanthogranulomatous cholecystitis"], "ans": 2, "exp": "Cholesterolosis, also called \"strawberry gallbladder\", is due to accumulation of cholesterol esters within foamy macrophages in the gallbladder wall.", "src": "Monkey Intel", "lec": "Lec 45", "topic": "Biliary: Cholecystitis"}, {"id": "qb1f80f06", "q": "A 63-year-old man presents with jaundice, back pain, and weight loss. Imaging reveals a mass at the ampulla of Vater. Biopsy shows tubular adenocarcinoma. Histopathology reveals elongated, pseudostratified columnar cells with scattered goblet cells and Paneth cells. Which of the following best describes the histologic subtype of this tumor?", "opts": ["Mucinous adenocarcinoma", "Pancreato-biliary type", "Mixed type", "Intestinal type", "Signet ring cell type"], "ans": 3, "exp": "These adenocarcinomas are typically found at the ampulla of vader. The professor absolute ripped through these slides, however, based on his testing style and M2 notes we have included it to be safe. Intestinal type: columnar cells with elongated, pseudostratified nuclei with scattered goblet cells and Paneth cells Pancreato-biliary type: cuboidal cells with pleomorphism forming small glands in desmoplastic stroma Mixed type: show mix of intestinal and pancreato-biliary types", "src": "Monkey Intel", "lec": "Lec 45", "topic": "Liver: Bilirubin Metabolism / Jaundice"}, {"id": "q99712b32", "q": "A 32-year-old woman presents with fatigue and yellowing of her eyes. Physical examination reveals scleral icterus but no abdominal tenderness or hepatosplenomegaly. Her laboratory results show a hemoglobin level of 9.4 g/dL (normal: 12–16 g/dL), an elevated reticulocyte count, a total bilirubin of 5.2 mg/dL (normal: 0.2–1.2 mg/dL), and a direct (conjugated) bilirubin of 0.3 mg/dL (normal: 0.1–0.3 mg/dL). AST, ALT, and alkaline phosphatase levels are all within normal limits. Which of the following best describes the type of jaundice this patient is experiencing?", "opts": ["Intrahepatic", "Posthepatic", "Prehepatic", "Hepatobiliary", "Obstructive"], "ans": 2, "exp": "This patient's anemia and elevated reticulocyte count indicate increased red blood cell turnover, pointing toward hemolysis. Her total bilirubin is 5.2 mg/dL, and her direct (conjugated) bilirubin is 0.3 mg/dL. Subtracting the direct from the total gives an indirect (unconjugated) bilirubin of 4.9 mg/dL, which is significantly elevated. This strongly suggests an unconjugated hyperbilirubinemia. Normal liver enzyme levels further exclude hepatic or posthepatic causes. These findings are consistent with prehepatic jaundice, most commonly due to hemolysis.", "src": "Monkey Intel", "lec": "Lec 46", "topic": "Liver: Bilirubin Metabolism / Jaundice"}, {"id": "qa43eed99", "q": "A 64-year-old man presents with progressive jaundice, pruritus, and pale stools for the past week. He also reports unintentional weight loss and dull right upper quadrant discomfort. On examination, he has scleral icterus, excoriations on his arms, and a palpable, nontender gallbladder on deep inspiration. Ultrasound reveals dilation of the intrahepatic and extrahepatic bile ducts, with a mass at the head of the pancreas compressing the common bile duct. Which of the following best describes the type of jaundice this patient is experiencing?", "opts": ["Prehepatic", "Intrahepatic", "Functional", "Hemolytic", "Posthepatic"], "ans": 4, "exp": "These findings point to posthepatic (obstructive) jaundice, where conjugated bilirubin backs up due to impaired bile flow beyond the liver.", "src": "Monkey Intel", "lec": "Lec 46", "topic": "Liver: Bilirubin Metabolism / Jaundice"}, {"id": "qd78c5fcf", "q": "Which of the following best describes Gilbert syndrome?", "opts": ["Benign hereditary condition caused by reduced hepatic uptake and processing of bilirubin", "Autosomal recessive disorder with complete absence of UDP-glucuronosyltransferase", "Inherited condition resulting in impaired bile excretion due to canalicular transporter defect", "Obstructive cause of hyperbilirubinemia associated with gallstones", "Hemolytic disorder leading to increased bilirubin production"], "ans": 0, "exp": "Gilbert syndrome is a common, benign genetic disorder characterized by a mild defect in hepatic uptake and conjugation of bilirubin. It is typically asymptomatic but may cause transient episodes of jaundice during stress, fasting, or illness. It is not associated with liver damage, obstruction, or hemolysis.", "src": "Monkey Intel", "lec": "Lec 46", "topic": "Liver: Bilirubin Metabolism / Jaundice"}, {"id": "q33089e30", "q": "Which of the following correctly distinguishes unconjugated bilirubin from conjugated bilirubin?", "opts": ["Unconjugated bilirubin is lipid soluble and not excreted in urine", "Conjugated bilirubin is bound to albumin in plasma", "Unconjugated bilirubin is water soluble and found in the urine", "Conjugated bilirubin is derived from heme breakdown in macrophages", "Unconjugated bilirubin is excreted directly into bile without modification"], "ans": 0, "exp": "Unconjugated (indirect) bilirubin is a lipid-soluble product of hemoglobin breakdown, transported in the plasma bound to albumin. Because it is not water soluble, it cannot be excreted in the urine. In contrast, conjugated (direct) bilirubin is water soluble and excreted in bile or urine.", "src": "Monkey Intel", "lec": "Lec 46", "topic": "Liver: Bilirubin Metabolism / Jaundice"}, {"id": "qb5e3e323", "q": "A 4-week-old infant presents with persistent jaundice. Laboratory testing reveals total bilirubin of 15.0 mg/dL, with direct bilirubin of 0.6 mg/dL. The infant is otherwise feeding and gaining weight normally. Which of the following best describes the predominant form of bilirubin in this patient?", "opts": ["Conjugated bilirubin, water-soluble and excreted in urine", "Conjugated bilirubin, tightly bound to albumin and not filtered by kidney", "Unconjugated bilirubin, fat-soluble and derived from hemoglobin breakdown", "Unconjugated bilirubin, formed in the liver from glucuronic acid conjugation", "Conjugated bilirubin, generated in splenic macrophages before liver uptake"], "ans": 2, "exp": "This infant has elevated total bilirubin with low direct (conjugated) bilirubin, suggesting a predominance of unconjugated bilirubin. Unconjugated bilirubin is the fat-soluble form, produced from heme breakdown in macrophages and transported to the liver bound to albumin.", "src": "Monkey Intel", "lec": "Lec 46", "topic": "Liver: Bilirubin Metabolism / Jaundice"}, {"id": "q76afcc32", "q": "Which of the following best describes the function of Kupffer cells in the liver?", "opts": ["Hepatic pericytes that store vitamin A and regulate sinusoidal blood flow", "Endothelial cells that form the fenestrated lining of hepatic sinusoids", "Cholangiocytes that regulate bile flow through bile canaliculi", "Hepatocytes that secrete bile and detoxify circulating drugs", "Hepatic macrophages responsible for phagocytosis of aged red blood cells, bacteria, and debris"], "ans": 4, "exp": "Kupffer cells are specialized macrophages located in the hepatic sinusoids. They play an essential role in filtering blood by phagocytizing pathogens, aged erythrocytes, and cellular debris. They also recycle iron and contribute to innate immunity within the liver.", "src": "Monkey Intel", "lec": "Lec 47", "topic": "Liver: Liver Histology / Pathology"}, {"id": "q7335451e", "q": "Which of the following best describes the function of the enzyme UGT1A1 in bilirubin metabolism?", "opts": ["It converts conjugated bilirubin back into its unconjugated form in the gut lumen", "It facilitates the uptake of unconjugated bilirubin into hepatocytes via active transport", "It binds bilirubin to albumin in the bloodstream for transport to the liver", "It degrades bilirubin into urobilinogen for fecal excretion", "It transfers glucuronic acid to bilirubin, forming a water-soluble conjugated compound"], "ans": 4, "exp": "UGT1A1 (uridine diphosphate-glucuronosyltransferase 1A1) is the key enzyme responsible for the conjugation of bilirubin in hepatocytes. It adds one or two glucuronic acid molecules to unconjugated (indirect) bilirubin, making it water-soluble (conjugated or direct), which allows for its excretion into bile and eventual elimination in the stool. Deficiency or mutation in UGT1A1 leads to impaired bilirubin conjugation, as seen in disorders like Gilbert syndrome and Crigler-Najjar syndrome.", "src": "Monkey Intel", "lec": "Lec 47", "topic": "Liver: Bilirubin Metabolism / Jaundice"}, {"id": "qcb6f4b5b", "q": "A 44-year-old man presents with yellowing of his eyes noticed by a coworker. He denies abdominal pain, fatigue, or weight loss. Physical examination confirms scleral icterus, but his skin appears normal in color. Liver function tests are pending. At what approximate total serum bilirubin concentration does scleral icterus typically become clinically detectable?", "opts": ["0.5–1.0 mg/dL", "1.0–1.5 mg/dL", "2.0–3.0 mg/dL", "3.5–4.0 mg/dL", "5.0–6.0 mg/dL"], "ans": 2, "exp": "2–3 mg/dL —> scleral icterus appears (first visible sign of jaundice). 4–5 mg/d —> skin yellowing appears (jaundice becomes more obvious systemically).", "src": "Monkey Intel", "lec": "Lec 47", "topic": "GI Infections: E. coli"}, {"id": "q44c091b", "q": "A 23-year-old man with a history of hereditary spherocytosis presents with mild jaundice. He has no abdominal pain or fever. Laboratory testing reveals elevated indirect bilirubin, reticulocytosis, and normal liver enzymes. A recent ultrasound reveals multiple pigmented gallstones. Which of the following best explains this patient’s underlying pathophysiology?", "opts": ["Deficiency of UDP-glucuronosyltransferase leading to impaired conjugation", "Hepatocellular injury causing leakage of conjugated bilirubin", "Autoimmune destruction of biliary canaliculi", "Increased heme turnover from extravascular hemolysis", "Decreased enterohepatic circulation of bile salts"], "ans": 3, "exp": "In conditions such as hereditary spherocytosis, red blood cells are prematurely destroyed by splenic macrophages, leading to increased production of unconjugated bilirubin. This overwhelms the liver’s conjugation capacity, resulting in hyperbilirubinemia. Chronic elevation of unconjugated bilirubin in bile increases the risk for forming pigmented (black) gallstones.", "src": "Monkey Intel", "lec": "Lec 47", "topic": "Liver: Bilirubin Metabolism / Jaundice"}, {"id": "q37ba1b6e", "q": "A 24-year-old woman presents with mild jaundice that developed during her third trimester of pregnancy. She has no abdominal pain, pruritus, or changes in stool color. Liver function tests show elevated direct (conjugated) bilirubin, but AST, ALT, and alkaline phosphatase are normal. Urinalysis reveals dark-colored urine. A liver biopsy is performed and shows dark brown, melanin-like pigment in hepatocytes and Kupffer cells in the centrilobular region. Gross inspection reveals a black liver. Which of the following best explains the underlying pathophysiology in this patient?", "opts": ["Defective conjugation of bilirubin due to UDP-glucuronosyltransferase deficiency", "Increased hemolysis leading to excessive unconjugated bilirubin production", "Impaired excretion of conjugated bilirubin due to mutated MRP2 transporter", "Autoimmune destruction of intrahepatic bile ducts", "Accumulation of bile salts secondary to obstruction of the common bile duct"], "ans": 2, "exp": "This patient has Dubin-Johnson syndrome, an autosomal recessive disorder caused by mutations in the ABCC2 gene, which encodes the MRP2 transporter. This transporter is responsible for moving conjugated bilirubin into the bile canaliculi. A nonfunctional MRP2 causes conjugated bilirubin to accumulate in hepatocytes and leak into the bloodstream. The liver appears black due to melanin-like pigment accumulation in hepatocytes and Kupffer cells.", "src": "Monkey Intel", "lec": "Lec 47", "topic": "Liver: Bilirubin Metabolism / Jaundice"}, {"id": "qcd471e8", "q": "A 21-year-old man is evaluated for intermittent mild jaundice. He denies abdominal pain, pruritus, dark urine, or changes in stool color. His liver enzymes are within normal limits, but total bilirubin is elevated to 3.2 mg/dL, with most of it in the direct (conjugated) form. Liver biopsy is unremarkable, with no evidence of pigmentation. Genetic testing reveals mutations in both SLCO1B1 and SLCO1B3 genes. Which of the following best describes the consequence of these gene mutations?", "opts": ["Impaired conjugation of bilirubin due to reduced UGT1A1 activity", "Impaired hepatic reuptake of conjugated bilirubin from the blood", "Defective canalicular excretion of conjugated bilirubin into bile", "Increased production of unconjugated bilirubin due to hemolysis", "Decreased hepatic blood flow leading to cholestasis"], "ans": 1, "exp": "Rotor syndrome is caused by inactivating mutations in the SLCO1B1 and SLCO1B3 genes, which encode organic anion transporting polypeptides (OATP1B1 and OATP1B3). These transporters are responsible for the reuptake of conjugated bilirubin from the blood back into hepatocytes. Impairment leads to accumulation of conjugated bilirubin in the blood. Unlike Dubin-Johnson syndrome, Rotor syndrome does not involve liver pigmentation.", "src": "Monkey Intel", "lec": "Lec 47", "topic": "Liver: Bilirubin Metabolism / Jaundice"}, {"id": "qf622ff35", "q": "A 60-year-old man with a history of untreated choledocholithiasis undergoes a liver biopsy after presenting with jaundice and elevated alkaline phosphatase. Histologic analysis reveals extravasated pools of bile (bile lakes) surrounded by zones of hepatocyte necrosis in the periportal region. No viral inclusions or malignancy is noted. Which of the following best explains the pathological process leading to these findings?", "opts": ["Obstruction of canalicular bile flow due to hepatocyte injury", "Portal vein thrombosis impairing hepatic perfusion", "Autoimmune destruction of small intrahepatic bile ducts", "Rupture of bile ductules due to increased intrabiliary pressure", "Ischemic damage to hepatocytes in the centrilobular zone"], "ans": 3, "exp": "The presence of bile lakes surrounded by necrotic hepatocytes indicates that bile has leaked into the hepatic parenchyma, which typically results from rupture of dilated bile ductules in the setting of prolonged extrahepatic obstruction (In lecture it was not specified but it’s safe to assume it will be an obstruction - probably gallstones). The pressure buildup leads to ductular injury and leakage of toxic bile, which directly damages nearby hepatocytes. This is characteristic of extrahepatic cholestasis.", "src": "Monkey Intel", "lec": "Lec 47", "topic": "Liver: Bilirubin Metabolism / Jaundice"}, {"id": "q2e6a647e", "q": "A 52-year-old man with a history of alcohol use disorder and hepatitis C presents to the emergency department with altered mental status, jaundice, and increasing abdominal girth. His family reports that he has been confused for the past two days and has had progressively worsening swelling in his legs and abdomen over the past week. On examination, he is disoriented to time and place, has a flapping tremor of the hands, scleral icterus, and shifting dullness on abdominal percussion. Laboratory tests reveal the following: Total bilirubin: 18.2 mg/dL, INR: 3.1, Albumin: 2.1 g/dL, Creatinine: 2.4 mg/dL, ALT: 18 U/L, AST: 22 U/L, Ammonia: 122 µmol/L. Which of the following best explains the patient's normal ALT and AST levels despite evidence of severe liver failure?", "opts": ["Transaminase levels are poor indicators of hepatocyte function in end-stage liver disease", "The enzymes are falsely low due to laboratory error", "ALT and AST levels reflect synthetic liver function", "Normal transaminase levels rule out hepatocellular injury", "Hepatic encephalopathy occurs only with elevated liver enzymes"], "ans": 0, "exp": "- The liver injury paradox with AST/ALT involves the fact that when liver injury is severe enough, these lab values may be normal. Be sure to check how severe the patient's condition is, and don’t rule out the paradox!", "src": "Monkey Intel", "lec": "Lec 48", "topic": "Liver: Bilirubin Metabolism / Jaundice"}, {"id": "qb0cff550", "q": "A 28-year-old previously healthy man presents to the clinic with 4 days of fatigue, nausea, low-grade fever, and dark-colored urine. He recently returned from a backpacking trip through rural Thailand. He reports eating street food, including raw vegetables and unpeeled fruit. He denies alcohol use, medications, or drug use. He has no prior history of liver disease. On exam, he has mild right upper quadrant tenderness and scleral icterus. ALT and AST are markedly elevated, in the 1,000s. Which of the following is the most likely cause of his hepatitis?", "opts": ["Hepatitis A virus", "Hepatitis B virus", "Hepatitis C virus", "Hepatitis D virus", "Hepatitis E virus"], "ans": 0, "exp": "- The clues that give away Hepatitis A is the fact that this traveler (!) was eating street food, which is most likely not very clean. Hep A is fecal-oral transmitted, commonly seen in households, daycares, prisons, and the military. It is a RNA virus. - 99% of cases are self-limiting! - Vaccinations are available. - Of note: - Anti-HAV IgM are detected when symptoms start, and last for 3-6 months (“Modern”) - Anti-HAV IgG lasts for years, and provides lifelong immunity (“Gone”)", "src": "Monkey Intel", "lec": "Lec 49", "topic": "GI Infections: E. coli"}, {"id": "qb6479bd5", "q": "Which of the following forms of Hepatitis is transmitted parenterally, is a small RNA virus, has no vaccine, and can take years post infection to manifest in a patient?", "opts": ["Hepatitis A virus", "Hepatitis B virus", "Hepatitis C virus", "Hepatitis D virus", "Hepatitis E virus"], "ans": 2, "exp": "- Hep C is spread parenterally and can lay dormant in a patient for years before manifesting. THERE IS NO VACCINE! - Possibility for Chronic Hep C: - AST/ALT are minimally elevated. - ALP, Bilirubin, PT/INR usually normal. - Can use Anti HCV test to screen for it. - Fibroscan to check for fibrosis and US to check evidence of hepatocellular carcinoma. - Meds: Mavyret and Epclusa.", "src": "Monkey Intel", "lec": "Lec 49", "topic": "Liver: Bilirubin Metabolism / Jaundice"}, {"id": "qfd265036", "q": "A 54-year-old man from China presents to the clinic for follow-up of chronic hepatitis. He has been nonadherent with previous monitoring and has not taken any antiviral therapy. He denies alcohol use and has no history of drug use or blood transfusions. He now reports unintentional weight loss, fatigue, and vague right upper quadrant discomfort over the past month. On exam, he has mild hepatomegaly but no jaundice, ascites, or peripheral edema. ALT and AST are 2x the upper limit of normal. Ultrasound shows a 4.2 cm hypoechoic lesion in the right hepatic lobe with arterial enhancement and venous washout on contrast imaging. Which of the following best explains this patient’s current condition?", "opts": ["Cirrhosis from alcohol-induced liver disease", "Superinfection with hepatitis D virus", "Vertical transmission of hepatitis B in early life, leading to hepatocellular carcinoma", "Autoimmune hepatitis with secondary viral infection", "Reactivation of latent hepatitis A virus"], "ans": 2, "exp": "- It is important to note that Liver Cirrhosis (caused by alcoholism) can lead to hepatocellular carcinoma. Additionally, Hep B (without cirrhosis!) can lead to hepatocellular carcinoma as well. This was emphasized in lecture.", "src": "Monkey Intel", "lec": "Lec 49", "topic": "Liver: Bilirubin Metabolism / Jaundice"}, {"id": "q1f99d115", "q": "A patient presents with chronic pancreatitis with a pancreatic duct dilation of 10mm. Which of the following is the next best step in treatment?", "opts": ["Continue medical therapy with high-dose pancreatic enzymes", "Total pancreatectomy", "Endoscopic pancreatic duct stenting", "Longitudinal pancreaticojejunostomy (Puestow procedure)", "Close observation and follow up in one month with CT"], "ans": 3, "exp": "- It was stated in lecture that if a patient with chronic pancreatitis has a pancreatic duct dilation of > 7mm, they are a candidate for the Puestow procedure (Lateral pancreaticojejunostomy).", "src": "Monkey Intel", "lec": "Lec 50", "topic": "Pancreas: Chronic Pancreatitis"}, {"id": "qe8454bf9", "q": "Which of the following is the most common primary malignant tumor of the liver worldwide?", "opts": ["Cholangiocarcinoma", "Hepatoblastoma", "Hepatic angiosarcoma", "Hepatocellular carcinoma", "Metastatic colorectal cancer"], "ans": 3, "exp": "- Best diagnosed by multiphasic CT.", "src": "Monkey Intel", "lec": "Lec 50", "topic": "Colorectal: Colorectal Cancer / Screening"}, {"id": "q62ca87bf", "q": "A 62-year-old man with a history of hepatitis C–related cirrhosis is undergoing evaluation for liver transplantation. Surveillance imaging reveals a single liver lesion measuring 3.8 cm in the right hepatic lobe. He has no evidence of extrahepatic spread or vascular invasion on MRI. Alpha-fetoprotein is elevated at 180 ng/mL. Liver function is Child-Pugh class B, and he has no other significant comorbidities. Which of the following best describes this patient’s candidacy for liver transplantation based on the Milan criteria?", "opts": ["He is not a candidate due to tumor size", "He is not a candidate due to elevated AFP", "He meets Milan criteria and is eligible for transplant", "He is not a candidate due to cirrhosis", "He is eligible only if he undergoes tumor resection first"], "ans": 2, "exp": "- Milan Criteria: - Single nodule less than or equal to 5 cm - Up to 3 nodules, measuring less than or equal to 3 cm each", "src": "Monkey Intel", "lec": "Lec 50", "topic": "Liver: Viral Hepatitis"}, {"id": "q8996e886", "q": "A 35-year-old woman undergoes an abdominal ultrasound for an unrelated complaint and is found to have a single, well-circumscribed 3 cm liver lesion. MRI shows a central stellate scar and localized fibrous septa radiating from the center. Liver biopsy reveals nodules of histologically normal hepatocytes arranged around fibrous bands containing abnormal arteries. There is no evidence of cirrhosis or portal hypertension. Which of the following findings would most reliably distinguish this lesion from nodular regenerative hyperplasia?", "opts": ["Central scar with radiating fibrous septa within a single lesion", "Portal hypertension and elevated hepatic venous pressure gradient", "Nodules composed of histologically normal hepatocytes", "Absence of capsule surrounding the lesion", "Atrophic hepatocytes encircling regenerative nodules"], "ans": 0, "exp": "Focal Nodular Hyperplasia (FNH) is a localized (focal) lesion often solitary marked by a central stellate scar and fibrous septa. This distinguishes it from Nodular Regenerative Hyperplasia (NRH), which involves diffuse regenerative nodules across the entire liver without fibrous septa. NRH is also more commonly associated with portal hypertension and widespread parenchymal remodeling rather than a localized growth pattern.", "src": "Monkey Intel", "lec": "Lec 51", "topic": "Liver: Viral Hepatitis"}, {"id": "q8dfbb400", "q": "A 29-year-old woman presents for evaluation of an incidental liver lesion found on imaging. She has no significant symptoms but reports long-term use of oral contraceptive pills. A liver biopsy reveals marked steatosis and genetic testing identifies a mutation in hepatocyte nuclear factor 1-alpha (HNF1A). Which of the following best confirms the diagnosis?", "opts": ["Presence of β-catenin nuclear localization.", "Expression of glutamine synthetase in a map-like pattern.", "Reticulin collapse with elevated serum alpha-fetoprotein.", "Strong CD34 expression along sinusoidal endothelium.", "Absence of liver-type fatty acid–binding protein (L-FABP)."], "ans": 4, "exp": "The HNF1A-inactivated hepatocellular adenoma subtype is strongly associated with steatosis and loss of L-FABP expression on immunohistochemistry. This subtype often occurs in women of childbearing age, particularly those using oral contraceptives.", "src": "Monkey Intel", "lec": "Lec 51", "topic": "Liver: Liver Tumors"}, {"id": "qabe13bad", "q": "A 34-year-old man presents for evaluation of a liver lesion discovered incidentally on imaging. He has a history of anabolic steroid use but denies alcohol or drug abuse. A liver biopsy reveals cellular atypia and immunohistochemical staining shows nuclear localization of β-catenin within tumor hepatocytes. Which of the following is the most appropriate next step in management?", "opts": ["Observation with repeat imaging in 6 months.", "Hormonal therapy to block androgen activity.", "Immediate chemotherapy with sorafenib.", "Surgical resection due to high risk of malignant transformation.", "Initiation of corticosteroid therapy."], "ans": 3, "exp": "β-catenin activated hepatocellular adenomas carry a very high risk of malignant transformation into hepatocellular carcinoma. This subtype is associated with anabolic steroid use and exhibits nuclear localization of β-catenin on staining. Surgical resection is indicated even in asymptomatic patients due to the potential for cancer development.", "src": "Monkey Intel", "lec": "Lec 51", "topic": "Liver: Liver Tumors"}, {"id": "q7ac5b2e6", "q": "A 29-year-old man presents with vague right upper quadrant discomfort. He has no history of liver disease, alcohol use, or hepatitis infection. Imaging reveals a single, large, well-circumscribed liver mass. On resection, the mass appears scirrhous, with prominent fibrous bands traversing the tumor. Which of the following is the most likely diagnosis?", "opts": ["Hepatic adenoma.", "Classic hepatocellular carcinoma.", "Cholangiocarcinoma.", "Fibrolamellar carcinoma.", "Metastatic colorectal carcinoma."], "ans": 3, "exp": "Fibrolamellar carcinoma is a rare variant of hepatocellular carcinoma that typically presents in young adults without underlying liver disease. It appears as a single, large, scirrhous mass with dense fibrous bands, which is a hallmark histologic and gross feature.", "src": "Monkey Intel", "lec": "Lec 51", "topic": "Colorectal: Other"}, {"id": "q720a2f1f", "q": "A 67-year-old man presents with progressive jaundice, dark urine, and weight loss. He has no history of viral hepatitis or significant alcohol use. Imaging with cholangiography reveals a mass located at the confluence of the right and left hepatic ducts. Biopsy confirms a diagnosis of cholangiocarcinoma. Which of the following best describes the diagnosis?", "opts": ["Hepatocellular carcinoma.", "Gallbladder adenocarcinoma.", "Klatskin tumor.", "Metastatic colorectal cancer.", "Intrahepatic bile duct hamartoma."], "ans": 2, "exp": "Klatskin tumors are a specific type of perihilar cholangiocarcinoma located at the bifurcation of the right and left hepatic ducts. They are often diagnosed by imaging that shows narrowing or obstruction at the hepatic duct confluence and commonly present with painless jaundice and dark urine.", "src": "Monkey Intel", "lec": "Lec 51", "topic": "Colorectal: Colorectal Cancer / Screening"}, {"id": "q4d55da6c", "q": "A 45-year-old man with a long history of heavy alcohol use presents with severe epigastric pain radiating to his back. Laboratory testing reveals elevated serum amylase and lipase. Imaging shows inflammation of the pancreas consistent with acute pancreatitis. Which of the following mechanisms best explains how alcohol consumption contributes to the development of this patient’s condition?", "opts": ["Increased insulin production by pancreatic islets.", "Direct stimulation of pancreatic beta cells.", "Stimulation of pancreatic ductal bicarbonate secretion.", "Contraction of the sphincter of Oddi and generation of free radicals.", "Activation of pancreatic lipase in the duodenum."], "ans": 3, "exp": "Alcohol contributes to acute pancreatitis through multiple mechanisms: it increases the tone of the sphincter of Oddi, leading to pancreatic duct obstruction; it has direct toxic effects on acinar cells; and it induces oxidative stress, promoting free radical formation. These factors collectively lead to premature activation of digestive enzymes within the pancreas, causing autodigestion and inflammation.", "src": "Monkey Intel", "lec": "Lec 52", "topic": "Small Intestine: Other"}, {"id": "qfb443b2b", "q": "A 42-year-old woman with a history of gallstones presents to the emergency department with severe epigastric pain radiating to her back. She reports nausea and vomiting. Laboratory studies show elevated serum amylase and lipase. Imaging reveals an inflamed pancreas with no evidence of perforation. Which of the following best explains the pathogenesis of her condition?", "opts": ["Bacterial infection and pancreatic duct hyperplasia.", "Simultaneous obstruction of bile and pancreatic ducts by liver failure.", "Increased vagal tone and enhanced secretion of zymogens.", "Chronic autoimmune infiltration of pancreatic islets.", "A combination of duct obstruction, acinar cell injury, and defective intracellular transport."], "ans": 4, "exp": "Acute pancreatitis typically arises from a combination of three interrelated factors: duct obstruction, direct acinar cell injury, and defective intracellular transport of proenzymes, leading to their premature activation inside acinar cells. This results in autodigestion of pancreatic tissue and the clinical presentation of pancreatitis.", "src": "Monkey Intel", "lec": "Lec 52", "topic": "Liver: Liver Failure / Transplant"}, {"id": "q91fa88a", "q": "A 47-year-old man presents to the emergency department with acute-onset epigastric pain radiating to his back. He reports nausea and has a history of heavy alcohol use. Physical exam reveals epigastric tenderness without rebound. Laboratory tests are ordered. Which of the following statements best reflects current recommendations regarding enzymatic testing for this patient's condition?", "opts": ["Testing both serum lipase and amylase provides the highest diagnostic accuracy and is always recommended.", "Serum amylase should be ordered alone because it rises earlier than lipase.", "Lipase is sufficient for diagnosis and preferred over amylase due to better specificity and cost-effectiveness.", "Neither lipase nor amylase are useful in the diagnosis of acute pancreatitis.", "Fecal elastase is preferred over lipase due to higher sensitivity."], "ans": 2, "exp": "Current guidelines recommend using lipase alone for the diagnosis of acute pancreatitis because it is more specific, has a longer half-life, and avoids the increased cost of redundant amylase testing. Testing both amylase and lipase only marginally improves diagnostic efficiency.", "src": "Monkey Intel", "lec": "Lec 52", "topic": "Pancreas: Acute Pancreatitis"}, {"id": "q44283c4a", "q": "A 56-year-old woman presents with severe abdominal pain and elevated serum lipase. Despite initial treatment, her condition does not improve after 48 hours. The medical team decides to perform imaging to assess for complications. Which of the following is the most appropriate next step in imaging?", "opts": ["Abdominal X-ray to detect pancreatic calcifications.", "Non-contrast abdominal ultrasound to evaluate pancreatic necrosis.", "Endoscopic retrograde cholangiopancreatography (ERCP) as first-line imaging.", "Contrast-enhanced computed tomography to assess pancreatic inflammation and necrosis.", "MRI of the abdomen with gadolinium as the initial diagnostic test of choice."], "ans": 3, "exp": "Contrast-enhanced CT is the imaging modality of choice for evaluating acute pancreatitis when diagnosis is uncertain or the clinical course is complicated. It helps detect pancreatic necrosis, pseudocysts, or ductal calcifications which may be pathognomonic.", "src": "Monkey Intel", "lec": "Lec 52", "topic": "GI Infections: E. coli"}, {"id": "q13ed022c", "q": "A 48-year-old man presents with severe epigastric pain radiating to his back, nausea, and vomiting. He has a history of alcohol use. Laboratory evaluation reveals elevated serum lipase. On physical exam, his temperature is 38.7°C, heart rate is 112/min, respiratory rate is 24/min, and white blood cell count is 15,000/μL. Which of the following best describes the clinical significance of this patient’s findings?", "opts": ["They indicate a pseudocyst has ruptured into the peritoneal cavity.", "They fulfill criteria for systemic inflammatory response syndrome.", "They are sufficient to diagnose necrotizing pancreatitis.", "They indicate sepsis and should prompt immediate antibiotic administration.", "They confirm that the patient has developed chronic pancreatitis."], "ans": 1, "exp": "SIRS is defined as the presence of two or more of the following: ● Temperature > 38.3°C or < 36.0°C ● Heart rate > 90/min ● Respiratory rate > 20/min or PaCO₂ < 32 mmHg ● WBC > 12,000 or < 4,000 or > 10% bands This patient meets at least three criteria: elevated temperature, tachycardia, tachypnea, and leukocytosis. When SIRS is present in acute pancreatitis, it signals a higher risk of complications and worse prognosis.", "src": "Monkey Intel", "lec": "Lec 52", "topic": "Pancreas: Acute Pancreatitis"}, {"id": "q2eb6c51f", "q": "A 58-year-old man presents with progressive weight loss and greasy stools. He has a long history of alcohol use disorder. Imaging reveals pancreatic atrophy and parenchymal calcifications. Laboratory tests show mild hyperglycemia. Which of the following is most likely occurring in this patient?", "opts": ["Loss of pancreatic islet cells.", "Activation of zymogens within the pancreatic duct.", "Hyperplasia of ductal epithelial cells.", "Increased synthesis of pancreatic enzymes.", "Obstruction of the common hepatic duct."], "ans": 0, "exp": "This patient is presenting with signs of advanced chronic pancreatitis, commonly associated with long-term alcohol use. In chronic pancreatitis, repeated inflammation leads to fibrosis, atrophy, and loss of acinar tissue, including the endocrine islet cells of Langerhans. As the disease progresses, islet cell destruction leads to impaired insulin production and mild diabetes. Professor specifically called out weight loss and edema as related signs of pancreatic exocrine insufficiency.", "src": "Monkey Intel", "lec": "Lec 52", "topic": "Small Intestine: Malabsorption"}, {"id": "q18130574", "q": "A 63-year-old woman undergoes abdominal imaging for nonspecific upper abdominal pain. The scan reveals a 2 cm cystic lesion in the tail of the pancreas. The cyst contains clear, straw-colored fluid and is lined by cuboidal epithelium. The lesion is resected, and histology confirms the absence of cytologic atypia. Which of the following best characterizes this lesion?", "opts": ["It frequently progresses to invasive carcinoma.", "It is lined by mucin-producing columnar epithelium.", "It is associated with KRAS and TP53 mutations.", "It is a benign lesion with very low risk of malignant transformation.", "It is filled with thick, tenacious mucin."], "ans": 3, "exp": "This is a classic description of a serous cystadenoma, a benign cystic pancreatic neoplasm that contains clear, straw-colored fluid and is lined by glycogen-rich cuboidal cells without atypia. These tumors typically occur in women and are usually found incidentally. In contrast, mucinous cystic neoplasms can progress to invasive carcinomas and are lined by mucin-producing epithelium, often with mutations in KRAS, TP53, and RNF43. About 1 in 3 mucinous neoplasms become invasive. Additionally, both are noted as having origin in the pancreatic tail.", "src": "Monkey Intel", "lec": "Lec 52", "topic": "Liver: Viral Hepatitis"}, {"id": "q87b4697d", "q": "A 67-year-old man undergoes resection of a pancreatic head mass. Histologic examination of the main tumor reveals infiltrating ductal adenocarcinoma. Adjacent to the invasive carcinoma, small pancreatic ducts are lined by epithelium showing nuclear stratification, loss of polarity, and mitotic figures, but no evidence of stromal invasion. These changes most likely represent:", "opts": ["Chronic pancreatitis", "Pancreatic intraepithelial neoplasia", "Serous cystadenoma", "Mucinous cystic neoplasm", "Intraductal papillary mucinous neoplasm"], "ans": 1, "exp": "Pancreatic intraepithelial neoplasia (PanIN) is a noninvasive precursor lesion typically found in the small ducts of the pancreas. It often coexists adjacent to infiltrating ductal adenocarcinoma and shows increasing degrees of cytologic atypia as it progresses from PanIN-1 to PanIN-3. These lesions support the multistep model of pancreatic carcinogenesis.", "src": "Monkey Intel", "lec": "Lec 52", "topic": "Pancreas: Chronic Pancreatitis"}, {"id": "qc3b439e4", "q": "A 60-year-old man presents with progressive weight loss, fatigue, and abdominal discomfort. On physical exam, multiple episodes of superficial thrombophlebitis are noted on different extremities. These findings resolve spontaneously and then recur at new sites. Further workup reveals an ill-defined mass in the head of the pancreas. Which of the following best explains this patient’s presentation?", "opts": ["Hypersecretion of pancreatic lipase", "Trousseau syndrome due to tumor-associated platelet activation", "Portal vein thrombosis causing venous congestion", "Infection-induced vasculitis", "Autoimmune pancreatitis with systemic inflammation"], "ans": 1, "exp": "Trousseau syndrome (migratory thrombophlebitis) is a paraneoplastic syndrome commonly associated with pancreatic adenocarcinoma. It presents as recurrent, migratory venous thrombosis in superficial veins, caused by tumor secretion of procoagulant substances that activate platelets and the coagulation cascade. This can precede or accompany cancer diagnosis.", "src": "Monkey Intel", "lec": "Lec 52", "topic": "Pancreas: Pancreatic Cancer"}, {"id": "qf3a6cb8c", "q": "A 64-year-old man is undergoing treatment for pancreatic adenocarcinoma. His oncologist orders serial measurements of CA 19-9 levels during his follow-up appointments. Which of the following best explains the primary reason for checking this marker?", "opts": ["It is a first-line screening tool for detecting early-stage pancreatic cancer.", "It is a highly sensitive and specific marker used to confirm the diagnosis.", "It differentiates between serous and mucinous cystic pancreatic neoplasms.", "It is useful in monitoring therapeutic response and disease progression.", "It distinguishes pancreatic cancer from autoimmune pancreatitis."], "ans": 3, "exp": "CA 19-9 and CEA are tumor-associated antigens that may be elevated in pancreatic cancer but are not useful for initial diagnosis due to their lack of sensitivity and specificity. Instead, they are primarily used to follow a patient’s response to treatment and monitor for disease recurrence. It is not recommended for screening or distinguishing between different pancreatic pathologies as these antigens are present in a variety of cancers.", "src": "Monkey Intel", "lec": "Lec 52", "topic": "GI Infections: E. coli"}, {"id": "qc7f93673", "q": "A 52-year-old woman presents to the emergency department with severe epigastric pain radiating to her back. She is diagnosed with acute pancreatitis. On admission, she has transient hypotension and mild hypoxemia, which resolve within 36 hours. There are no signs of persistent organ dysfunction. Based on the outline presented in lecture, how should the severity of this patient's condition be categorized?", "opts": ["Mild acute pancreatitis", "Moderate acute pancreatitis", "Severe acute pancreatitis", "Necrotizing acute pancreatitis", "Chronic pancreatitis"], "ans": 1, "exp": "Severity: Mild: absence of organ failure & local or systemic complications Moderately severe: transient organ failure (resolves within 48 hrs) and/or local or systemic complications w/o persistent organ failure Severe: persistent organ failure (>48 hrs) that may involve one or multiple organs", "src": "Monkey Intel", "lec": "Lec 53", "topic": "Pancreas: Acute Pancreatitis"}, {"id": "qd8c14318", "q": "A 38-year-old man presents to the emergency department with sudden-onset severe epigastric pain radiating to the back. He has a history of poorly controlled type 2 diabetes and laboratory results reveal serum triglycerides of 1,320 mg/dL. Which of the following best explains the most likely cause of his acute condition?", "opts": ["Hypertriglyceridemia-induced pancreatic injury", "Chronic alcohol abuse", "Biliary obstruction due to microlithiasis", "Autoimmune pancreatitis", "Medication-induced acute hepatitis"], "ans": 0, "exp": "Serum triglyceride levels >1000 mg/dL are a known cause of acute pancreatitis and are especially relevant in patients with diabetes.", "src": "Monkey Intel", "lec": "Lec 53", "topic": "Biliary: Other"}, {"id": "q8a5d0ddf", "q": "A 60-year-old man presents with severe abdominal pain radiating to the back, nausea, and vomiting. He has a history of alcohol use disorder. On physical exam, he is hypotensive and has bluish discoloration along the flanks. Laboratory testing reveals significantly elevated serum lipase. CT scan confirms acute pancreatitis. Which of the following best explains the clinical significance of the flank finding?", "opts": ["It reflects localized fat necrosis from chronic pancreatitis.", "It is pathognomonic for perforated duodenal ulcer.", "It indicates intra-abdominal air due to intestinal obstruction.", "It is a sign of intra- or retroperitoneal hemorrhage.", "It reflects portal hypertension and caput medusae formation."], "ans": 3, "exp": "Turner’s sign is ecchymosis of the flanks seen in severe cases of acute pancreatitis. It results from hemorrhage extending into the subcutaneous tissues, typically indicating intra- or retroperitoneal bleeding. This is a poor prognostic sign and reflects serious disease progression.", "src": "Monkey Intel", "lec": "Lec 53", "topic": "Stomach: PUD / H. pylori"}, {"id": "q72900724", "q": "A 48-year-old woman presents with severe epigastric pain radiating to the back, nausea, and vomiting. On exam, she has ecchymotic discoloration in her periumbilical region. Laboratory findings show elevated serum amylase and lipase. Which of the following best describes the clinical significance of this physical exam finding?", "opts": ["Pathognomonic sign of acute pancreatitis", "Strong indicator of underlying biliary obstruction", "Diagnostic marker of pancreatic pseudocyst", "Suggestive of retroperitoneal bleeding", "Associated with splanchnic artery thrombosis"], "ans": 3, "exp": "Cullen's sign refers to ecchymotic discoloration within the periumbilical region, often seen in severe acute pancreatitis. While nonspecific, it suggests retroperitoneal hemorrhage due to pancreatic necrosis.", "src": "Monkey Intel", "lec": "Lec 53", "topic": "Biliary: Other"}, {"id": "qc10ad4bc", "q": "A 52-year-old man presents with sudden onset of severe epigastric pain radiating to his back, accompanied by nausea and vomiting. His serum lipase is measured at 4 times the upper limit of normal. Which of the following is the most appropriate next step in confirming the diagnosis?", "
