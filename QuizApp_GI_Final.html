Any size"], "ans": 3, "src": "Inlet", "lec": "Lecture 50:\nSurgical Aspects of the\n  Liver and Pa", "exp": "Answer: D. 5cm\n\n\n\n  -   According to lecture, 5cm is the prime size to remove things like pancreatic pseudocysts.", "topic": "Pancreas: Other"}, {"id": "q2e2a46e4", "q": "A patient is being treated for pancreatic cancer, in which the physician describes as the “encasement of blood vessels.” Which of the following is the most appropriate treatment for this patient?", "opts": ["Close monitoring and follow up", "Neoadjuvant chemotherapy", "Referral to a gastroenterologist", "Surgical resection", "Referral to vascular surgery"], "ans": 1, "src": "Inlet", "lec": "Lecture 50:\nSurgical Aspects of the\n  Liver and Pa", "exp": "Answer: B. Neoadjuvant chemotherapy\n\n\n\n  -   For a locally advanced pancreatic cancer, the best treatment is neoadjuvant chemotherapy (the tumor is\n      encased in blood vessels, so you would not want to cut it out).", "topic": "Pancreas: Pancreatic Cancer"}, {"id": "q67ec83cf", "q": "The PAIR procedure is the best way to treat Echinococcal Cysts. What does this procedure consist of?", "opts": ["A PAIR of sneakers", "Puncture, Aspirate, Inject, Resect", "Prepare, Accentuate, Inspect, Respect", "Positivity, Accountability, Integrity, Responsibility", "PAIR procedure is made up"], "ans": 1, "src": "Inlet", "lec": "Lecture 50:\nSurgical Aspects of the\n  Liver and Pa", "exp": "Answer: B. Puncture, Aspirate, Inject, Resect\n\n\n\n  -   Injection is usually of Albendazole or Mebendazole.", "topic": "Miscellaneous: Other"}, {"id": "q24bc159c", "q": "Which of the following patients with Liver Adenomas should undergo surgical resection of the mass? (More than one may be correct):", "opts": ["40 year old male with a 7 cm adenoma", "25 year old female with a 3 cm adenoma", "55 year old female with a 6 cm adenoma", "30 year old male with a 2 cm adenoma", "70 year old male with a 10 cm adenoma"], "ans": 0, "src": "Inlet", "lec": "Lecture 50:\nSurgical Aspects of the\n  Liver and Pa", "exp": "Answer: All but B\n\n\n\n  -   All men with adenomas of any size should have them removed. Females with adenomas < 5 cm should first stop\n      estrogen/anabolic steroids, and if it is > 5 cm then surgery can be considered.", "topic": "Liver: Viral Hepatitis"}, {"id": "q5e5d4cf5", "q": "Deficiency of which of the following vitamins can lead to angular cheilosis and atrophic glossitis?", "opts": ["Vitamin A", "Vitamin B", "Vitamin C", "Vitamin D", "Vitamin E"], "ans": 1, "src": "Inlet", "lec": "Lecture 55:\n   Medical Nutrition\nTherapy for GI Co", "exp": "Answer: B. Vitamin B\n\n\n\n  -   It is important to know that B vitamin deficiency (B2, B6, B3, B9, and B12) can lead to angular cheilosis a well as\n      atrophic gastritis.", "topic": "Miscellaneous: Other"}, {"id": "qb98cba87", "q": "What would you recommend for a patient to consume in order to increase/strengthen their gut microbiota?", "opts": ["Polyunsaturated fats", "Complex carbohydrates", "Proteins", "Vitamins and minerals", "Soluble fiber"], "ans": 4, "src": "Inlet", "lec": "Lecture 55:\n   Medical Nutrition\nTherapy for GI Co", "exp": "Answer: E. Soluble fiber", "topic": "Miscellaneous: Other"}, {"id": "q5df133c8", "q": "A patient presents with difficulty swallowing as well as eosinophilic infiltration of their esophagus, leading to trachealization of it. What would you recommend they remove from their diet in order to maximize their treatment of this issue?", "opts": ["Dairy", "Wheat", "Soy", "Amino acid based foods", "Peanut butter"], "ans": 3, "src": "Inlet", "lec": "Lecture 55:\n   Medical Nutrition\nTherapy for GI Co", "exp": "Answer: D. Amino acid based foods\n\n\n\n  -   It would be most efficacious to eliminate amino acid based foods in order to completely avoid allergens that cause\n      eosinophilic esophagitis, which is what this patient is experiencing. Unfortunately, this is not very sustainable, so\n      elimination of Dairy and Wheat would be the most likely treatment of this condition.", "topic": "Esophagus: Other"}, {"id": "q944eccbd", "q": "You are a patient with Celiac Disease. Which of the following would you consume in order to prevent symptoms of this disease?", "opts": ["Bulgur", "Millet", "Barley", "Wheat", "Rye"], "ans": 1, "src": "Inlet", "lec": "Lecture 55:\n   Medical Nutrition\nTherapy for GI Co", "exp": "Answer: B. Millet\n\n\n\n\n  -   Foods to avoid in Celiac Disease: Wheat, rye, bulgur, and barley; some also avoid oats, but gluten-free oats can be\n      consumed.\n  -   Be sure to take a multivitamin to supplement vitamins and minerals like iron, folate, niacin, B12, calcium, vitamin D,\n      phosphorus, zinc, etc.", "topic": "Small Intestine: Celiac Disease"}, {"id": "q1765f92a", "q": "Which of the following diets would you prescribe to someone suffering from Irritable Bowel Syndrome?", "opts": ["Low FODMAP Diet", "Ketogenic Diet", "High Protein; Low Fat Diet", "Mediterranean Diet", "Carnivore Diet"], "ans": 0, "src": "Inlet", "lec": "Lecture 55:\n   Medical Nutrition\nTherapy for GI Co", "exp": "Answer: A. Low FODMAP Diet\n\n\n\n  -   The low FODMAP diet attempts to eliminate fermentable oligo-, di-, and monosaccharides and polyols, as well as\n      short chain carbohydrates. This is the best diet for patients with IBS.", "topic": "Miscellaneous: IBS / Functional GI"}, {"id": "qb4fd483e", "q": "Which of the following is recommended for a patient suffering from Diverticulitis?", "opts": ["Clear Liquid→NPO→Low Fiber", "Clear Liquid→Low Fiber→NPO", "NPO→Clear Liquid→Low Fiber", "High Fiber", "Enteral Nutrition Only"], "ans": 2, "src": "Inlet", "lec": "Lecture 55:\n   Medical Nutrition\nTherapy for GI Co", "exp": "Answer: C. NPO→Clear Liquid→Low Fiber", "topic": "Colorectal: Diverticular Disease"}, {"id": "qdf46f5aa", "q": "What diet recommendations would you give to a patient with pancreatitis?", "opts": ["Start with oral feeds right away", "Enteral nutrition is preferred over parenteral", "High fat diet (50-55% of calorie intake)", "Parenteral nutrition is preferred over enteral", "Avoidance of proteins"], "ans": 1, "src": "Inlet", "lec": "Lecture 55:\n   Medical Nutrition\nTherapy for GI Co", "exp": "Answer: B. Enteral nutrition is preferred over parenteral nutrition\n\n\n\n  -    If it works, use it! It was emphasized that if a patient have a working GI system, use that as opposed to IV food.", "topic": "Liver: Viral Hepatitis"}, {"id": "q1591b16e", "q": "Which of the following reactions take place in Phase 2 of CYP450 detoxification of xenobiotics?", "opts": ["Glucuronidation", "Alkylation", "Deamination", "Oxidation", "Hydrolysis"], "ans": 0, "src": "Inlet", "lec": "Lecture 57:\nCytochrome P450", "exp": "Answer: A. Glucuronidation\n\n\n\n  -   Phase 2 takes place in the cytosol, and includes Glucuronidation, Acetylation, and Sulfonation (Conjugation).\n  -   Phase 1 takes place in the ER and includes all other reactions (Functionalization).", "topic": "Pharm: Cytochrome P450 / Drug Metabolism"}, {"id": "q370485db", "q": "N-acetyl-p-benzoquinone imine (NAPQI) is a side metabolite produced from the metabolism of acetaminophen, and is responsible for the highly toxic effects on the liver. Which of the following is the antidote for NAPQI toxicity?", "opts": ["Glutathione", "Sulfonamide", "Acetylcysteine", "Felodipine", "Indinavir"], "ans": 2, "src": "Inlet", "lec": "Lecture 57:\nCytochrome P450", "exp": "Answer: C. Acetylcysteine\n\n\n\n  -   This functions as the antidote for NAPQI toxicity by restoring glutathione levels back to normal.", "topic": "Liver: Drug-induced Liver Injury"}, {"id": "q5c96f2ad", "q": "Which of the following is an inhibitor of CYP450?", "opts": ["Alcohol", "Chloramphenicol", "Rifampin", "Sulfonylureas", "Phenytoin"], "ans": 1, "src": "Inlet", "lec": "Lecture 57:\nCytochrome P450", "exp": "Answer: B. Chloramphenicol\n\n\n\n  -   CRAP GPS are the inducers!\n        -  Carbamazepine, Rifampin, Alcohol, Phenytoin, Griseofulvin, Phenobarbital, Sulfonylureas.", "topic": "Biliary: PBC"}, {"id": "q8b27a0d9", "q": "A hemorrhoid is when the hemorrhoidal plexus becomes distended and enlarged. This plexus is between the canal system (of the anal canal) and the portal system of the rectum (...a kind of portal). The dentate line is their line of separation. Which area is made up of columnar epithelium?", "opts": ["Rectum", "Columnar - think portal needs long columns", "Anal canal", "Squamous with nerves"], "ans": 0, "src": "GI Final PQs", "lec": "L26 - Rose", "exp": "Answer: a. Rectum", "topic": "Colorectal: Hemorrhoids / Anorectal"}, {"id": "q4e8ff885", "q": "Your patient comes in with severe pain from chronic constipation. Where is their hemorrhoid?", "opts": ["Hemorrhoid above the dentate line", "Hemorrhoid below the dentate line", "External hemorrhoid"], "ans": 0, "src": "GI Final PQs", "lec": "L26 - Rose", "exp": "Answer: None. Hemorrhoid above the dentate line", "topic": "Colorectal: Hemorrhoids / Anorectal"}, {"id": "q26a7804d", "q": "Your patient has a hemorrhoid that prolapses when they cough and strain. They usually need manual reduction of this prolapse. What grade would you write in your chart?", "opts": ["1st degree hemorrhoid", "Do not prolapse", "2nd degree hemorrhoid", "Prolapse into anal canal but spontaneously reduce after defecation", "3rd degree hemorrhoid", "Large III prolapse cannot be treated with banding - hemorrhoidectomy preferred (wound closed to anoderm)", "4th degree hemorrhoid", "Remains partially prolapsed/cannot be reduced"], "ans": 4, "src": "GI Final PQs", "lec": "L26 - Rose", "exp": "Answer: c. 3rd degree hemorrhoid", "topic": "Colorectal: Hemorrhoids / Anorectal"}, {"id": "q58d71c97", "q": "Your patient comes in with pain in their perianal area. They have fever, chills, malaise, nausea and vomiting. You decided to do the most common diagnostic technique of a needle aspiration of pus under local anesthesia. You are aspirating which type of abscess at the column of Morgagni?", "opts": ["Supralevator abscess", "Suspect in rectal pain and systemic sx - post rectal and pelvirectal", "Infralevator abscess", "MC type - perianal, ischiorectal, postanal"], "ans": 2, "src": "GI Final PQs", "lec": "L26 - Rose", "exp": "Answer: b. Infralevator abscess", "topic": "Colorectal: Hemorrhoids / Anorectal"}, {"id": "qbcfee099", "q": "Your patient complains of extreme anal pain that starts at defecation and persists for hours. They have a history of generalized anxiety, diarrhea. The physical exam reveals a small clear linear ulcer at the margin of the anus, small amounts of bright red blood, enlarged papillae, and external skin tags. What is your diagnosis?", "opts": ["Fissure-in-ano", "Can come from anal surgery, basal cell carcinoma, proctitis", "Fistula-in-ano", "A/w perianal infxn = develop at infected crypt, need to treat with surgery"], "ans": 0, "src": "GI Final PQs", "lec": "L26 - Rose", "exp": "Answer: a. Fissure-in-ano", "topic": "Colorectal: Hemorrhoids / Anorectal"}, {"id": "q7042535b", "q": "Your patient has frequent anal sex and complains of pain and burning worse with bowel movements, lumbosacral radiculopathy, impotence, butt and thigh pain. The PE shows vesicles with red aureole and ruptured vesicles and ulcers. You treat them with acyclovir. What is their diagnosis?", "opts": ["Chlamydia", "MC STI - vesicles to ulcer - inguinal adenopathy is most prominent sign with tenesmus and pain - hematochezia too (treat with tetra/doxycycline, or erythromycin if allergic, diagnose with micro immunofluorescent antibody titer)", "Gonorrhea", "Pruritus, tenesmus, hematochezia, thick purulent yellow discharge - give procaine or pen G", "HIV", "Not discussed", "HPV", "Bleed easily, foul odor, priutis, macerated/friable papillary tumor-like projections (anal warts) - stop anal sex, treat both partners, better hygiene, can be pre-malignant", "HSV", "Syphilis", "Very painful, initial lesion at anal margin - treat with penicillin or tetracycline if allergic"], "ans": 0, "src": "GI Final PQs", "lec": "L26 - Rose", "exp": "Answer: None. Chlamydia", "topic": "Colorectal: Hemorrhoids / Anorectal"}, {"id": "q111b1a97", "q": "Your patient complains of loose, mucous, bloody stool with abdominal pain. The labs show leukocytes in the stool, and pathogens such as EHEC, Salmonella, Shigella, and C. Jejuni. What type of diarrhea are they having?", "opts": ["Inflammatory diarrhea", "Non-inflammatory secretory diarrhea", "Voluminous watery stools with mucus but NO blood and NO leukocytes", "Non-inflammatory osmotic diarrhea", "Small watery stool with NO mucus, NO blood, and NO leukocytes"], "ans": 0, "src": "GI Final PQs", "lec": "L27 - Blavo - Infectious Diarrhea", "exp": "Answer: None. Inflammatory diarrhea", "topic": "GI Infections: Diarrhea Types"}, {"id": "qa05fa9b6", "q": "This is an endotoxin (lipoprotein of Gram negative bacteria) that causes mucosal cell destruction that leads to bloody inflammatory diarrhea.", "opts": ["Cytotoxin", "Enterotoxin", "Exotoxin produced by pathogen in intestines to cause non-inflammatory secretory diarrhea - voluminous watery stool 1. And osmotic diarrhea"], "ans": 0, "src": "GI Final PQs", "lec": "L27 - Blavo - Infectious Diarrhea", "exp": "Answer: None. Cytotoxin", "topic": "GI Infections: Diarrhea Types"}, {"id": "q8df90e3f", "q": "All of the following are safe for pregnancy EXCEPT:", "opts": ["Psyllium/methylcellulose/wheat dextrin", "Polycarbonate", "Docusate sodium", "Mineral oil"], "ans": 0, "src": "GI Final PQs", "lec": "L28 - Parmar - Anti Diarrhea/Laxative drugs", "exp": "Answer: None. Psyllium/methylcellulose/wheat dextrin", "topic": "Pharm: Antidiarrheals / Laxatives"}, {"id": "qd0467f0a", "q": "These should not be used with dysentery or high fever:", "opts": ["Laxatives", "Antidiarrheals"], "ans": 0, "src": "GI Final PQs", "lec": "L28 - Parmar - Anti Diarrhea/Laxative drugs", "exp": "Answer: None. Laxatives", "topic": "Pharm: Antidiarrheals / Laxatives"}, {"id": "q65be0214", "q": "Maldigestion/Malabsorption is the impaired digestion of nutrients whereas Maldigestion/Malabsorption is the impaired transport of nutrients Pernicious anemia (decreased B12) would be classified as which malabsorption type?", "opts": ["Global", "Selective", "Primary/Congenital", "Acquired Deamidation puts negative charge on gluten peptides and increases their bind to HLA-DR3-DQ2 and/or HLA-DR4-DQ8 which stimulates gliadin-reactive T cells W purulent steatorrhea and flatulence", "Celiac disease", "CrohnÓs", "Cystic fibrosis All of the following are used for diagnosing the disease above EXCEPT:", "Deamidated gliadin peptide (DGP)-IgG antibody test in IgA deficiency", "Tissue transglutaminase (tTG)-IgA antibody test", "MMA values", "Upper endoscopy with small bowel biopsy Carbs/Fat/Protein malabsorption = Pale voluminous stool, steatorrhea, diarrhea without flatulence Carbs/Fat/Protein malabsorption = Acidic watery diarrhea, with flatulence Carbs/Fat/Protein malabsorption = Amenorrhea, muscle atrophy, edema"], "ans": 0, "src": "GI Final PQs", "lec": "L30 - Williams - Malabsorption Syndromes", "exp": "Answer: None. Global", "topic": "Small Intestine: Malabsorption"}, {"id": "qad0cc3b0", "q": "This nutrient is absorbed in the duodenum:", "opts": ["Iron", "Vit A", "Vit B9 (Folic acid/Folate)", "Vit B12", "Vit D", "Vit E", "Vit K High MMA - vit B9 / B12, Low MMA - vit B9 / B12 Absorbed in jejunum - vit B9 / B12, absorbed in the ileum - vit B9 / B12 All things eyes - night blindness, dry eyes, cornea clouding, bitotÓs spots, follicular hyperkeratosis _________________ Glossitis, oral ulcers, macrocytic anemia (MCV > 100 w/ hypersegmented neutrophils) _________________ Reduced intestinal absorption of calcium and phosphorus - hypocalcemia - leads to osteomalacia in adults and kids (+RicketÓs) - bone pain/tenderness, muscle weakness, fractures, difficulty walking _________________ Ataxia, hyporeflexia, loss of proprioception, loss of vibratory sense - synthesizes collagen", "Resident macrophage that phagocytose bacteria, and RBCs and recycles iron"], "ans": 0, "src": "GI Final PQs", "lec": "L52 - Bonfil - Jaundice", "exp": "Answer: None. Fenestrated endothelial cell that receive blood from hepatic artery and portal vein", "topic": "Liver: Bilirubin Metabolism / Jaundice"}, {"id": "qecd241b7", "q": "UGT1A1 is present in _________ and makes bilirubin into its _______ form which is _________.", "opts": ["Liver", "Blood", "Gallbladder", "Duodenum", "Conjugated", "Unconjugated", "Water-soluble", "Water-insoluble", "Bilirubin", "80% is derived from senescent erythrocytes removed from circulation by spleen (hemoglobin W heme W iron + biliverdin W unconjugated bilirubin W +albumin complex"], "ans": 8, "src": "GI Final PQs", "lec": "L52 - Bonfil - Jaundice", "exp": "Answer: i. Bilirubin", "topic": "Abdominal Trauma: Spleen"}, {"id": "qf98c689a", "q": "Your patient presents with the following pathology. What is their serum bilirubin levels most likely to be? Jaundice = unconjugated hyperbilirubinemia (increased production of free bili, decreased hepatic uptake, or impaired bilirubin conjugation) - impaired transport of conjugated bilirubin in bile canaliculi = conjugated hyperbilirubinemia", "opts": ["0.2-1.2 mg/dL", "Normal serum total bilirubin", "0-0.3 mg/dL", "Normal serum conjugated direct bilirubin", "2-3 mg/dL", "Scleral icterus", "4-5 mg/dL", "Skin yellowing", "2-5 mg/dL", "Dubin-Johnson plasma bilirubin levels after backing up into sinusoid via MRP3"], "ans": 4, "src": "GI Final PQs", "lec": "L52 - Bonfil - Jaundice", "exp": "Answer: c. 2-3 mg/dL", "topic": "Liver: Hereditary Hyperbilirubinemias"}, {"id": "q0b1cc348", "q": "Your baby is born with transient jaundice due to low UGT levels. Around two weeks after birth, UGT increases. If still high, itÓll collect in basal ganglia and cause irreversible brain damage. What is their diagnosis?", "opts": ["Physiologic jaundice of newborn", "GilbertÓs syndrome", "Crigler-Najjar syndrome", "Dubin-Johnson syndrome", "Rotor syndrome"], "ans": 0, "src": "GI Final PQs", "lec": "L52 - Bonfil - Jaundice", "exp": "Answer: None. Physiologic jaundice of newborn", "topic": "Liver: Hereditary Hyperbilirubinemias"}, {"id": "qbea882e4", "q": "This disease is due to an autosomal recessive mutation where two bases are inserted at the promoter of the UGT1A1 gene causing UGT levels 30% of normal. This causes low conjugated bilirubin and a buildup of unconjugated bilirubin. It is usually harmless until a hemolytic condition like stress/starvation/infection increases unconjugated bilirubin and leads to jaundice. What is the disease?", "opts": ["Physiologic jaundice of newborn", "GilbertÓs syndrome", "Crigler-Najjar syndrome", "Dubin-Johnson syndrome", "Rotor syndrome"], "ans": 0, "src": "GI Final PQs", "lec": "L52 - Bonfil - Jaundice", "exp": "Answer: None. Physiologic jaundice of newborn", "topic": "Liver: Hereditary Hyperbilirubinemias"}, {"id": "qe74adcf3", "q": "Type I and Type II are both autosomal recessive mutations of the UGT1A1 gene. Type I has buildup of unconjugated bilirubin because of complete absence of UGT. This leads to kernicterus - brain damage and death. Type II is partial UGT activity so while there is increased buildup of unconjugated bilirubin, there is still some conjugated bilirubin. This type of jaundice is caused by which disease?", "opts": ["Physiologic jaundice of newborn", "GilbertÓs syndrome", "Crigler-Najjar syndrome", "Dubin-Johnson syndrome", "Rotor syndrome"], "ans": 0, "src": "GI Final PQs", "lec": "L52 - Bonfil - Jaundice", "exp": "Answer: None. Physiologic jaundice of newborn", "topic": "Liver: Hereditary Hyperbilirubinemias"}, {"id": "qefbfedbc", "q": "This is a rare autosomal recessive disorder due to a mutation of the ABCC2 gene that makes the MRP2 efflux transported non-functional. This way conjugated bilirubin cannot leave the hepatocyte and moves back via MRP3 into the sinusoid. Thus the plasma bilirubin levels increase to 2-5 mg/dL and cause jaundice and black liver d/t melanin-like granular deposits into Kupffer and erythrocyte cells. In women, the jaundice comes with oral contraceptives or pregnancy. What is the diagnosis?", "opts": ["Physiologic jaundice of newborn", "GilbertÓs syndrome", "Crigler-Najjar syndrome", "Dubin-Johnson syndrome", "Rotor syndrome", "Same as DR - just no black liver pigmentation"], "ans": 5, "src": "GI Final PQs", "lec": "L52 - Bonfil - Jaundice", "exp": "Answer: i. Same as DR - just no black liver pigmentation", "topic": "Liver: Hereditary Hyperbilirubinemias"}, {"id": "qf33f9581", "q": "Your patient is in her third trimester of pregnancy and develops a pruritic. It shows centrilobular stop to biliary flow. This is confirmed with high levels of the total bile acidic. The patient has PSC and mutation in which gene?", "opts": ["Intrahepatic cholestasis", "Extrahepatic cholestasis"], "ans": 0, "src": "GI Final PQs", "lec": "L52 - Bonfil - Jaundice", "exp": "Answer: None. Intrahepatic cholestasis", "topic": "Liver: Bilirubin Metabolism / Jaundice"}, {"id": "qc6af3a54", "q": "Your patient is in her third trimester of pregnancy and develops pruritus. The parent has high levels of placental and gonadal hormones on their labs. Their liver shows centrilobular cholestasis. What is the gene mutation aligned with their diagnosis?", "opts": ["ABCB4", "ABCC2", "Dubin Johnson", "ALAS2", "ALA synthase in erythroid cells", "BRCA2", "Ashkenazi Jews - pancreatic cancer", "C282Y", "Hereditary hemochromatosis", "Gp130", "Inflammatory hepatocellular adenoma", "HNF1-a", "Hepatocellular adenoma", "UDPG", "Crigler-Najjar"], "ans": 0, "src": "GI Final PQs", "lec": "L52 - Bonfil - Jaundice", "exp": "Answer: None. ABCB4", "topic": "Liver: Hereditary Hyperbilirubinemias"}, {"id": "q2033fa58", "q": "The most common extrahepatic biliary obstruction in kids is:", "opts": ["Congenital extrapheatic biliary atresia", "Cystic fibrosis", "Gallstones", "Biliary obstruction", "Bile extravasation"], "ans": 0, "src": "GI Final PQs", "lec": "L52 - Bonfil - Jaundice", "exp": "Answer: None. Congenital extrapheatic biliary atresia", "topic": "Biliary: Congenital / Neonatal"}, {"id": "q7bee04a9", "q": "The most common extrahepatic biliary obstruction in kids is: Intrahepatic cholestasis", "opts": ["Congenital extrapheatic biliary atresia", "Cystic fibrosis", "Gallstones", "Biliary obstruction", "Bile extravasation Extrahepatic cholestasis = blockage of large bile ducts outside of liver ± Primarily anatomic ± MCC of biliary obstruction in adults = gallstones ± MCC of biliary obstruction in kids = cystic fibrosis, congenital extrapheatic biliary atresia ± Bile plugs in dilated bile canaliculi ± Feathery degeneration =  enlarged hepatocytes with intracytoplasmic droplets of bile pigments = foamy appearance ± Apoptotic hepatocytes - bile toxic ± Extravasation of bile = can it be phagocytosed by Kupffer cell ± Biliary obstruction W distended ductules W ductal proliferation reactions W edema and periductal neutrophils W can rupture and lead to bile lake formation surrounded by necrotic hepatocytes ± Sx: jaundice, pruritus, skin xanthomas, pale stools, steatorrhea ± Labs: serum alkaline phosphatase ± Elevated gamma-glutamyl transpeptidase"], "ans": 0, "src": "GI Final PQs", "lec": "L52 - Bonfil - Jaundice", "exp": "Answer: None. Congenital extrapheatic biliary atresia", "topic": "Biliary: Congenital / Neonatal"}, {"id": "qebdf55d4", "q": "Your patient presents with jaundice, pruritus, skin xanthomas, and pale stools. You see foamy hepatocytes with bile pigment and a feathery degeneration. Bile plugs are seen in dilated bile canaliculi, and eventually bile lakes form surrounded by necrotic hepatocytes. The labs show elevated GGT and serum alkaline phosphatase. What is the diagnosis?", "opts": ["Intrahepatic cholestasis", "Extrahepatic cholestasis", "blockage of large bile ducts outside of liver"], "ans": 0, "src": "GI Final PQs", "lec": "L52 - Bonfil - Jaundice", "exp": "Answer: None. Intrahepatic cholestasis", "topic": "Liver: Bilirubin Metabolism / Jaundice"}, {"id": "qf55c2bbb", "q": "Your 30-year-old female patient presents today with a benign liver tumor. It has a central stellate scar seen below, and microscopically the parenchyma is made up of normal hepatocytes with nodular architecture in well-demarcated localized areas that are separated by radiating fibrous septae. What is her diagnosis?", "opts": ["Cavernous hemangioma", "MC primary benign tumor in liver", "Focal Nodular hyperplasia", "Benign liver tumor = well-demarcated localized 1-10 cm central gray stellate star fibrous septa radiate in 30-50 females", "Nodular regenerative hyperplasia", "Cover entire liver, NOT separated by fibrosis W leads to portal HTN"], "ans": 2, "src": "GI Final PQs", "lec": "L53 - Bonfil - Liver Tumors", "exp": "Answer: b. Focal Nodular hyperplasia", "topic": "Liver: Liver Tumors"}, {"id": "qca55e73b", "q": "Your 30-year-old female patient has a translocation in the nuclei of her hepatocytes. She has been taking oral contraceptives for a long time now. There is a very high risk for malignant transformation to hepatocellular carcinoma now due to the dysplasia developing in areas nearby. What is her benign liver tumor?", "opts": ["Hepatocellular adenomas", "Rare, 30-40 y/o females", "HNF1-alpha inactivated hepatocellular adenoma", "HNF1-alpha mutation (only 10% germline a/w MODY3 occurrence) W increased fatty acid lipid synthesis W decreased L-FABP W steatosis W benign liver tumor", "B-catenin activated hepatocellular adenoma", "B-catenin translocation - benign liver tumor with very high risk for malignant transformation", "Inflammatory hepatocellular adenoma", "Gp130 mutation (co-receptor for IL6) W overexpression of CRP (acute phase reactants)"], "ans": 4, "src": "GI Final PQs", "lec": "L53 - Bonfil - Liver Tumors", "exp": "Answer: c. B-catenin activated hepatocellular adenoma", "topic": "Liver: Liver Tumors"}, {"id": "qaf634 ": "L53 - Bonfil - Liver Tumors", "exp": "Answer: None. ALA synthase", "topic": "Porphyria: General / Heme Pathway"}, {"id": "q74a72269", "q": "You notice your male pediatric patient has severe photosensitivity early on in his childhood. He has low iron stores, liver disease and gallstones. He has high protoporphyrin in erythrocytes. He developed x-linked sideroblastic anemia after lead poisoning caused a loss of function in the same gene that caused his porphyria. This porphyria is caused by a gain of function mutation in which rate limiting enzyme? XLP", "opts": ["ALA synthase", "ALA dehydratase", "Porphobilinogen deaminase/Uroporphyrinogen I synthase", "Uroporphyrinogen III synthase & cosynthase", "Uroporphyrinogen III decarboxylase", "Coproporphyrinogen III oxidase", "Protoporphyrinogen IX oxidase", "Ferrochelatase"], "ans": 0, "src": "GI Final PQs", "lec": "L53 - Bonfil - Liver Tumors", "exp": "Answer: None. ALA synthase", "topic": "Porphyria: General / Heme Pathway"}, {"id": "q8eca74a9", "q": "You performed a lateral pancreaticojejunostomy, also known as a Puestow operation, on this patient. What was their diagnosis?", "opts": ["Acute pancreatitis", "Chronic pancreatitis", "Make sure they quit drinking", "Pancreatic adenocarcinoma", "Hepatic abscess", "Amebic abscess", "Echinococcal hydatid cyst"], "ans": 0, "src": "GI Final PQs", "lec": "L55 - Frost - Liver Surgery", "exp": "Answer: None. Acute pancreatitis", "topic": "Pancreas: Acute Pancreatitis"}, {"id": "qbb442cf9", "q": "A proximal pancreatic tumor you would treat with:", "opts": ["Pancreaticoduodenectomy (Whipple procedure)", "For head of pancreas adenocarcinoma", "Pancreatectomy and splenectomy", "For body and tail pancreas tumor"], "ans": 0, "src": "GI Final PQs", "lec": "L55 - Frost - Liver Surgery", "exp": "Answer: a. Pancreaticoduodenectomy (Whipple procedure)", "topic": "Abdominal Trauma: Spleen"}, {"id": "qca9345da", "q": "All are causes of acute liver failure EXCEPT:", "opts": ["Acetaminophen ov opic": "Liver: Bilirubin Metabolism / Jaundice"}, {"id": "qfe6d992e", "q": "You find a calcified, solitary mass in the right lobe of your patient. They present with pain and hepatomegaly. You confirm the diagnosis with a cason skin test, and excise the mass without rupture avoiding anaphylaxis. What is their diagnosis?", "opts": ["Hepatic abscess", "Amebic abscess", "Echinococcal (Hydatid) Cyst"], "ans": 0, "src": "GI Final PQs", "lec": "L55 - Frost - Liver Surgery", "exp": "Answer: None. Hepatic abscess", "topic": "Miscellaneous: Other"}, {"id": "qbfc1c5f6", "q": "Acute pancreatitis - alcohol intake, gallstones, hyperlipidemia - fatty necrosis - SIRS (systemic inflammatory response - leukocytosis, edema, shock)", "opts": ["Increased intrapancreatic ductal pressure accumulates enzymes into interstitium and compromises blood flow", "Pancreatic duct obstruction (ie. gallstones, neoplasm, parasite)", "Injury to acinar cells that causes the release of digestive enzymes (calcium) and autodigestion of the pancreas", "Primary acinar cell injury", "Increased contraction of the Sphincter of Oddi damaging acinar cells and induced oxidative stress that generates free radicals", "Alcohol consumption Your patient has drunk a large amount of alcohol in a short amount of time, and presents with an acute onset of severe abdominal pain. They have high levels of amylase and lipase. They have a positive Cullen sign. What is the most likely pathology of their diagnosis?"], "ans": 4, "src": "GI Final PQs", "lec": "L56 - B Jones - Exocrine Pancreas Patho", "exp": "Answer: c. Increased contraction of the Sphincter of Oddi damaging acinar cells and induced oxidative stress that generates free radicals", "topic": "Pancreas: Acute Pancreatitis"}, {"id": "qe4bb4a20", "q": "Fill out the following and select which is a systemic complication of acute pancreatitis:", "opts": ["Pancreatic __________", "Splenic _____________", "Gastric _____________", "Pseudoaneurysm formation", "Organ failure/shoc wer: D. Grade IV — laceration extending into collecting system with urinary extravasation", "src": "Large Review 2026", "lec": "Lec 37", "topic": "Abdominal Trauma: General / AAA", "id": "qlr26_8e1e43cc"}, {"q": "A trauma patient has a hepatic injury described as a subcapsular hematoma involving >50% surface area with active bleeding, or an intraparenchymal hematoma >10 cm. What grade of liver injury is this?", "opts": ["Grade I", "Grade II", "Grade III", "Grade V", "Grade VI"], "ans": 2, "exp": "Answer: C. Grade III", "src": "Large Review 2026", "lec": "Lec 37", "topic": "Abdominal Trauma: General / AAA", "id": "qlr26_fec62547"}, {"q": "Which of the following is listed as a risk factor for diverticulitis?", "opts": ["High-fiber diet", "Vigorous physical activity", "High intake of red meat", "BMI 18.5-25", "Never smoking"], "ans": 2, "exp": "Answer: C. High intake of red meat", "src": "Large Review 2026", "lec": "Lec 38", "topic": "Colorectal: Diverticular Disease", "id": "qlr26_c0b1961b"}, {"q": "According to the lecture, smoking increases the risk of which diverticulitis-related outcome?", "opts": ["Diverticulitis with perforation", "Diverticulitis with gallstones", "Diverticulitis with appendicitis", "Diverticulitis with pancreatitis", "Diverticulitis with renal stones"], "ans": 0, "exp": "Answer: A. Diverticulitis with perforation", "src": "Large Review 2026", "lec": "Lec 38", "topic": "Colorectal: Diverticular Disease", "id": "qlr26_f3da8e95"}, {"q": "A 68-year-old woman presents with fever and LLQ pain concerning for acute diverticulitis. Which imaging study is the study of choice?", "opts": ["Abdominal X-ray", "Abdominal ultrasound", "MRI abdomen and pelvis", "CT abdomen and pelvis", "Contrast enema only"], "ans": 3, "exp": "Answer: D. CT abdomen and pelvis", "src": "Large Review 2026", "lec": "Lec 38", "topic": "Colorectal: Diverticular Disease", "id": "qlr26_35061c00"}, {"q": "A patient with uncomplicated diverticulitis is being considered for hospital admission. Which finding would support admission?", "opts": ["Age 35 with mild pain controlled at home", "Tolerating oral intake and reliable follow-up", "Age greater than 70 years", "BMI of 22", "No comorbidities"], "ans": 2, "exp": "Answer: C. Age greater than 70 years", "src": "Large Review 2026", "lec": "Lec 38", "topic": "Colorectal: Diverticular Disease", "id": "qlr26_bd5c7ad7"}, {"q": "What is the most common location of abdominal pain in diverticulitis?", "opts": ["Left lower quadrant", "Right lower quadrant", "Epigastric region", "Right upper quadrant", "Suprapubic region"], "ans": 0, "exp": "Answer: A. Left lower quadrant", "src": "Large Review 2026", "lec": "Lec 38", "topic": "Colorectal: Diverticular Disease", "id": "qlr26_0fb77158"}, {"q": "What is the major pathway of ethanol metabolism?", "opts": ["MEOS", "Cytochrome P450 2E1", "Alcohol dehydrogenase", "Acetyl-CoA carboxylase", "Glucuronidation"], "ans": 2, "exp": "Answer: C. Alcohol dehydrogenase", "src": "Large Review 2026", "lec": "Lec 39", "topic": "Liver: Alcoholic Liver Disease", "id": "qlr26_b0f4616e"}, {"q": "Which findings are listed as features of decompensated cirrhosis?", "opts": ["Fatigue only", "Ascites, variceal hemorrhage, encephalopathy", "Mild increase in LFTs only", "Usually asymptomatic", "Normal physical exam"], "ans": 1, "exp": "Answer: B. Ascites, variceal hemorrhage, encephalopathy", "src": "Large Review 2026", "lec": "Lec 39", "topic": "Liver: Cirrhosis & Complications", "id": "qlr26_145679bd"}, {"q": "A 52-year-old man with alcoholic hepatitis has a discriminant function of 36. Which of the following is true?", "opts": ["Mortality is less than 10%", "The condition is always asymptomatic", "Abstinence will immediately resolve symptoms", "Steroids are contraindicated", "Mortality is greater than 50%"], "ans": 4, "exp": "Answer: E. Mortality is greater than 50% — DF >= 32 indicates severe disease", "src": "Large Review 2026", "lec": "Lec 39", "topic": "Liver: Alcoholic Liver Disease", "id": "qlr26_86e686a9"}, {"q": "A patient with MASH has noninvasive testing showing F2 fibrosis. Which medication is indicated for F2/F3 fibrosis?", "opts": ["Semaglutide", "Resmetirom", "Disulfiram", "Prednisone", "Lactulose"], "ans": 1, "exp": "Answer: B. Resmetirom — FDA-approved for MASH with F2/F3 fibrosis", "src": "Large Review 2026", "lec": "Lec 39", "topic": "Liver: NAFLD / NASH", "id": "qlr26_5f6b252a"}, {"q": "A 45-year-old woman with obesity, T2DM, HTN, sleep apnea, and hyperlipidemia has hepatomegaly, elevated LFTs with ALT > AST, negative hepatitis panel, and negative ANA. Which diagnosis best fits?", "opts": ["Alcoholic hepatitis", "Acute viral hepatitis", "Decompensated cirrhosis", "Metabolic dysfunction-associated steatohepatitis", "Acetaldehyde dehydrogenase deficiency"], "ans": 3, "exp": "Answer: D. Metabolic dysfunction-associated steatohepatitis (MASH)", "src": "Large Review 2026", "lec": "Lec 39", "topic": "Liver: NAFLD / NASH", "id": "qlr26_77b8d8b5"}, {"q": "The most characteristic antibody finding in PBC is:", "opts": ["ANA", "Anti-LKM", "Anti-mitochondrial antibody", "Anti-smooth muscle antibody"], "ans": 2, "exp": "Answer: C. Anti-mitochondrial antibody (AMA)", "src": "Large Review 2026", "lec": "Lec 40", "topic": "Biliary: PBC", "id": "qlr26_81384aa7"}, {"q": "Hereditary hemochromatosis is most commonly caused by mutations in:", "opts": ["ATP7B", "UGT1A1", "C282Y", "ABCC2"], "ans": 2, "exp": "Answer: C. C282Y — most common HFE gene mutation", "src": "Large Review 2026", "lec": "Lec 40", "topic": "Liver: Hereditary / Metabolic Liver Disease", "id": "qlr26_f643da52"}, {"q": "Mainstay treatment for hereditary hemochromatosis is:", "opts": ["Chelation therapy", "Steroids", "Phlebotomy", "Liver transplant"], "ans": 2, "exp": "Answer: C. Phlebotomy", "src": "Large Review 2026", "lec": "Lec 40", "topic": "Liver: Hereditary / Metabolic Liver Disease", "id": "qlr26_0e6af1d7"}, {"q": "Which bulk-forming laxative is preferred during pregnancy?", "opts": ["Senna", "Magnesium citrate", "Psyllium", "Bisacodyl"], "ans": 2, "exp": "Answer: C. Psyllium", "src": "Large Review 2026", "lec": "Lec 41", "topic": "Pharm: Antidiarrheals / Laxatives", "id": "qlr26_0ea0ecd8"}, {"q": "A major adverse effect associated with chronic mineral oil use is:", "opts": ["Fat-soluble vitamin deficiency", "Aspiration pneumonia", "Rebound constipation", "Hypermagnesemia"], "ans": 0, "exp": "Answer: Both A (fat-soluble vitamin deficiency) and B (aspiration pneumonia) are correct", "src": "Large Review 2026", "lec": "Lec 41", "topic": "Pharm: Antidiarrheals / Laxatives", "id": "qlr26_4b331913"}, {"q": "Lubiprostone works primarily by:", "opts": ["Activating guanylate cyclase-C receptors", "Stimulating CIC-2 chloride channels", "Inhibiting intestinal opioid receptors", "Blocking sodium absorption in the colon"], "ans": 1, "exp": "Answer: B. Stimulating CIC-2 chloride channels", "src": "Large Review 2026", "lec": "Lec 41", "topic": "Pharm: Antidiarrheals / Laxatives", "id": "qlr26_42ebe099"}, {"q": "Crigler-Najjar Type I is caused by:", "opts": ["Excess UGT1A1 activity", "Absent UGT1A1 activity", "Increased bilirubin excretion", "Hemolysis only"], "ans": 1, "exp": "Answer: B. Absent UGT1A1 activity", "src": "Large Review 2026", "lec": "Lec 42", "topic": "Liver: Bilirubin Metabolism / Jaundice", "id": "qlr26_de9bcb8c"}, {"q": "Gilbert syndrome typically presents with:", "opts": ["Severe liver failure", "Mild unconjugated hyperbilirubinemia", "Conjugated hyperbilirubinemia only", "Massive hepatomegaly"], "ans": 1, "exp": "Answer: B. Mild unconjugated hyperbilirubinemia", "src": "Large Review 2026", "lec": "Lec 42", "topic": "Liver: Bilirubin Metabolism / Jaundice", "id": "qlr26_79b6e8a0"}, {"q": "Which liver zone is most vulnerable to ischemic injury?", "opts": ["Zone 1", "Zone 2", "Zone 3", "Portal triad"], "ans": 2, "exp": "Answer: C. Zone 3 (pericentral/centrilobular zone)", "src": "Large Review 2026", "lec": "Lec 42", "topic": "Liver: Liver Histology / Pathology", "id": "qlr26_0d072d38"}, {"q": "Hepatic stellate (Ito) cells are responsible for producing:", "opts": ["Bilirubin", "Albumin", "Collagen type I and III", "Ceruloplasmin"], "ans": 2, "exp": "Answer: C. Collagen type I and III — key mediators of hepatic fibrosis", "src": "Large Review 2026", "lec": "Lec 43", "topic": "Liver: Cirrhosis & Complications", "id": "qlr26_13bc5d24"}, {"q": "Mallory hyaline bodies are classically associated with:", "opts": ["PSC", "Viral hepatitis", "Alcoholic liver cirrhosis", "Hemochromatosis"], "ans": 2, "exp": "Answer: C. Alcoholic liver cirrhosis", "src": "Large Review 2026", "lec": "Lec 43", "topic": "Liver: Cirrhosis & Complications", "id": "qlr26_d76ec958"}, {"q": "The \"hub-nailed\" liver appearance is associated with:", "opts": ["Acute hepatitis", "Micronodular cirrhosis", "PSC", "Wilson disease"], "ans": 1, "exp": "Answer: B. Micronodular cirrhosis", "src": "Large Review 2026", "lec": "Lec 43", "topic": "Liver: Cirrhosis & Complications", "id": "qlr26_cd71dafe"}, {"q": "A 42-year-old woman has episodic RUQ pain after meals. Imaging shows gallstones but no persistent obstruction. A gallstone intermittently lodges in the biliary tree. Which diagnosis fits?", "opts": ["Biliary colic", "Primary sclerosing cholangitis", "Biliary atresia", "Caroli disease", "IgG4-related cholangitis"], "ans": 0, "exp": "Answer: A. Biliary colic", "src": "Large Review 2026", "lec": "Lec 44", "topic": "Biliary: Cholelithiasis / Gallstones", "id": "qlr26_45ccf359"}, {"q": "A patient has gallstones within the common bile duct. Which term describes this pathology?", "opts": ["Cholelithiasis", "Choledocholithiasis", "Porcelain gallbladder", "Cholesterolosis", "Caroli disease"], "ans": 1, "exp": "Answer: B. Choledocholithiasis", "src": "Large Review 2026", "lec": "Lec 44", "topic": "Biliary: Choledocholithiasis / Cholangitis", "id": "qlr26_26803dcb"}, {"q": "A middle-aged woman presents with severe itching, hypercholesterolemia, xanthelasma, steatorrhea, and anti-mitochondrial antibodies. Liver biopsy shows interlobular bile ducts destroyed by lymphoplasmacytic inflammation. Which diagnosis is most consistent?", "opts": ["Primary biliary cholangitis", "Primary sclerosing cholangitis", "IgG4-related cholangitis", "Cholangiocarcinoma", "Biliary atresia"], "ans": 0, "exp": "Answer: A. Primary biliary cholangitis", "src": "Large Review 2026", "lec": "Lec 44", "topic": "Biliary: PBC", "id": "qlr26_e4e1f749"}, {"q": "A 35-year-old man with ulcerative colitis presents with fatigue, itching, and jaundice. Biopsy shows \"onion-skin\" fibrosis around atrophic ducts and \"tombstone\" scars. Which diagnosis fits?", "opts": ["Primary biliary cholangitis", "IgG4-related cholangitis", "Primary sclerosing cholangitis", "Biliary atresia", "Cholangiocarcinoma"], "ans": 2, "exp": "Answer: C. Primary sclerosing cholangitis", "src": "Large Review 2026", "lec": "Lec 44", "topic": "IBD: IBD + PSC", "id": "qlr26_57a47ecc"}, {"q": "A young patient presents with intermittent abdominal pain, fever, hepatomegaly, and jaundice. Imaging shows multiple cystic dilations of the intrahepatic biliary tree. Which diagnosis is most consistent?", "opts": ["Caroli disease", "Choledochal cyst", "Biliary atresia", "Primary biliary cholangitis", "Primary sclerosing cholangitis"], "ans": 0, "exp": "Answer: A. Caroli disease", "src": "Large Review 2026", "lec": "Lec 44", "topic": "Liver: Congenital Liver Disorders", "id": "qlr26_aaaa00fe"}, {"q": "Which structure supplies blood to the gallbladder and runs through the triangle of Calot?", "opts": ["Cystic artery", "Portal vein", "Common bile duct", "Left hepatic duct", "Pancreatic duct"], "ans": 0, "exp": "Answer: A. Cystic artery", "src": "Large Review 2026", "lec": "Lec 45", "topic": "Biliary: Cholecystitis", "id": "qlr26_26fb8e13"}, {"q": "A patient is found incidentally to have a gallbladder polyp measuring >20 mm. What is the recommended management?", "opts": ["Observation only", "Repeat imaging in 6 months", "Open cholecystectomy", "Extended cholecystectomy", "Cholecystectomy only if gallstones are present"], "ans": 3, "exp": "Answer: D. Extended cholecystectomy — polyps >20 mm have high malignancy risk", "src": "Large Review 2026", "lec": "Lec 45", "topic": "Biliary: Gallbladder Neoplasia", "id": "qlr26_8eaaba26"}, {"q": "Which risk factor is strongly associated with the development of gallbladder cancer?", "opts": ["Gallstones, especially stones >3 cm", "Small gallbladder polyps <5 mm", "Bile produced at a constant rate", "Cystic artery blood supply", "Normal gallbladder anatomy"], "ans": 0, "exp": "Answer: A. Gallstones, especially stones >3 cm", "src": "Large Review 2026", "lec": "Lec 45", "topic": "Biliary: Gallbladder Neoplasia", "id": "qlr26_52211ed5"}, {"q": "Which type of cholelithiasis is most common, and what does it predominantly contain?", "opts": ["Cholesterol stones; crystalline cholesterol monohydrate", "Pigment stones; crystalline cholesterol monohydrate", "Black pigment stones; bacterial infection products", "Brown pigment stones; red cell disorder products", "Pigment stones; calcium carbonate"], "ans": 0, "exp": "Answer: A. Cholesterol stones; crystalline cholesterol monohydrate", "src": "Large Review 2026", "lec": "Lec 45", "topic": "Biliary: Cholelithiasis / Gallstones", "id": "qlr26_735ce024"}, {"q": "A patient with choledocholithiasis develops fever, RUQ pain, jaundice, altered mental status, and septic shock. What is the most likely diagnosis?", "opts": ["Gallbladder polyp", "Gallstone ileus", "Gallbladder cancer", "Biliary colic", "Ascending cholangitis progressing to septic shock"], "ans": 4, "exp": "Answer: E. Ascending cholangitis progressing to septic shock (Reynolds' pentad)", "src": "Large Review 2026", "lec": "Lec 45", "topic": "Biliary: Choledocholithiasis / Cholangitis", "id": "qlr26_ee210e46"}, {"q": "A patient with a pancreatic pseudocyst has no evidence of necrosis, hemorrhage, rupture, or infection. What is the most appropriate initial management?", "opts": ["Immediate surgical drainage", "Supportive care because most lesions resolve spontaneously", "Antibiotics for all pseudocysts", "Total pancreatectomy", "Chemotherapy"], "ans": 1, "exp": "Answer: B. Supportive care — most uncomplicated pseudocysts resolve spontaneously", "src": "Large Review 2026", "lec": "Lec 46", "topic": "Pancreas: Other", "id": "qlr26_8dd1b5a7"}, {"q": "Which type of pancreatic cancer is listed as the leading cause of pancreatic cancer?", "opts": ["Pancreatic neuroendocrine tumor", "Acinar cell carcinoma", "Pancreatic ductal adenocarcinoma", "Metastatic disease", "Serous cystadenoma"], "ans": 2, "exp": "Answer: C. Pancreatic ductal adenocarcinoma", "src": "Large Review 2026", "lec": "Lec 46", "topic": "Pancreas: Pancreatic Cancer", "id": "qlr26_ff1396d4"}, {"q": "A patient presents with hypoglycemia <50 mg/dL, hypoglycemic symptoms, and improvement with glucose replacement. Which diagnosis should be suspected?", "opts": ["Gastrinoma", "Insulinoma", "VIPoma", "Glucagonoma", "Somatostatinoma"], "ans": 1, "exp": "Answer: B. Insulinoma (Whipple's triad)", "src": "Large Review 2026", "lec": "Lec 46", "topic": "Pancreas: Endocrine Tumors", "id": "qlr26_28de8cee"}, {"q": "A patient is diagnosed with a pyogenic liver abscess. Which treatment strategy is effective for 80-90% of patients?", "opts": ["Observation only", "Antibiotics only", "Liver transplant", "Antibiotics plus percutaneous drainage", "Steroids"], "ans": 3, "exp": "Answer: D. Antibiotics plus percutaneous drainage", "src": "Large Review 2026", "lec": "Lec 46", "topic": "Liver: Other", "id": "qlr26_634d0f50"}, {"q": "A male patient is found to have a hepatic adenoma measuring >4 cm. Which management is most appropriate?", "opts": ["Cessation of estrogen or anabolic steroids only", "No treatment is needed", "Antibiotics plus percutaneous drainage", "Liver transplant", "Surgical resection due to risk of bleeding and/or malignant transformation"], "ans": 4, "exp": "Answer: E. Surgical resection — all male adenomas and adenomas >5 cm should be resected", "src": "Large Review 2026", "lec": "Lec 46", "topic": "Liver: Liver Tumors", "id": "qlr26_c889dba8"}, {"q": "A patient presents with jaundice, pruritus, pale stools, steatorrhea, and skin xanthomas. Xanthomas are more characteristic of which process?", "opts": ["Intrahepatic cholestasis", "Extrahepatic cholestasis", "Physiologic neonatal jaundice", "Gilbert syndrome", "Reduced hepatic bilirubin uptake"], "ans": 1, "exp": "Answer: B. Extrahepatic cholestasis", "src": "Large Review 2026", "lec": "Lec 47", "topic": "Liver: Bilirubin Metabolism / Jaundice", "id": "qlr26_b75c3fa5"}, {"q": "A patient has mild intermittent jaundice worsening with infection, stress, alcohol, or prolonged fasting. This is due to decreased activity of which enzyme?", "opts": ["Glucose-6-phosphatase", "Heme oxygenase", "Biliverdin reductase", "UGT", "MRP2 transporter"], "ans": 3, "exp": "Answer: D. UGT — Gilbert syndrome", "src": "Large Review 2026", "lec": "Lec 47", "topic": "Liver: Bilirubin Metabolism / Jaundice", "id": "qlr26_f40185ac"}, {"q": "A newborn with persistent inactive UGT does not receive phototherapy. Unconjugated bilirubin accumulates in the basal ganglia. What complication can occur?", "opts": ["Gilbert syndrome", "Biliary atresia", "Dubin-Johnson syndrome", "Cholestasis", "Kernicterus"], "ans": 4, "exp": "Answer: E. Kernicterus", "src": "Large Review 2026", "lec": "Lec 47", "topic": "Liver: Bilirubin Metabolism / Jaundice", "id": "qlr26_37bf25cc"}, {"q": "Which metabolic zone of the hepatic acinus is the most oxygenated and performs synthetic processes such as albumin synthesis?", "opts": ["Zone 1 — periportal zone", "Zone 2 — intermediate zone", "Zone 3 — pericentral zone", "Central vein zone", "Bile canalicular zone"], "ans": 0, "exp": "Answer: A. Zone 1 — periportal zone", "src": "Large Review 2026", "lec": "Lec 47", "topic": "Liver: Liver Histology / Pathology", "id": "qlr26_1e10566e"}, {"q": "Which of the following causes unconjugated hyperbilirubinemia?", "opts": ["Impaired transport of conjugated bilirubin into bile canaliculi", "Increased production of free bilirubin", "Extrahepatic obstruction of large bile ducts", "Impaired excretion of direct bilirubin only", "Increased hepatic uptake of bilirubin"], "ans": 1, "exp": "Answer: B. Increased production of free bilirubin (e.g., hemolysis)", "src": "Large Review 2026", "lec": "Lec 47", "topic": "Liver: Bilirubin Metabolism / Jaundice", "id": "qlr26_f0374d32"}, {"q": "Which liver function test components are used to assess liver injury?", "opts": ["Serum albumin and PT/INR", "Serum aminotransferases, alkaline phosphatase, serum bilirubin", "Ferritin and ceruloplasmin", "Hepatitis serologies and autoantibodies", "PT/INR only"], "ans": 1, "exp": "Answer: B. Serum aminotransferases, alkaline phosphatase, serum bilirubin", "src": "Large Review 2026", "lec": "Lec 48", "topic": "Liver: Bilirubin Metabolism / Jaundice", "id": "qlr26_37c40d0d"}, {"q": "A patient has elevated liver enzymes, and the physician wants to confirm hepatobiliary origin. Which test is most appropriate?", "opts": ["Serum albumin", "PT/INR", "Gamma-glutamyl transpeptidase", "Serum glucose", "Creatinine kinase"], "ans": 2, "exp": "Answer: C. Gamma-glutamyl transpeptidase (GGT)", "src": "Large Review 2026", "lec": "Lec 48", "topic": "Liver: Bilirubin Metabolism / Jaundice", "id": "qlr26_2aeb21ee"}, {"q": "A patient has worsening liver function. Which pattern of labs would be expected?", "opts": ["Increased serum bilirubin, decreased albumin, increased PT/INR", "Normal bilirubin, normal albumin, normal PT/INR", "Decreased bilirubin, increased albumin, decreased PT/INR", "Decreased serum bilirubin, decreased albumin, decreased PT/INR", "Increased albumin with normal PT/INR"], "ans": 0, "exp": "Answer: A. Increased serum bilirubin, decreased albumin, increased PT/INR", "src": "Large Review 2026", "lec": "Lec 48", "topic": "Liver: Bilirubin Metabolism / Jaundice", "id": "qlr26_3ec17031"}, {"q": "A 52-year-old man with alcohol use disorder and IV drug use has AST 1000 U/L and ALT 500 U/L. Which diagnosis is most consistent?", "opts": ["Acute viral hepatitis", "Ischemic hepatitis", "Alcoholic liver disease", "Metabolic dysfunction-associated steatotic liver disease", "Bone disease"], "ans": 2, "exp": "Answer: C. Alcoholic liver disease — AST > ALT (2:1 ratio) is characteristic", "src": "Large Review 2026", "lec": "Lec 48", "topic": "Liver: Alcoholic Liver Disease", "id": "qlr26_d5c705a9"}, {"q": "A patient is diagnosed with acute viral hepatitis. Which AST and ALT pattern is expected?", "opts": ["AST:ALT >= 2:1", "AST and ALT >25 times the upper limit", "AST and ALT <5 times the upper limit", "Isolated alkaline phosphatase elevation only", "Normal AST and ALT with elevated albumin"], "ans": 1, "exp": "Answer: B. AST and ALT >25 times the upper limit", "src": "Large Review 2026", "lec": "Lec 48", "topic": "Liver: Viral Hepatitis", "id": "qlr26_37ceaa98"}, {"q": "In acute viral hepatitis, liver enzymes typically show:", "opts": ["AST > ALT with mild elevation", "ALT > AST with marked elevation", "Elevated ALP only", "Isolated bilirubin elevation"], "ans": 1, "exp": "Answer: B. ALT > AST with marked elevation", "src": "Large Review 2026", "lec": "Lec 49", "topic": "Liver: Viral Hepatitis", "id": "qlr26_56ea5d89"}, {"q": "Which transmission route is most associated with Hepatitis C?", "opts": ["Fecal-oral spread", "Aerosolized droplets", "Parenteral exposure", "Tick bites"], "ans": 2, "exp": "Answer: C. Parenteral exposure", "src": "Large Review 2026", "lec": "Lec 49", "topic": "Liver: Viral Hepatitis", "id": "qlr26_ef3a711c"}, {"q": "Which laboratory test is most specific for cholestatic liver disease?", "opts": ["AST", "ALT", "GGT", "Albumin"], "ans": 2, "exp": "Answer: C. GGT (Gamma-glutamyl transpeptidase)", "src": "Large Review 2026", "lec": "Lec 49", "topic": "Liver: Bilirubin Metabolism / Jaundice", "id": "qlr26_955611e6"}, {"q": "Posthepatic jaundice most commonly produces:", "opts": ["Unconjugated hyperbilirubinemia", "Elevated haptoglobin", "Conjugated hyperbilirubinemia", "Decreased ALP"], "ans": 2, "exp": "Answer: C. Conjugated hyperbilirubinemia", "src": "Large Review 2026", "lec": "Lec 50", "topic": "Liver: Bilirubin Metabolism / Jaundice", "id": "qlr26_a976d11f"}, {"q": "Which condition commonly causes unconjugated hyperbilirubinemia?", "opts": ["PSC", "Cholestasis", "Biliary obstruction", "Gilbert syndrome"], "ans": 3, "exp": "Answer: D. Gilbert syndrome", "src": "Large Review 2026", "lec": "Lec 50", "topic": "Liver: Bilirubin Metabolism / Jaundice", "id": "qlr26_6f849a6d"}, {"q": "Which gross feature is characteristic of focal nodular hyperplasia?", "opts": ["Diffuse fatty infiltration", "Central stellate scar", "Multiple cystic spaces", "Green discoloration"], "ans": 1, "exp": "Answer: B. Central stellate scar", "src": "Large Review 2026", "lec": "Lec 51", "topic": "Liver: Liver Tumors", "id": "qlr26_57c5f8d2"}, {"q": "Long-term oral contraceptive use strongly increases risk for:", "opts": ["Cholangiocarcinoma", "Hepatic adenoma", "Hepatoblastoma", "Cavernous hemangioma"], "ans": 1, "exp": "Answer: B. Hepatic adenoma", "src": "Large Review 2026", "lec": "Lec 51", "topic": "Liver: Liver Tumors", "id": "qlr26_ce445725"}, {"q": "Cholangiocarcinoma is strongly associated with:", "opts": ["Liver fluke infestation", "Hepatitis A infection", "Hemochromatosis", "Gilbert syndrome"], "ans": 0, "exp": "Answer: A. Liver fluke infestation (Clonorchis sinensis, Opisthorchis)", "src": "Large Review 2026", "lec": "Lec 51", "topic": "Liver: Liver Tumors", "id": "qlr26_b6baeb11"}, {"q": "Alcohol contributes to pancreatitis partly by:", "opts": ["Blocking bile synthesis", "Increasing sphincter of Oddi contraction", "Decreasing lipase secretion", "Stimulating insulin release"], "ans": 1, "exp": "Answer: B. Increasing sphincter of Oddi contraction", "src": "Large Review 2026", "lec": "Lec 52", "topic": "Pancreas: Acute Pancreatitis", "id": "qlr26_2448d994"}, {"q": "The imaging test of choice for acute pancreatitis is:", "opts": ["Plain abdominal x-ray", "Ultrasound", "Contrast-enhanced CT", "PET scan"], "ans": 2, "exp": "Answer: C. Contrast-enhanced CT", "src": "Large Review 2026", "lec": "Lec 52", "topic": "Pancreas: Acute Pancreatitis", "id": "qlr26_18dbb8d5"}, {"q": "Cullen sign refers to:", "opts": ["Flank bruising", "Umbilical ecchymosis", "Jaundice with enlarged gallbladder", "Oral mucosal bleeding"], "ans": 1, "exp": "Answer: B. Umbilical ecchymosis — retroperitoneal hemorrhage tracking to umbilicus", "src": "Large Review 2026", "lec": "Lec 52", "topic": "Pancreas: Acute Pancreatitis", "id": "qlr26_84448f01"}, {"q": "A patient with acute pancreatitis develops organ failure that resolves within 48 hours. How would this episode be classified?", "opts": ["Mild acute pancreatitis", "Necrotizing pancreatitis only", "Moderately severe acute pancreatitis", "Severe acute pancreatitis", "Chronic pancreatitis"], "ans": 2, "exp": "Answer: C. Moderately severe acute pancreatitis — transient organ failure resolving within 48 hours", "src": "Large Review 2026", "lec": "Lec 53", "topic": "Pancreas: Acute Pancreatitis", "id": "qlr26_7af80a2a"}, {"q": "A patient with severe acute pancreatitis develops ecchymotic discoloration along the flank. Which physical exam finding is described?", "opts": ["Cullen's sign", "Murphy's sign", "Grey Turner's sign", "Kehr's sign", "Rovsing sign"], "ans": 2, "exp": "Answer: C. Grey Turner's sign — flank ecchymosis from retroperitoneal hemorrhage", "src": "Large Review 2026", "lec": "Lec 53", "topic": "Pancreas: Acute Pancreatitis", "id": "qlr26_a1906873"}, {"q": "A 46-year-old patient has sudden-onset severe epigastric pain radiating to the back, nausea/vomiting, and serum lipase >3x upper limit. No imaging performed. What is the most appropriate diagnosis?", "opts": ["Acute pancreatitis, because the patient meets 2 of the 3 diagnostic criteria", "Acute pancreatitis, but only if CT imaging confirms pancreatic inflammation", "Chronic pancreatitis, because the pain radiates to the back", "Gallstone ileus, because nausea and vomiting are present", "Pancreatic cancer, because epigastric pain is present"], "ans": 0, "exp": "Answer: A. Acute pancreatitis — meeting 2 of 3 criteria is sufficient for diagnosis", "src": "Large Review 2026", "lec": "Lec 53", "topic": "Pancreas: Acute Pancreatitis", "id": "qlr26_acf68eac"}, {"q": "Which of the following is a Ranson criterion assessed on admission for acute pancreatitis?", "opts": ["Hematocrit decrease >10%", "Serum calcium <8 mg/dL", "Arterial PO2 <60 mmHg", "Age >55 years", "Estimated fluid sequestration >6 L"], "ans": 3, "exp": "Answer: D. Age >55 years is an admission criterion. The others are 48-hour criteria.", "src": "Large Review 2026", "lec": "Lec 53", "topic": "Pancreas: Acute Pancreatitis", "id": "qlr26_b8cc1d16"}, {"q": "A patient admitted with acute pancreatitis needs pain control. Which medication should be prescribed?", "opts": ["Morphine", "Meperidine", "Acetaminophen only", "Ibuprofen", "Ketorolac"], "ans": 0, "exp": "Answer: A. Morphine", "src": "Large Review 2026", "lec": "Lec 53", "topic": "Pancreas: Acute Pancreatitis", "id": "qlr26_ba75de91"}, {"q": "A patient develops confusion, diaphoresis, tremulousness, palpitations, and tachycardia during fasting. Blood glucose <50 mg/dL improves with glucose. Which diagnosis is most likely?", "opts": ["Gastrinoma", "Glucagonoma", "Insulinoma", "Chronic pancreatitis", "Pancreatic ductal adenocarcinoma"], "ans": 2, "exp": "Answer: C. Insulinoma — Whipple's triad", "src": "Large Review 2026", "lec": "Lec 54", "topic": "Pancreas: Endocrine Tumors", "id": "qlr26_8a635f65"}, {"q": "A patient has recurrent peptic ulceration of the upper GI tract, abdominal pain, and diarrhea. Which pancreatic neuroendocrine tumor is most likely?", "opts": ["Insulinoma", "Gastrinoma", "Glucagonoma", "VIPoma", "Nonfunctional islet cell tumor"], "ans": 1, "exp": "Answer: B. Gastrinoma — Zollinger-Ellison syndrome", "src": "Large Review 2026", "lec": "Lec 54", "topic": "Pancreas: Endocrine Tumors", "id": "qlr26_35571afa"}, {"q": "A patient has chronic epigastric pain radiating to the back, weight loss, and greasy foul-smelling stools. Imaging shows pancreatic duct dilation and calcifications. Which diagnosis is most likely?", "opts": ["Acute pancreatitis", "Insulinoma", "Gastrinoma", "Chronic pancreatitis", "Serous cystadenoma"], "ans": 3, "exp": "Answer: D. Chronic pancreatitis", "src": "Large Review 2026", "lec": "Lec 54", "topic": "Pancreas: Chronic Pancreatitis", "id": "qlr26_e9028577"}, {"q": "A patient presents with severe dermatitis, mild diabetes, stomatitis, anemia, and weight loss. Skin shows a rash with cyclic migration and erythematous patches with central healing. Which diagnosis is most likely?", "opts": ["Insulinoma", "Gastrinoma", "Glucagonoma", "Chronic pancreatitis", "Pancreatic ductal adenocarcinoma"], "ans": 2, "exp": "Answer: C. Glucagonoma — necrolytic migratory erythema is the hallmark rash", "src": "Large Review 2026", "lec": "Lec 54", "topic": "Pancreas: Endocrine Tumors", "id": "qlr26_535ddd56"}, {"q": "What is the most common cause of chronic pancreatitis?", "opts": ["Alcohol abuse", "Idiopathic tropical pancreatitis", "Hyperparathyroidism", "Hypertriglyceridemia", "Pancreatic divisum"], "ans": 0, "exp": "Answer: A. Alcohol abuse", "src": "Large Review 2026", "lec": "Lec 54", "topic": "Pancreas: Chronic Pancreatitis", "id": "qlr26_f3809d54"}, {"q": "Which diet pattern best promotes a healthy microbiome?", "opts": ["Low-fiber, high-protein animal-based diet", "High-fat diet with minimal fruits and vegetables", "Wide variety of plant-based foods", "Gluten-free diet for all patients", "Elimination of all fermented foods"], "ans": 2, "exp": "Answer: C. Wide variety of plant-based foods", "src": "Large Review 2026", "lec": "Lec 55", "topic": "Nutrition / ICU Care", "id": "qlr26_b30be716"}, {"q": "A patient with IBS is trialing dietary changes. What diet should be recommended?", "opts": ["Therapeutic probiotics", "Digestive enzymes", "Limited trial of low FODMAP diet", "L-glutamine", "Peppermint oil"], "ans": 2, "exp": "Answer: C. Limited trial of low FODMAP diet", "src": "Large Review 2026", "lec": "Lec 55", "topic": "Miscellaneous: IBS / Functional GI", "id": "qlr26_1c983664"}, {"q": "A patient with celiac disease asks what diet is required long term. Which recommendation is most appropriate?", "opts": ["Gluten-free diet permanently", "Low FODMAP diet for 4 weeks only", "High-gluten diet to build tolerance", "Lactose-free diet only", "No dietary restriction after symptoms improve"], "ans": 0, "exp": "Answer: A. Gluten-free diet permanently", "src": "Large Review 2026", "lec": "Lec 55", "topic": "Small Intestine: Celiac Disease", "id": "qlr26_a0d2c137"}, {"q": "After liver transplant, what diet pattern is generally recommended?", "opts": ["High calorie, high protein", "Low calorie, low protein", "No sodium restriction ever", "Grapefruit juice daily", "High-fat diet only"], "ans": 0, "exp": "Answer: A. High calorie, high protein", "src": "Large Review 2026", "lec": "Lec 55", "topic": "Liver: Diet / Restriction in Liver Disease", "id": "qlr26_b162b9ff"}, {"q": "A child with lead paint exposure presents with mental deterioration and microcytic anemia. Which enzymes in heme synthesis are inhibited by lead poisoning?", "opts": ["ALA synthase and uroporphyrinogen III synthase", "Porphobilinogen deaminase and ferrochelatase", "ALA dehydratase and ferrochelatase", "Coproporphyrinogen oxidase and protoporphyrinogen oxidase", "Uroporphyrinogen decarboxylase and ALA synthase"], "ans": 2, "exp": "Answer: C. ALA dehydratase and ferrochelatase", "src": "Large Review 2026", "lec": "Lec 56", "topic": "Porphyria: General / Heme Pathway", "id": "qlr26_4a2fd4c5"}, {"q": "A patient with porphyria develops blistering skin lesions after sun exposure. Which mechanism best explains the photosensitivity?", "opts": ["Defective bile acid absorption causes fat-soluble vitamin deficiency", "Excess porphyrins in the skin are excited by long-wave ultraviolet light, causing oxidative cell damage", "Impaired hemoglobin oxygen binding causes tissue hypoxia", "Autoimmune antibodies attack keratinocytes after sun exposure", "Lead directly deposits in the skin and causes blistering"], "ans": 1, "exp": "Answer: B. Excess porphyrins excited by UV light cause oxidative cell damage", "src": "Large Review 2026", "lec": "Lec 56", "topic": "Porphyria: General / Heme Pathway", "id": "qlr26_b8d21368"}, {"q": "A 29-year-old female presents with severe abdominal pain, confusion, and altered mental status after days of low-calorie diet and alcohol. Urine shows increased porphobilinogen and delta-ALA. Which diagnosis is most likely?", "opts": ["Acute intermittent porphyria", "Congenital erythropoietic porphyria", "Porphyria cutanea tarda", "Erythropoietic protoporphyria", "Lead poisoning"], "ans": 0, "exp": "Answer: A. Acute intermittent porphyria", "src": "Large Review 2026", "lec": "Lec 56", "topic": "Porphyria: AIP", "id": "qlr26_ecf49ac4"}, {"q": "An infant presents with severe photosensitivity, reddish-brown discoloration of the teeth, and abdominal pain. The teeth fluoresce bright red under Wood's lamp. Which enzyme is deficient?", "opts": ["Ferrochelatase", "ALA dehydratase", "Uroporphyrinogen III synthase", "Protoporphyrinogen oxidase", "Coproporphyrinogen oxidase"], "ans": 2, "exp": "Answer: C. Uroporphyrinogen III synthase — congenital erythropoietic porphyria", "src": "Large Review 2026", "lec": "Lec 56", "topic": "Porphyria: General / Heme Pathway", "id": "qlr26_2ca25c99"}, {"q": "A patient develops painful blistering on sun-exposed skin, abdominal pain, limb weakness, and motor neuropathy. Labs show dark urine with increased ALA, PBG, and coproporphyrin III, plus elevated coproporphyrin III and protoporphyrin in stool. Which diagnosis is most likely?", "opts": ["Acute intermittent porphyria", "Porphyria cutanea tarda", "Congenital erythropoietic porphyria", "Lead poisoning", "Variegate porphyria"], "ans": 4, "exp": "Answer: E. Variegate porphyria — both neurovisceral and cutaneous symptoms with elevated stool protoporphyrin", "src": "Large Review 2026", "lec": "Lec 56", "topic": "Porphyria: General / Heme Pathway", "id": "qlr26_cbf70dec"}, {"q": "During Phase II drug metabolism, where does conjugation primarily occur in the cell, and what is its main purpose?", "opts": ["Mitochondria; to produce ATP for drug metabolism", "Cytosol; to increase drug hydrophilicity for easier elimination", "Endoplasmic reticulum; to make drugs more lipid-soluble", "Nucleus; to alter gene transcription of CYP450 enzymes", "Lysosome; to break drugs down into amino acids"], "ans": 1, "exp": "Answer: B. Cytosol; to increase drug hydrophilicity for easier elimination", "src": "Large Review 2026", "lec": "Lec 57", "topic": "Pharm: Cytochrome P450 / Drug Metabolism", "id": "qlr26_e237a1a2"}, {"q": "A patient with chronic alcohol use has increased activity of the CYP450 isoenzyme involved in ethanol metabolism. Which isoenzyme metabolizes ethanol?", "opts": ["CYP1A2", "CYP2D6", "CYP2C9", "CYP2E1", "CYP3A4"], "ans": 3, "exp": "Answer: D. CYP2E1", "src": "Large Review 2026", "lec": "Lec 57", "topic": "Pharm: Cytochrome P450 / Drug Metabolism", "id": "qlr26_2568aabd"}, {"q": "A patient takes a toxic dose of acetaminophen. CYP-mediated metabolism produces excess NAPQI, depleting glutathione stores. Which antidote should be given?", "opts": ["Fomepizole", "Flumazenil", "Naloxone", "N-acetylcysteine", "Atropine"], "ans": 3, "exp": "Answer: D. N-acetylcysteine", "src": "Large Review 2026", "lec": "Lec 57", "topic": "Liver: Drug-induced Liver Injury", "id": "qlr26_d6b18d8a"}, {"q": "A 42-year-old patient is found unresponsive with profound CNS depression. Toxicology is positive for phenobarbital. What is the primary mechanism of action of this drug?", "opts": ["Prolongs opening of GABA-A chloride channels, causing chloride influx and CNS depression", "Blocks dopamine receptors in the chemoreceptor trigger zone", "Inhibits serotonin reuptake in the CNS", "Blocks NMDA glutamate receptors, decreasing excitatory signaling", "Inhibits acetylcholinesterase, increasing acetylcholine activity"], "ans": 0, "exp": "Answer: A. Prolongs opening of GABA-A chloride channels, causing chloride influx and CNS depression", "src": "Large Review 2026", "lec": "Lec 57", "topic": "Pharm: Cytochrome P450 / Drug Metabolism", "id": "qlr26_193fe757"}];
const SYSTEM_TOPICS = {"GI Infections": ["GI Infections: Bacterial (Non-E.coli)", "GI Infections: Diarrhea Types", "GI Infections: E. coli", "GI Infections: Parasites", "GI Infections: Toxin-mediated / Fungal", "GI Infections: Viral Gastroenteritis"], "Colorectal": ["Colorectal: Appendicitis", "Colorectal: C. difficile", "Colorectal: Colonoscopy / Procedures", "Colorectal: Colorectal Cancer / Screening", "Colorectal: Diverticular Disease", "Colorectal: Hemorrhoids / Anorectal", "Colorectal: Obstruction / Volvulus", "Colorectal: Other"], "Esophagus": ["Esophagus: Barrett's / GERD", "Esophagus: Imaging / Endoscopy", "Esophagus: Motility / Achalasia", "Esophagus: Other", "Esophagus: Varices"], "Miscellaneous": ["Miscellaneous: Abdominal Pain DDx", "Miscellaneous: Dehydration", "Miscellaneous: GI Imaging / Endoscopy", "Miscellaneous: Gynecologic / OB", "Miscellaneous: IBS / Functional GI", "Miscellaneous: Other", "Miscellaneous: STI / Anorectal Infections", "Miscellaneous: Sepsis / SIRS", "Miscellaneous: Skin / Dermatology in GI"], "Liver": ["Liver: Alcoholic Liver Disease", "Liver: Bilirubin Metabolism / Jaundice", "Liver: Cirrhosis & Complications", "Liver: Congenital Liver Disorders", "Liver: Diet / Restriction in Liver Disease", "Liver: Drug-induced Liver Injury", "Liver: Hereditary / Metabolic Liver Disease", "Liver: Hereditary Hyperbilirubinemias", "Liver: Liver Failure / Transplant", "Liver: Liver Histology / Pathology", "Liver: Liver Tumors", "Liver: NAFLD / NASH", "Liver: Other", "Liver: Viral Hepatitis"], "Small Intestine": ["Small Intestine: Absorption / Nutrients", "Small Intestine: Anatomy / Physiology", "Small Intestine: Celiac Disease", "Small Intestine: Malabsorption", "Small Intestine: Other"], "IBD": ["IBD: Crohn's Disease", "IBD: IBD + PSC", "IBD: Ulcerative Colitis"], "Biliary": ["Biliary: Cholecystitis", "Biliary: Choledocholithiasis / Cholangitis", "Biliary: Cholelithiasis / Gallstones", "Biliary: Congenital / Neonatal", "Biliary: ERCP", "Biliary: Gallbladder Neoplasia", "Biliary: Other", "Biliary: PBC"], "Pancreas": ["Pancreas: Acute Pancreatitis", "Pancreas: Chronic Pancreatitis", "Pancreas: Endocrine Tumors", "Pancreas: Other", "Pancreas: Pancreatic Cancer"], "Abdominal Trauma": ["Abdominal Trauma: General / AAA", "Abdominal Trauma: Penetrating / Stab", "Abdominal Trauma: Spleen"], "Pharm": ["Pharm: Antidiarrheals / Laxatives", "Pharm: Antiemetics", "Pharm: Barbiturates / CNS", "Pharm: Cytochrome P450 / Drug Metabolism", "Pharm: Disulfiram / Alcohol Pharmacology", "Pharm: Drug Interactions"], "Porphyria": ["Porphyria: AIP", "Porphyria: EPP", "Porphyria: General / Heme Pathway", "Porphyria: PCT"], "Nutrition / ICU Care": ["Nutrition / ICU Care"], "Stomach": ["Stomach: Other", "Stomach: PUD / H. pylori", "Stomach: Physiology / Motility", "Stomach: Zollinger-Ellison / Gastrinoma"]};
const SOURCES = ["FLR 2024", "FLR 2025", "GI Club", "GI Final PQs", "Inlet", "Large Review 2026", "Monkey Intel"];
const SYSTEM_ORDER = ["Liver", "Colorectal", "GI Infections", "Pancreas", "Biliary", "Stomach", "Small Intestine", "Esophagus", "IBD", "Porphyria", "Pharm", "Abdominal Trauma", "Nutrition / ICU Care", "GI Bleeding", "GI Neoplasia", "Miscellaneous"];

let activeSources = new Set(SOURCES);
let activeTopics = new Set(ALL_QUESTIONS.map(q => q.topic));
let openSystems = new Set();
let incorrectOnly = false;
let mode = 'tutor';
let queue = [], qIdx = 0;
let answered = {}, progress = {};

const LS_ANSWERED = 'gi_answered_v2', LS_PROGRESS = 'gi_progress_v2';
function loadStorage() {
  try {
    const a = localStorage.getItem(LS_ANSWERED), p = localStorage.getItem(LS_PROGRESS);
    if (a) answered = JSON.parse(a);
    if (p) progress = JSON.parse(p);
  } catch(e) {}
}
function saveStorage() {
  try {
    localStorage.setItem(LS_ANSWERED, JSON.stringify(answered));
    localStorage.setItem(LS_PROGRESS, JSON.stringify(progress));
  } catch(e) {}
}

loadStorage();
buildSidebar();
updateHeaderStats();
updateScoreRow();

function buildSidebar() {
  const chipWrap = document.getElementById('source-chips');
  chipWrap.innerHTML = '';
  SOURCES.forEach(src => {
    const c = document.createElement('div');
    c.className = 'chip' + (activeSources.has(src) ? ' active' : '');
    c.textContent = src;
    c.onclick = () => { activeSources.has(src) ? activeSources.delete(src) : activeSources.add(src); c.classList.toggle('active'); updateHeaderStats(); };
    chipWrap.appendChild(c);
  });
  const tg = document.getElementById('topic-groups');
  tg.innerHTML = '';
  const orderedSystems = [...SYSTEM_ORDER.filter(s => SYSTEM_TOPICS[s]), ...Object.keys(SYSTEM_TOPICS).filter(s => !SYSTEM_ORDER.includes(s))];
  orderedSystems.forEach(sys => {
    if (!SYSTEM_TOPICS[sys]) return;
    const subtopics = SYSTEM_TOPICS[sys];
    const allActive = subtopics.every(t => activeTopics.has(t));
    const count = subtopics.reduce((n,t) => n + ALL_QUESTIONS.filter(q=>q.topic===t).length, 0);
    const isOpen = openSystems.has(sys);
    const group = document.createElement('div'); group.className = 'system-group';
    const hdr = document.createElement('div');
    hdr.className = 'system-header' + (allActive ? ' all-active' : '');
    hdr.innerHTML = `<span>${sys}<span class="system-count">(${count})</span></span><span class="system-toggle">${isOpen ? '▲' : '▼'}</span>`;
    hdr.onclick = () => { openSystems.has(sys) ? openSystems.delete(sys) : openSystems.add(sys); buildSidebar(); };
    hdr.addEventListener('dblclick', (e) => { e.stopPropagation(); allActive ? subtopics.forEach(t=>activeTopics.delete(t)) : subtopics.forEach(t=>activeTopics.add(t)); buildSidebar(); updateHeaderStats(); });
    const list = document.createElement('div');
    list.className = 'subtopic-list' + (isOpen ? ' open' : '');
    subtopics.forEach(t => {
      const isActive = activeTopics.has(t);
      const qCount = ALL_QUESTIONS.filter(q=>q.topic===t).length;
      const item = document.createElement('div');
      item.className = 'subtopic-item' + (isActive ? ' active' : '');
      const label = t.includes(':') ? t.split(':')[1].trim() : t;
      item.innerHTML = `<div class="subtopic-check">${isActive ? '✓' : ''}</div><span>${label} <span style="color:var(--ink-light);font-weight:400">(${qCount})</span></span>`;
      item.onclick = () => { activeTopics.has(t) ? activeTopics.delete(t) : activeTopics.add(t); buildSidebar(); updateHeaderStats(); };
      list.appendChild(item);
    });
    group.appendChild(hdr); group.appendChild(list); tg.appendChild(group);
  });
}

function selectAllTopics() { ALL_QUESTIONS.forEach(q => activeTopics.add(q.topic)); buildSidebar(); updateHeaderStats(); }
function clearAllTopics() { activeTopics.clear(); buildSidebar(); updateHeaderStats(); }

function getFilteredQuestions() {
  let qs = ALL_QUESTIONS.filter(q => activeSources.has(q.src) && activeTopics.has(q.topic));
  if (incorrectOnly) qs = qs.filter(q => answered[q.id] === false);
  return qs;
}
function updateHeaderStats() {
  const n = getFilteredQuestions().length;
  document.getElementById('hdr-filtered').textContent = n === ALL_QUESTIONS.length ? 'All' : `${n} filtered`;
}
function updateScoreRow() {
  const correct = Object.values(answered).filter(v=>v===true).length;
  const wrong = Object.values(answered).filter(v=>v===false).length;
  const seen = correct + wrong;
  document.getElementById('sc-correct').textContent = correct;
  document.getElementById('sc-wrong').textContent = wrong;
  document.getElementById('sc-seen').textContent = seen;
  document.getElementById('sc-pct').textContent = seen ? Math.round(correct/seen*100)+'%' : '—';
}

function startQuiz() {
  queue = getFilteredQuestions();
  if (!queue.length) { showEmpty('No questions match your filters.'); return; }
  qIdx = 0; renderQuestion(); document.getElementById('q-nav').style.display = 'flex';
}
function shuffleAndStart() {
  queue = getFilteredQuestions();
  if (!queue.length) { showEmpty('No questions match your filters.'); return; }
  for (let i=queue.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [queue[i],queue[j]]=[queue[j],queue[i]]; }
  qIdx = 0; renderQuestion(); document.getElementById('q-nav').style.display = 'flex';
}

function renderQuestion() {
  if (!queue.length) { showEmpty('No questions.'); return; }
  const q = queue[qIdx], total = queue.length, pct = Math.round((qIdx+1)/total*100);
  document.getElementById('progress-fill').style.width = pct+'%';
  document.getElementById('progress-text').textContent = `Question ${qIdx+1} of ${total}`;
  document.getElementById('progress-right').textContent = pct+'%';
  const letters = ['A','B','C','D','E','F'];
  const alreadyAnswered = q.id in progress, chosen = progress[q.id];
  document.getElementById('q-area').innerHTML = `
    <div class="q-card">
      <div class="q-meta">
        <span class="meta-tag src">${q.src}</span>
        <span class="meta-tag topic">${q.topic}</span>
        ${q.lec ? `<span class="meta-tag lec">${q.lec}</span>` : ''}
      </div>
      <div class="q-num">Q${qIdx+1}</div>
      <div class="q-text">${q.q}</div>
      <div class="options">
        ${q.opts.map((opt,i) => `
          <div class="opt${alreadyAnswered ? ' disabled'+(i===q.ans?' correct':(i===chosen?' wrong':'')) : ''}"
               onclick="${alreadyAnswered?'':`chooseAnswer(${i})`}">
            <span class="opt-letter">${letters[i]}.</span><span>${opt}</span>
          </div>`).join('')}
      </div>
      <div class="explanation${alreadyAnswered?' show':''}" id="exp">
        <div class="exp-label">Explanation</div>
        ${q.exp || 'No explanation provided.'}
      </div>
    </div>`;
}

function chooseAnswer(i) {
  const q = queue[qIdx];
  if (q.id in progress) return;
  progress[q.id] = i; answered[q.id] = i === q.ans;
  saveStorage(); updateScoreRow(); renderQuestion();
}
function nextQ() { if (qIdx < queue.length-1) { qIdx++; renderQuestion(); } }
function prevQ() { if (qIdx > 0) { qIdx--; renderQuestion(); } }
function skipQ() { nextQ(); }
function setMode(m) { mode=m; document.getElementById('mode-tutor').classList.toggle('active',m==='tutor'); document.getElementById('mode-timed').classList.toggle('active',m==='timed'); }
function toggleIncorrectOnly() { incorrectOnly=!incorrectOnly; document.getElementById('incorrect-toggle').classList.toggle('on',incorrectOnly); updateHeaderStats(); }
function resetProgress() {
  if (!confirm('Reset all progress?')) return;
  answered={};progress={};saveStorage();updateScoreRow();queue=[];qIdx=0;
  document.getElementById('q-area').innerHTML='<div class="empty-state"><h2>Progress reset</h2><p>Select filters and start again.</p></div>';
  document.getElementById('q-nav').style.display='none';
  document.getElementById('progress-fill').style.width='0%';
  document.getElementById('progress-text').textContent='Select filters and start';
  document.getElementById('progress-right').textContent='';
}
function showEmpty(msg) {
  document.getElementById('q-area').innerHTML=`<div class="empty-state"><h2>No questions</h2><p>${msg}</p></div>`;
  document.getElementById('q-nav').style.display='none';
}
</script>
</body>
</html>
